<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>카드 4 — 커비아 역대 작품</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
  <style>
    :root {
      --primary: #2563EB;
      --bg-light: #F8FAFC;
      --text-dark: #1E293B;
      --text-light: #FFFFFF;
      --text-muted: #64748B;
      --font-main: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #E2E8F0; }
    .card {
      width: 1080px; height: 1080px; position: relative; overflow: hidden;
      font-family: var(--font-main); background: var(--bg-light);
    }
    .card-content { position: absolute; top: 100px; left: 100px; right: 100px; bottom: 100px; display: flex; flex-direction: column; }
    .card-header { margin-bottom: 16px; }
    .divider { width: 60px; height: 4px; background: var(--primary); border-radius: 2px; margin-bottom: 24px; }
    .headline { font-size: 54px; font-weight: 700; color: var(--text-dark); line-height: 1.3; letter-spacing: -0.02em; }
    .card-body { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 16px; }
    .product-item {
      display: flex; align-items: center; gap: 20px;
      padding: 28px 28px; border-radius: 16px;
    }
    .product-item:nth-child(1) { background: linear-gradient(135deg, #FEF3C7 0%, #FFFBEB 100%); border: 2px solid rgba(234,179,8,0.12); }
    .product-item:nth-child(2) { background: linear-gradient(135deg, #FEE2E2 0%, #FEF2F2 100%); border: 2px solid rgba(220,38,38,0.12); }
    .product-item:nth-child(3) { background: linear-gradient(135deg, #EDE9FE 0%, #F5F3FF 100%); border: 2px solid rgba(124,58,237,0.12); }
    .product-item:nth-child(4) { background: linear-gradient(135deg, #DBEAFE 0%, #EFF6FF 100%); border: 2px solid rgba(37,99,235,0.12); }
    .product-icon {
      width: 56px; height: 56px; border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; flex-shrink: 0;
    }
    .product-item:nth-child(1) .product-icon { background: #B45309; color: white; }
    .product-item:nth-child(2) .product-icon { background: #DC2626; color: white; }
    .product-item:nth-child(3) .product-icon { background: #7C3AED; color: white; }
    .product-item:nth-child(4) .product-icon { background: var(--primary); color: white; }
    .product-info { flex: 1; }
    .product-info .name { font-size: 32px; font-weight: 700; color: var(--text-dark); margin-bottom: 4px; }
    .product-info .desc { font-size: 26px; font-weight: 400; color: var(--text-muted); }
    .product-price { font-size: 32px; font-weight: 800; flex-shrink: 0; }
    .product-item:nth-child(1) .product-price { color: #B45309; }
    .product-item:nth-child(2) .product-price { color: #DC2626; }
    .product-item:nth-child(3) .product-price { color: #7C3AED; }
    .product-item:nth-child(4) .product-price { color: var(--primary); }
    .bottom-box {
      padding: 24px 36px; border-radius: 16px;
      background: #1E293B; color: var(--text-light); text-align: center;
    }
    .bottom-box .text { font-size: 34px; font-weight: 600; line-height: 1.4; }
    .account-name { position: absolute; bottom: 50px; left: 100px; font-size: 18px; font-weight: 600; letter-spacing: -0.02em; color: var(--text-muted); }
    .page-indicator { position: absolute; bottom: 50px; right: 100px; font-size: 24px; color: var(--text-muted); font-weight: 500; }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-content">
      <div class="card-header">
        <div class="divider"></div>
        <h2 class="headline">커비아의 미친 아이폰들 💎</h2>
      </div>
      <div class="card-body">
        <div class="product-item">
          <div class="product-icon">💎</div>
          <div class="product-info">
            <div class="name">Diamond Snowflake</div>
            <div class="desc">다이아몬드 570개 + 18K 골드</div>
          </div>
          <div class="product-price">7.5억</div>
        </div>
        <div class="product-item">
          <div class="product-icon">🦖</div>
          <div class="product-info">
            <div class="name">Tyrannophone</div>
            <div class="desc">8천만년 된 진짜 T-Rex 이빨</div>
          </div>
          <div class="product-price">7,800만</div>
        </div>
        <div class="product-item">
          <div class="product-icon">☄️</div>
          <div class="product-info">
            <div class="name">고대 유물 에디션</div>
            <div class="desc">운석 + 매머드 이빨 + 로마 창</div>
          </div>
          <div class="product-price">1.4억</div>
        </div>
        <div class="product-item">
          <div class="product-icon">👔</div>
          <div class="product-info">
            <div class="name">JOBS 에디션 (신작)</div>
            <div class="desc">잡스 터틀넥 원단 + 서명</div>
          </div>
          <div class="product-price">1,300만</div>
        </div>
        <div class="bottom-box">
          <div class="text">두바이 기반, 전 세계 테크 마니아들의 성지 🌍</div>
        </div>
      </div>
    </div>
    <span class="account-name">@요즘뭔일</span>
    <span class="page-indicator">4/6</span>
  </div>
</body>
</html>
