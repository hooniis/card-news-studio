<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>카드 2 — 제품 소개</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
  <style>
    :root {
      --primary: #2563EB;
      --primary-light: #DBEAFE;
      --bg-light: #F8FAFC;
      --text-dark: #1E293B;
      --text-light: #FFFFFF;
      --text-muted: #64748B;
      --font-main: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #E2E8F0; }
    .card {
      width: 1080px; height: 1080px; position: relative; overflow: hidden;
      font-family: var(--font-main); background: var(--bg-light);
    }
    .card-content { position: absolute; top: 100px; left: 100px; right: 100px; bottom: 100px; display: flex; flex-direction: column; }
    .card-header { margin-bottom: 16px; }
    .divider { width: 60px; height: 4px; background: var(--primary); border-radius: 2px; margin-bottom: 24px; }
    .headline { font-size: 54px; font-weight: 700; color: var(--text-dark); line-height: 1.3; letter-spacing: -0.02em; }
    .card-body { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 20px; }
    .brand-tag {
      display: inline-flex; align-items: center; gap: 10px;
      padding: 10px 24px; background: var(--primary); color: var(--text-light);
      font-size: 28px; font-weight: 700; border-radius: 8px; align-self: flex-start;
    }
    .spec-row { display: flex; gap: 16px; }
    .spec-card {
      flex: 1; padding: 28px 20px; border-radius: 16px; text-align: center;
    }
    .spec-card:nth-child(1) { background: linear-gradient(135deg, #DBEAFE 0%, #EFF6FF 100%); }
    .spec-card:nth-child(2) { background: linear-gradient(135deg, #FEF3C7 0%, #FFFBEB 100%); }
    .spec-card:nth-child(3) { background: linear-gradient(135deg, #FEE2E2 0%, #FEF2F2 100%); }
    .spec-card .emoji { font-size: 36px; margin-bottom: 8px; }
    .spec-card .label { font-size: 24px; font-weight: 500; color: var(--text-muted); margin-bottom: 6px; }
    .spec-card .value { font-size: 38px; font-weight: 800; letter-spacing: -0.02em; }
    .spec-card:nth-child(1) .value { color: var(--primary); }
    .spec-card:nth-child(2) .value { color: #B45309; }
    .spec-card:nth-child(3) .value { color: #DC2626; }
    .spec-card .sub { font-size: 22px; font-weight: 400; color: var(--text-muted); margin-top: 4px; }
    .detail-list { display: flex; flex-direction: column; gap: 12px; }
    .detail-item {
      display: flex; align-items: center; gap: 16px;
      padding: 20px 24px; border-radius: 12px; background: #F1F5F9;
    }
    .detail-item .icon { font-size: 28px; flex-shrink: 0; }
    .detail-item .text { font-size: 32px; font-weight: 500; color: var(--text-dark); letter-spacing: -0.01em; }
    .detail-item .text .blue { font-weight: 700; color: var(--primary); }
    .sold-box {
      padding: 24px 36px; border-radius: 16px;
      background: var(--primary); color: var(--text-light); text-align: center;
    }
    .sold-box .text { font-size: 36px; font-weight: 700; }
    .sold-box .text .gold { color: #FDE68A; }
    .account-name { position: absolute; bottom: 50px; left: 100px; font-size: 18px; font-weight: 600; letter-spacing: -0.02em; color: var(--text-muted); }
    .page-indicator { position: absolute; bottom: 50px; right: 100px; font-size: 24px; color: var(--text-muted); font-weight: 500; }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-content">
      <div class="card-header">
        <div class="divider"></div>
        <h2 class="headline">커비아 'JOBS' 에디션 📱</h2>
      </div>
      <div class="card-body">
        <div class="brand-tag">🏷️ Caviar × iPhone 17 Pro</div>
        <div class="spec-row">
          <div class="spec-card">
            <div class="emoji">🌍</div>
            <div class="label">전 세계 한정</div>
            <div class="value">단 9대</div>
            <div class="sub">1.9 = 아이폰 공개일</div>
          </div>
          <div class="spec-card">
            <div class="emoji">💰</div>
            <div class="label">시작 가격</div>
            <div class="value">1,300만</div>
            <div class="sub">$9,630~</div>
          </div>
          <div class="spec-card">
            <div class="emoji">🔥</div>
            <div class="label">잔여 수량</div>
            <div class="value">2대</div>
            <div class="sub">7대 즉시 판매</div>
          </div>
        </div>
        <div class="detail-list">
          <div class="detail-item">
            <div class="icon">👔</div>
            <div class="text">애플 로고 안에 잡스 <span class="blue">실제 터틀넥 원단</span> 내장</div>
          </div>
          <div class="detail-item">
            <div class="icon">✍️</div>
            <div class="text">잡스 서명 + <span class="blue">"50th Anniversary"</span> 각인</div>
          </div>
        </div>
        <div class="sold-box">
          <div class="text">발표 직후 <span class="gold">7대 완판</span>, 수집가들 쟁탈전!</div>
        </div>
      </div>
    </div>
    <span class="account-name">@요즘뭔일</span>
    <span class="page-indicator">2/6</span>
  </div>
</body>
</html>
