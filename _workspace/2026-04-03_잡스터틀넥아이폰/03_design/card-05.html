<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>카드 5 — 애플 50주년</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
  <style>
    :root {
      --primary: #2563EB;
      --primary-light: #DBEAFE;
      --bg-light: #F8FAFC;
      --text-dark: #1E293B;
      --text-light: #FFFFFF;
      --text-muted: #64748B;
      --font-main: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #E2E8F0; }
    .card {
      width: 1080px; height: 1080px; position: relative; overflow: hidden;
      font-family: var(--font-main); background: var(--bg-light);
    }
    .card-content { position: absolute; top: 100px; left: 100px; right: 100px; bottom: 100px; display: flex; flex-direction: column; }
    .card-header { margin-bottom: 16px; }
    .divider { width: 60px; height: 4px; background: var(--primary); border-radius: 2px; margin-bottom: 24px; }
    .headline { font-size: 54px; font-weight: 700; color: var(--text-dark); line-height: 1.3; letter-spacing: -0.02em; }
    .card-body { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 20px; }
    .year-box {
      padding: 32px 40px; border-radius: 16px; text-align: center;
      background: linear-gradient(135deg, #1E293B 0%, #334155 100%);
      color: var(--text-light);
    }
    .year-box .years { font-size: 48px; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 8px; }
    .year-box .years .gold { color: #FDE68A; }
    .year-box .sub { font-size: 28px; font-weight: 400; opacity: 0.8; }
    .event-item {
      display: flex; align-items: center; gap: 20px;
      padding: 24px 28px; border-radius: 16px;
    }
    .event-item:nth-child(2) { background: #FDF2F8; border: 2px solid rgba(219,39,119,0.1); }
    .event-item:nth-child(3) { background: #DCFCE7; border: 2px solid rgba(5,150,105,0.1); }
    .event-item:nth-child(4) { background: #DBEAFE; border: 2px solid rgba(37,99,235,0.1); }
    .event-item:nth-child(5) { background: #FEF3C7; border: 2px solid rgba(234,179,8,0.1); }
    .event-icon {
      width: 48px; height: 48px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 24px; flex-shrink: 0;
    }
    .event-item:nth-child(2) .event-icon { background: #DB2777; color: white; }
    .event-item:nth-child(3) .event-icon { background: #059669; color: white; }
    .event-item:nth-child(4) .event-icon { background: var(--primary); color: white; }
    .event-item:nth-child(5) .event-icon { background: #B45309; color: white; }
    .event-text { font-size: 32px; font-weight: 500; color: var(--text-dark); line-height: 1.4; letter-spacing: -0.01em; }
    .event-text .pink { font-weight: 700; color: #DB2777; }
    .event-text .green { font-weight: 700; color: #059669; }
    .event-text .blue { font-weight: 700; color: var(--primary); }
    .event-text .amber { font-weight: 700; color: #B45309; }
    .account-name { position: absolute; bottom: 50px; left: 100px; font-size: 18px; font-weight: 600; letter-spacing: -0.02em; color: var(--text-muted); }
    .page-indicator { position: absolute; bottom: 50px; right: 100px; font-size: 24px; color: var(--text-muted); font-weight: 500; }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-content">
      <div class="card-header">
        <div class="divider"></div>
        <h2 class="headline">올해가 애플 50주년이에요 🍎</h2>
      </div>
      <div class="card-body">
        <div class="year-box">
          <div class="years">1976 → <span class="gold">2026</span></div>
          <div class="sub">차고에서 시작한 회사가 세계 1위 기업으로</div>
        </div>
        <div class="event-item">
          <div class="event-icon">🎵</div>
          <div class="event-text"><span class="pink">앨리샤 키스</span> NYC 개막 공연</div>
        </div>
        <div class="event-item">
          <div class="event-icon">🎸</div>
          <div class="event-text"><span class="green">폴 매카트니</span> Apple Park 폐막 공연</div>
        </div>
        <div class="event-item">
          <div class="event-icon">🏛️</div>
          <div class="event-text"><span class="blue">시드니 오페라하우스</span> 특별 조명</div>
        </div>
        <div class="event-item">
          <div class="event-icon">🔔</div>
          <div class="event-text"><span class="amber">나스닥 개장벨</span> 50주년 기념 타종</div>
        </div>
      </div>
    </div>
    <span class="account-name">@요즘뭔일</span>
    <span class="page-indicator">5/6</span>
  </div>
</body>
</html>
