<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>카드 3 — 터틀넥 역사</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
  <style>
    :root {
      --primary: #2563EB;
      --primary-light: #DBEAFE;
      --bg-light: #F8FAFC;
      --text-dark: #1E293B;
      --text-light: #FFFFFF;
      --text-muted: #64748B;
      --font-main: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #E2E8F0; }
    .card {
      width: 1080px; height: 1080px; position: relative; overflow: hidden;
      font-family: var(--font-main); background: var(--bg-light);
    }
    .card-content { position: absolute; top: 100px; left: 100px; right: 100px; bottom: 100px; display: flex; flex-direction: column; }
    .card-header { margin-bottom: 16px; }
    .divider { width: 60px; height: 4px; background: var(--primary); border-radius: 2px; margin-bottom: 24px; }
    .headline { font-size: 54px; font-weight: 700; color: var(--text-dark); line-height: 1.3; letter-spacing: -0.02em; }
    .card-body { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 0; }
    .timeline-step {
      display: flex; align-items: center; gap: 24px;
      padding: 24px 32px;
    }
    .timeline-step:nth-child(odd) { background: var(--primary-light); }
    .timeline-step:nth-child(even) { background: #EDE9FE; }
    .timeline-step:first-child { border-radius: 16px 16px 0 0; }
    .timeline-step:last-of-type { border-radius: 0 0 16px 16px; }
    .timeline-date {
      font-size: 24px; font-weight: 700; color: var(--primary);
      width: 80px; flex-shrink: 0; text-align: center;
    }
    .timeline-step:nth-child(even) .timeline-date { color: #7C3AED; }
    .timeline-text { font-size: 34px; font-weight: 500; color: var(--text-dark); line-height: 1.4; letter-spacing: -0.01em; }
    .timeline-text .bold { font-weight: 700; }
    .timeline-text .blue { font-weight: 700; color: var(--primary); }
    .timeline-text .purple { font-weight: 700; color: #7C3AED; }
    .timeline-arrow { display: flex; justify-content: center; padding: 2px 0; font-size: 22px; color: var(--text-muted); }
    .quote-box {
      margin-top: 24px; padding: 28px 36px;
      background: #1E293B; border-radius: 16px; text-align: center;
    }
    .quote-box .text { font-size: 34px; font-weight: 600; color: var(--text-light); line-height: 1.5; font-style: italic; }
    .quote-box .author { font-size: 26px; font-weight: 400; color: rgba(255,255,255,0.6); margin-top: 12px; }
    .account-name { position: absolute; bottom: 50px; left: 100px; font-size: 18px; font-weight: 600; letter-spacing: -0.02em; color: var(--text-muted); }
    .page-indicator { position: absolute; bottom: 50px; right: 100px; font-size: 24px; color: var(--text-muted); font-weight: 500; }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-content">
      <div class="card-header">
        <div class="divider"></div>
        <h2 class="headline">그 터틀넥, 왜 특별할까? 👔</h2>
      </div>
      <div class="card-body">
        <div class="timeline-step">
          <div class="timeline-date">1980s</div>
          <div class="timeline-text">잡스, <span class="blue">소니 공장</span> 방문 → 유니폼 아이디어에 영감</div>
        </div>
        <div class="timeline-arrow">▼</div>
        <div class="timeline-step">
          <div class="timeline-date">이후</div>
          <div class="timeline-text"><span class="purple">이세이 미야케</span>에게 애플 유니폼 의뢰 → 직원 거부</div>
        </div>
        <div class="timeline-arrow">▼</div>
        <div class="timeline-step">
          <div class="timeline-date">평생</div>
          <div class="timeline-text">미야케가 잡스 전용으로 <span class="blue">약 100벌</span> 제작</div>
        </div>
        <div class="timeline-arrow">▼</div>
        <div class="timeline-step">
          <div class="timeline-date">2011</div>
          <div class="timeline-text">잡스 별세 후, 미야케가 <span class="purple">해당 디자인 영구 은퇴</span></div>
        </div>
        <div class="quote-box">
          <div class="text">"평생 입을 만큼 충분합니다"</div>
          <div class="author">— 스티브 잡스, 100벌의 터틀넥을 받으며</div>
        </div>
      </div>
    </div>
    <span class="account-name">@요즘뭔일</span>
    <span class="page-indicator">3/6</span>
  </div>
</body>
</html>
