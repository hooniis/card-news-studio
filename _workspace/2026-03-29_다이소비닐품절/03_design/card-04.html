<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>카드 4</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
  <style>
    :root {
      --primary: #2563EB;
      --primary-light: #DBEAFE;
      --accent: #F59E0B;
      --bg-light: #F8FAFC;
      --bg-dark: #1E293B;
      --text-dark: #1E293B;
      --text-light: #FFFFFF;
      --text-muted: #64748B;
      --danger: #DC2626;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #e2e8f0;
    }

    .card {
      width: 1080px;
      height: 1080px;
      position: relative;
      overflow: hidden;
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-light);
    }

    .card-content {
      position: absolute;
      top: 80px;
      left: 80px;
      right: 80px;
      bottom: 80px;
      display: flex;
      flex-direction: column;
    }

    .card-header {
      margin-bottom: 16px;
    }

    .emoji-icon {
      font-size: 56px;
      margin-bottom: 16px;
    }

    .headline {
      font-size: 44px;
      font-weight: 700;
      color: var(--text-dark);
      line-height: 1.3;
    }

    .divider {
      width: 60px;
      height: 4px;
      background: var(--primary);
      border-radius: 2px;
      margin: 24px 0;
    }

    .card-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .big-number {
      font-size: 120px;
      font-weight: 800;
      color: var(--danger);
      line-height: 1.1;
      margin-bottom: 8px;
    }

    .big-number-label {
      font-size: 28px;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 48px;
    }

    .stat-row {
      display: flex;
      gap: 40px;
      margin-bottom: 48px;
      width: 100%;
      justify-content: center;
    }

    .stat-item {
      background: white;
      border-radius: 20px;
      padding: 32px 40px;
      text-align: center;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      flex: 1;
      max-width: 380px;
    }

    .stat-icon {
      font-size: 40px;
      margin-bottom: 12px;
    }

    .stat-value {
      font-size: 40px;
      font-weight: 800;
      color: var(--danger);
      margin-bottom: 8px;
    }

    .stat-label {
      font-size: 22px;
      font-weight: 500;
      color: var(--text-muted);
    }

    .body-text {
      font-size: 30px;
      font-weight: 400;
      color: var(--text-dark);
      line-height: 1.8;
      text-align: center;
    }

    .page-indicator {
      position: absolute;
      bottom: 40px;
      right: 80px;
      font-size: 20px;
      color: var(--text-muted);
      font-weight: 500;
    }

    .number {
      font-size: 64px;
      font-weight: 800;
      color: var(--primary);
      opacity: 0.15;
      position: absolute;
      top: 60px;
      right: 80px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="number">04</div>
    <div class="card-content">
      <div class="card-header">
        <div class="emoji-icon">📊</div>
        <h2 class="headline">매출 321% 폭증</h2>
        <div class="divider"></div>
      </div>
      <div class="card-body">
        <div class="big-number">321.9%↑</div>
        <div class="big-number-label">CU 기준, 종량제봉투 매출</div>
        <div class="stat-row">
          <div class="stat-item">
            <div class="stat-icon">🗑️</div>
            <div class="stat-value">321.9%↑</div>
            <div class="stat-label">일반 종량제봉투</div>
          </div>
          <div class="stat-item">
            <div class="stat-icon">🍽️</div>
            <div class="stat-value">257.3%↑</div>
            <div class="stat-label">음식물봉투</div>
          </div>
        </div>
        <p class="body-text">사재기 수요가 한꺼번에 몰렸다.</p>
      </div>
    </div>
    <div class="page-indicator">4/7</div>
  </div>
</body>
</html>
