<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>카드 3</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
  <style>
    :root {
      --primary: #2563EB;
      --primary-light: #DBEAFE;
      --accent: #F59E0B;
      --bg-light: #F8FAFC;
      --bg-dark: #1E293B;
      --text-dark: #1E293B;
      --text-light: #FFFFFF;
      --text-muted: #64748B;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #e2e8f0;
    }

    .card {
      width: 1080px;
      height: 1080px;
      position: relative;
      overflow: hidden;
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-light);
    }

    .card-content {
      position: absolute;
      top: 80px;
      left: 80px;
      right: 80px;
      bottom: 80px;
      display: flex;
      flex-direction: column;
    }

    .card-header {
      margin-bottom: 16px;
    }

    .emoji-icon {
      font-size: 56px;
      margin-bottom: 16px;
    }

    .headline {
      font-size: 44px;
      font-weight: 700;
      color: var(--text-dark);
      line-height: 1.3;
    }

    .divider {
      width: 60px;
      height: 4px;
      background: var(--primary);
      border-radius: 2px;
      margin: 24px 0;
    }

    .card-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .body-text {
      font-size: 30px;
      font-weight: 400;
      color: var(--text-dark);
      line-height: 1.8;
      margin-bottom: 48px;
    }

    .body-text .highlight {
      font-weight: 700;
      color: var(--primary);
    }

    .flow-chain {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0;
      background: var(--primary-light);
      border-radius: 20px;
      padding: 32px 24px;
    }

    .flow-step {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .flow-step .icon {
      font-size: 48px;
    }

    .flow-step .label {
      font-size: 24px;
      font-weight: 700;
      color: var(--primary);
    }

    .flow-arrow {
      font-size: 32px;
      color: var(--primary);
      font-weight: 700;
      margin: 0 20px;
      padding-bottom: 24px;
    }

    .page-indicator {
      position: absolute;
      bottom: 40px;
      right: 80px;
      font-size: 20px;
      color: var(--text-muted);
      font-weight: 500;
    }

    .number {
      font-size: 64px;
      font-weight: 800;
      color: var(--primary);
      opacity: 0.15;
      position: absolute;
      top: 60px;
      right: 80px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="number">03</div>
    <div class="card-content">
      <div class="card-header">
        <div class="emoji-icon">🔍</div>
        <h2 class="headline">왜 비닐이 없을까?</h2>
        <div class="divider"></div>
      </div>
      <div class="card-body">
        <p class="body-text">
          미-이란 전쟁으로 원유 공급 불안.<br>
          원유 → 나프타 → 비닐 공급망 흔들.<br>
          비닐 원재료 수급 차질 우려 확산.
        </p>
        <div class="flow-chain">
          <div class="flow-step">
            <span class="icon">⚔️</span>
            <span class="label">전쟁</span>
          </div>
          <span class="flow-arrow">→</span>
          <div class="flow-step">
            <span class="icon">🛢️</span>
            <span class="label">원유</span>
          </div>
          <span class="flow-arrow">→</span>
          <div class="flow-step">
            <span class="icon">⚗️</span>
            <span class="label">나프타</span>
          </div>
          <span class="flow-arrow">→</span>
          <div class="flow-step">
            <span class="icon">🛍️</span>
            <span class="label">비닐</span>
          </div>
        </div>
      </div>
    </div>
    <div class="page-indicator">3/7</div>
  </div>
</body>
</html>
