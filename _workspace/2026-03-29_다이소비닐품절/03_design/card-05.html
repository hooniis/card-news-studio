<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>카드 5</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
  <style>
    :root {
      --primary: #2563EB;
      --primary-light: #DBEAFE;
      --accent: #F59E0B;
      --bg-light: #F8FAFC;
      --bg-dark: #1E293B;
      --text-dark: #1E293B;
      --text-light: #FFFFFF;
      --text-muted: #64748B;
      --success: #059669;
      --success-light: #D1FAE5;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #e2e8f0;
    }

    .card {
      width: 1080px;
      height: 1080px;
      position: relative;
      overflow: hidden;
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-light);
    }

    .card-content {
      position: absolute;
      top: 80px;
      left: 80px;
      right: 80px;
      bottom: 80px;
      display: flex;
      flex-direction: column;
    }

    .card-header {
      margin-bottom: 16px;
    }

    .emoji-icon {
      font-size: 56px;
      margin-bottom: 16px;
    }

    .headline {
      font-size: 44px;
      font-weight: 700;
      color: var(--success);
      line-height: 1.3;
    }

    .divider {
      width: 60px;
      height: 4px;
      background: var(--primary);
      border-radius: 2px;
      margin: 24px 0;
    }

    .card-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .reassurance-badge {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background: var(--success-light);
      color: var(--success);
      font-size: 36px;
      font-weight: 700;
      padding: 16px 32px;
      border-radius: 16px;
      margin-bottom: 40px;
      align-self: flex-start;
    }

    .body-text {
      font-size: 30px;
      font-weight: 400;
      color: var(--text-dark);
      line-height: 1.8;
      margin-bottom: 40px;
    }

    .body-text .highlight {
      font-weight: 700;
      color: var(--success);
    }

    .official-comments {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .comment-box {
      background: white;
      border-radius: 16px;
      padding: 24px 28px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      display: flex;
      align-items: flex-start;
      gap: 16px;
    }

    .comment-icon {
      font-size: 36px;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .comment-content {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .comment-source {
      font-size: 20px;
      font-weight: 700;
      color: var(--text-muted);
    }

    .comment-text {
      font-size: 26px;
      font-weight: 500;
      color: var(--text-dark);
      line-height: 1.5;
    }

    .page-indicator {
      position: absolute;
      bottom: 40px;
      right: 80px;
      font-size: 20px;
      color: var(--text-muted);
      font-weight: 500;
    }

    .number {
      font-size: 64px;
      font-weight: 800;
      color: var(--primary);
      opacity: 0.15;
      position: absolute;
      top: 60px;
      right: 80px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="number">05</div>
    <div class="card-content">
      <div class="card-header">
        <div class="emoji-icon">✅</div>
        <h2 class="headline">사재기 안 해도 됩니다</h2>
        <div class="divider"></div>
      </div>
      <div class="card-body">
        <div class="reassurance-badge">✓ 재고 충분</div>
        <p class="body-text">
          다이소 "<span class="highlight">재고 충분</span>, 정상 판매 중."<br>
          지자체 종량제봉투 비축 물량 확보.<br>
          일시적 수요 집중일 뿐입니다.
        </p>
        <div class="official-comments">
          <div class="comment-box">
            <span class="comment-icon">🏪</span>
            <div class="comment-content">
              <span class="comment-source">다이소 공식 입장</span>
              <span class="comment-text">비닐 상품 정상 판매 중, 재고 충분</span>
            </div>
          </div>
          <div class="comment-box">
            <span class="comment-icon">🏛️</span>
            <div class="comment-content">
              <span class="comment-source">지자체</span>
              <span class="comment-text">종량제봉투 비축 물량 충분히 확보</span>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="page-indicator">5/7</div>
  </div>
</body>
</html>
