<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>카드 6</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
  <style>
    :root {
      --primary: #2563EB;
      --primary-light: #DBEAFE;
      --accent: #F59E0B;
      --bg-light: #F8FAFC;
      --bg-dark: #1E293B;
      --text-dark: #1E293B;
      --text-light: #FFFFFF;
      --text-muted: #64748B;
      --warning: #D97706;
      --warning-light: #FEF3C7;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #e2e8f0;
    }

    .card {
      width: 1080px;
      height: 1080px;
      position: relative;
      overflow: hidden;
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--warning-light);
    }

    .card-content {
      position: absolute;
      top: 80px;
      left: 80px;
      right: 80px;
      bottom: 80px;
      display: flex;
      flex-direction: column;
    }

    .card-header {
      margin-bottom: 16px;
    }

    .emoji-icon {
      font-size: 56px;
      margin-bottom: 16px;
    }

    .headline {
      font-size: 44px;
      font-weight: 700;
      color: var(--warning);
      line-height: 1.3;
    }

    .divider {
      width: 60px;
      height: 4px;
      background: var(--primary);
      border-radius: 2px;
      margin: 24px 0;
    }

    .card-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .body-text {
      font-size: 30px;
      font-weight: 400;
      color: var(--text-dark);
      line-height: 1.8;
      margin-bottom: 48px;
    }

    .body-text .highlight {
      font-weight: 700;
      color: var(--warning);
    }

    .warning-banner {
      background: var(--warning-light);
      border-left: 5px solid var(--warning);
      border-radius: 0 16px 16px 0;
      padding: 24px 28px;
      margin-bottom: 40px;
    }

    .warning-banner p {
      font-size: 26px;
      font-weight: 600;
      color: var(--warning);
      line-height: 1.5;
    }

    .product-icons {
      display: flex;
      gap: 28px;
      justify-content: center;
    }

    .product-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      background: white;
      border-radius: 16px;
      padding: 24px 28px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      min-width: 160px;
    }

    .product-item .icon {
      font-size: 40px;
    }

    .product-item .label {
      font-size: 22px;
      font-weight: 600;
      color: var(--text-dark);
    }

    .product-item .arrow {
      font-size: 24px;
      font-weight: 800;
      color: var(--warning);
    }

    .page-indicator {
      position: absolute;
      bottom: 40px;
      right: 80px;
      font-size: 20px;
      color: var(--text-muted);
      font-weight: 500;
    }

    .number {
      font-size: 64px;
      font-weight: 800;
      color: var(--primary);
      opacity: 0.15;
      position: absolute;
      top: 60px;
      right: 80px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="number">06</div>
    <div class="card-content">
      <div class="card-header">
        <div class="emoji-icon">⚠️</div>
        <h2 class="headline">앞으로 주의할 점</h2>
        <div class="divider"></div>
      </div>
      <div class="card-body">
        <p class="body-text">
          중동 리스크 장기화 시 주의 필요.<br>
          나프타 기반 제품 <span class="highlight">가격 인상 가능</span>.<br>
          비닐·플라스틱·세제용기 등 영향권.
        </p>
        <div class="warning-banner">
          <p>⚠️ 지금 당장은 괜찮지만, 지켜봐야 할 포인트</p>
        </div>
        <div class="product-icons">
          <div class="product-item">
            <span class="icon">🛍️</span>
            <span class="label">비닐</span>
            <span class="arrow">↑</span>
          </div>
          <div class="product-item">
            <span class="icon">🥤</span>
            <span class="label">플라스틱</span>
            <span class="arrow">↑</span>
          </div>
          <div class="product-item">
            <span class="icon">🧴</span>
            <span class="label">세제용기</span>
            <span class="arrow">↑</span>
          </div>
        </div>
      </div>
    </div>
    <div class="page-indicator">6/7</div>
  </div>
</body>
</html>
