<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>카드 2</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
  <style>
    :root {
      --primary: #2563EB;
      --primary-light: #DBEAFE;
      --accent: #F59E0B;
      --bg-light: #F8FAFC;
      --bg-dark: #1E293B;
      --text-dark: #1E293B;
      --text-light: #FFFFFF;
      --text-muted: #64748B;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #e2e8f0;
    }

    .card {
      width: 1080px;
      height: 1080px;
      position: relative;
      overflow: hidden;
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-light);
    }

    .card-content {
      position: absolute;
      top: 80px;
      left: 80px;
      right: 80px;
      bottom: 80px;
      display: flex;
      flex-direction: column;
    }

    .card-header {
      margin-bottom: 16px;
    }

    .emoji-icon {
      font-size: 56px;
      margin-bottom: 16px;
    }

    .headline {
      font-size: 44px;
      font-weight: 700;
      color: var(--text-dark);
      line-height: 1.3;
    }

    .divider {
      width: 60px;
      height: 4px;
      background: var(--primary);
      border-radius: 2px;
      margin: 24px 0;
    }

    .card-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .body-text {
      font-size: 30px;
      font-weight: 400;
      color: var(--text-dark);
      line-height: 1.8;
      margin-bottom: 40px;
    }

    .body-text .highlight {
      font-weight: 700;
      color: var(--primary);
    }

    .speech-bubble {
      background: var(--primary-light);
      border-radius: 20px;
      padding: 24px 32px;
      position: relative;
      display: inline-block;
    }

    .speech-bubble::after {
      content: '';
      position: absolute;
      bottom: -16px;
      left: 40px;
      width: 0;
      height: 0;
      border-left: 12px solid transparent;
      border-right: 12px solid transparent;
      border-top: 16px solid var(--primary-light);
    }

    .speech-bubble p {
      font-size: 28px;
      font-weight: 500;
      color: var(--primary);
      line-height: 1.4;
    }

    .speaker {
      margin-top: 28px;
      font-size: 22px;
      color: var(--text-muted);
      font-weight: 400;
      padding-left: 4px;
    }

    .icon-row {
      display: flex;
      gap: 32px;
      margin-bottom: 36px;
    }

    .icon-item {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 24px;
      color: var(--text-muted);
      font-weight: 500;
    }

    .icon-item span.icon {
      font-size: 36px;
    }

    .page-indicator {
      position: absolute;
      bottom: 40px;
      right: 80px;
      font-size: 20px;
      color: var(--text-muted);
      font-weight: 500;
    }

    .number {
      font-size: 64px;
      font-weight: 800;
      color: var(--primary);
      opacity: 0.15;
      position: absolute;
      top: 60px;
      right: 80px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="number">02</div>
    <div class="card-content">
      <div class="card-header">
        <div class="emoji-icon">🛍️</div>
        <h2 class="headline">비닐이 사라졌다</h2>
        <div class="divider"></div>
      </div>
      <div class="card-body">
        <div class="icon-row">
          <div class="icon-item"><span class="icon">🏪</span> 다이소</div>
          <div class="icon-item"><span class="icon">🏬</span> 편의점</div>
        </div>
        <p class="body-text">
          다이소 비닐백 <span class="highlight">매대가 곳곳 빈 상태</span>.<br>
          편의점 종량제봉투도 품절 속출.
        </p>
        <div class="speech-bubble">
          <p>"이번 주 내내 품절이에요."</p>
        </div>
        <div class="speaker">- 편의점 점주</div>
      </div>
    </div>
    <div class="page-indicator">2/7</div>
  </div>
</body>
</html>
