<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>카드 2 — 건보료 연말정산이 뭔지</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
  <style>
    :root {
      --primary: #0F766E;
      --primary-light: #CCFBF1;
      --primary-bg: #F0FDFA;
      --accent: #EAB308;
      --bg-light: #F8FAFC;
      --text-dark: #1E293B;
      --text-light: #FFFFFF;
      --text-muted: #64748B;
      --font-main: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #E2E8F0;
    }

    .card {
      width: 1080px;
      height: 1080px;
      position: relative;
      overflow: hidden;
      font-family: var(--font-main);
      background: var(--bg-light);
    }

    .card-content {
      position: absolute;
      top: 80px;
      left: 80px;
      right: 80px;
      bottom: 80px;
      display: flex;
      flex-direction: column;
    }

    .card-header {
      margin-bottom: 16px;
    }

    .divider {
      width: 60px;
      height: 4px;
      background: var(--primary);
      border-radius: 2px;
      margin-bottom: 24px;
    }

    .headline {
      font-size: 54px;
      font-weight: 700;
      color: var(--text-dark);
      line-height: 1.3;
      letter-spacing: -0.02em;
      margin-bottom: 12px;
    }

    .card-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 0;
    }

    /* 타임라인 플로우 */
    .timeline {
      display: flex;
      flex-direction: column;
      gap: 28px;
      padding: 0 20px;
    }

    .timeline-step {
      display: flex;
      align-items: center;
      gap: 28px;
    }

    .step-marker {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 34px;
      font-weight: 800;
      flex-shrink: 0;
      color: var(--text-light);
      background: var(--primary);
    }

    .step-marker.active {
      background: var(--accent);
      color: var(--text-dark);
    }

    .step-content {
      flex: 1;
    }

    .step-label {
      font-size: 24px;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 4px;
      letter-spacing: -0.01em;
    }

    .step-text {
      font-size: 36px;
      font-weight: 400;
      color: var(--text-dark);
      line-height: 1.5;
      letter-spacing: -0.01em;
    }

    .step-text .highlight {
      font-weight: 700;
      color: var(--primary);
    }

    .timeline-arrow {
      display: flex;
      justify-content: center;
      padding-left: 18px;
      width: 64px;
    }

    .timeline-arrow svg {
      width: 24px;
      height: 32px;
      color: var(--primary);
      opacity: 0.4;
    }

    .body-text {
      font-size: 36px;
      font-weight: 400;
      color: var(--text-dark);
      line-height: 1.6;
      letter-spacing: -0.01em;
      margin-top: 40px;
      padding: 28px 32px;
      background: var(--primary-bg);
      border-radius: 16px;
      border-left: 5px solid var(--primary);
    }

    .body-text .highlight {
      font-weight: 700;
      color: var(--primary);
    }

    .account-name {
      position: absolute;
      bottom: 40px;
      left: 80px;
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text-muted);
    }

    .page-indicator {
      position: absolute;
      bottom: 40px;
      right: 80px;
      font-size: 24px;
      color: var(--text-muted);
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-content">
      <div class="card-header">
        <div class="divider"></div>
        <h2 class="headline">건보료, 1년 뒤에 정산해요</h2>
      </div>
      <div class="card-body">
        <div class="timeline">
          <div class="timeline-step">
            <div class="step-marker">1</div>
            <div class="step-content">
              <div class="step-label">재작년</div>
              <div class="step-text">재작년 소득 기준으로</div>
            </div>
          </div>
          <div class="timeline-arrow">
            <svg viewBox="0 0 24 32" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v28M5 23l7 7 7-7"/></svg>
          </div>
          <div class="timeline-step">
            <div class="step-marker">2</div>
            <div class="step-content">
              <div class="step-label">작년</div>
              <div class="step-text">작년에 보험료를 냈어요.</div>
            </div>
          </div>
          <div class="timeline-arrow">
            <svg viewBox="0 0 24 32" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v28M5 23l7 7 7-7"/></svg>
          </div>
          <div class="timeline-step">
            <div class="step-marker active">3</div>
            <div class="step-content">
              <div class="step-label">올해 4월</div>
              <div class="step-text"><span class="highlight">올해 4월, 차액을 정산</span>하는 거예요.</div>
            </div>
          </div>
        </div>
        <div class="body-text">
          실제 소득과 비교해서<br><span class="highlight">차액을 한 번에 정리</span>해요.
        </div>
      </div>
    </div>
    <span class="account-name">@요즘뭔일</span>
    <span class="page-indicator">2/7</span>
  </div>
</body>
</html>
