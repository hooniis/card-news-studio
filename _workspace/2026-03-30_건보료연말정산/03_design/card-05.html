<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>카드 5 — 구체 금액</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
  <style>
    :root {
      --primary: #0F766E;
      --primary-light: #CCFBF1;
      --primary-bg: #F0FDFA;
      --accent: #EAB308;
      --accent-light: #FEF9C3;
      --bg-light: #F8FAFC;
      --text-dark: #1E293B;
      --text-light: #FFFFFF;
      --text-muted: #64748B;
      --font-main: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #E2E8F0;
    }

    .card {
      width: 1080px;
      height: 1080px;
      position: relative;
      overflow: hidden;
      font-family: var(--font-main);
      background: var(--bg-light);
    }

    .card-content {
      position: absolute;
      top: 80px;
      left: 80px;
      right: 80px;
      bottom: 80px;
      display: flex;
      flex-direction: column;
    }

    .card-header {
      margin-bottom: 16px;
    }

    .divider {
      width: 60px;
      height: 4px;
      background: var(--primary);
      border-radius: 2px;
      margin-bottom: 24px;
    }

    .headline {
      font-size: 54px;
      font-weight: 700;
      color: var(--text-dark);
      line-height: 1.3;
      letter-spacing: -0.02em;
    }

    .card-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 32px;
    }

    /* 좌우 대비 레이아웃 */
    .compare-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 28px;
    }

    .compare-card {
      border-radius: 20px;
      padding: 40px 36px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 16px;
    }

    .compare-card.pay-more {
      background: linear-gradient(160deg, #FEF9C3 0%, #FDE68A 100%);
      border: 2px solid rgba(234, 179, 8, 0.3);
    }

    .compare-card.refund {
      background: linear-gradient(160deg, #CCFBF1 0%, #99F6E4 100%);
      border: 2px solid rgba(15, 118, 110, 0.2);
    }

    .compare-icon {
      font-size: 56px;
      line-height: 1;
    }

    .compare-label {
      font-size: 32px;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    .pay-more .compare-label {
      color: #92400E;
    }

    .refund .compare-label {
      color: #065F46;
    }

    .compare-amount {
      font-size: 64px;
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -0.03em;
    }

    .pay-more .compare-amount {
      color: #B45309;
    }

    .refund .compare-amount {
      color: var(--primary);
    }

    .compare-unit {
      font-size: 34px;
      font-weight: 500;
    }

    .pay-more .compare-unit {
      color: #A16207;
    }

    .refund .compare-unit {
      color: #0D9488;
    }

    .compare-note {
      font-size: 28px;
      color: var(--text-muted);
      text-align: center;
      margin-top: 8px;
    }

    .account-name {
      position: absolute;
      bottom: 40px;
      left: 80px;
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text-muted);
    }

    .page-indicator {
      position: absolute;
      bottom: 40px;
      right: 80px;
      font-size: 24px;
      color: var(--text-muted);
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-content">
      <div class="card-header">
        <div class="divider"></div>
        <h2 class="headline">평균 얼마나 될까? 💰</h2>
      </div>
      <div class="card-body">
        <div class="compare-grid">
          <div class="compare-card pay-more">
            <div class="compare-icon">📈</div>
            <div class="compare-label">평균 추가 납부</div>
            <div class="compare-amount">20.4<span class="compare-unit">만원</span></div>
          </div>
          <div class="compare-card refund">
            <div class="compare-icon">📉</div>
            <div class="compare-label">평균 환급</div>
            <div class="compare-amount">11.7<span class="compare-unit">만원</span></div>
          </div>
        </div>
        <div class="compare-note">* 직장가입자 평균 기준</div>
      </div>
    </div>
    <span class="account-name">@요즘뭔일</span>
    <span class="page-indicator">5/7</span>
  </div>
</body>
</html>
