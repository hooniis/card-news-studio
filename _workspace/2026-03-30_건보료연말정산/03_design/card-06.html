<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>카드 6 — 분할납부 + 올해 변경점</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
  <style>
    :root {
      --primary: #0F766E;
      --primary-light: #CCFBF1;
      --primary-bg: #F0FDFA;
      --accent: #EAB308;
      --accent-light: #FEF9C3;
      --bg-light: #F8FAFC;
      --text-dark: #1E293B;
      --text-light: #FFFFFF;
      --text-muted: #64748B;
      --font-main: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #E2E8F0;
    }

    .card {
      width: 1080px;
      height: 1080px;
      position: relative;
      overflow: hidden;
      font-family: var(--font-main);
      background: var(--bg-light);
    }

    .card-content {
      position: absolute;
      top: 80px;
      left: 80px;
      right: 80px;
      bottom: 80px;
      display: flex;
      flex-direction: column;
    }

    .card-header {
      margin-bottom: 16px;
    }

    .divider {
      width: 60px;
      height: 4px;
      background: var(--primary);
      border-radius: 2px;
      margin-bottom: 24px;
    }

    .headline {
      font-size: 54px;
      font-weight: 700;
      color: var(--text-dark);
      line-height: 1.3;
      letter-spacing: -0.02em;
    }

    .card-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 36px;
    }

    /* 체크리스트 아이템 */
    .checklist-item {
      background: #FFFFFF;
      border-radius: 20px;
      padding: 36px 40px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
      display: flex;
      gap: 20px;
      align-items: flex-start;
    }

    .checklist-item .check-icon {
      font-size: 44px;
      flex-shrink: 0;
      line-height: 1.2;
    }

    .checklist-item .check-content {
      flex: 1;
    }

    .check-title {
      font-size: 36px;
      font-weight: 700;
      color: var(--text-dark);
      line-height: 1.4;
      margin-bottom: 8px;
    }

    .check-title .highlight {
      color: var(--primary);
    }

    .check-desc {
      font-size: 30px;
      font-weight: 400;
      color: var(--text-muted);
      line-height: 1.5;
    }

    /* NEW 뱃지 */
    .badge-new {
      display: inline-flex;
      align-items: center;
      padding: 4px 12px;
      background: var(--accent);
      color: #78350F;
      font-size: 22px;
      font-weight: 800;
      border-radius: 6px;
      letter-spacing: 0.05em;
      margin-left: 8px;
      vertical-align: middle;
    }

    .account-name {
      position: absolute;
      bottom: 40px;
      left: 80px;
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text-muted);
    }

    .page-indicator {
      position: absolute;
      bottom: 40px;
      right: 80px;
      font-size: 24px;
      color: var(--text-muted);
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-content">
      <div class="card-header">
        <div class="divider"></div>
        <h2 class="headline">부담되면 나눠 낼 수 있어요</h2>
      </div>
      <div class="card-body">
        <div class="checklist-item">
          <span class="check-icon">✅</span>
          <div class="check-content">
            <div class="check-title">최대 <span class="highlight">12회 분할 납부</span> 가능</div>
            <div class="check-desc">추가 납부액이 한 달 치 보험료보다 크면<br>나눠서 낼 수 있어요</div>
          </div>
        </div>
        <div class="checklist-item">
          <span class="check-icon">✅</span>
          <div class="check-content">
            <div class="check-title">올해부터 국세청 자료로<br><span class="highlight">자동 정산</span>돼요 <span class="badge-new">NEW</span></div>
            <div class="check-desc">회사가 별도로 신고할 필요 없어요</div>
          </div>
        </div>
      </div>
    </div>
    <span class="account-name">@요즘뭔일</span>
    <span class="page-indicator">6/7</span>
  </div>
</body>
</html>
