<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>카드 4 — 돌려받는 경우</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
  <style>
    :root {
      --primary: #0F766E;
      --primary-light: #CCFBF1;
      --primary-bg: #F0FDFA;
      --accent: #EAB308;
      --bg-light: #F8FAFC;
      --text-dark: #1E293B;
      --text-light: #FFFFFF;
      --text-muted: #64748B;
      --font-main: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #E2E8F0;
    }

    .card {
      width: 1080px;
      height: 1080px;
      position: relative;
      overflow: hidden;
      font-family: var(--font-main);
      background: var(--bg-light);
    }

    .card-content {
      position: absolute;
      top: 80px;
      left: 80px;
      right: 80px;
      bottom: 80px;
      display: flex;
      flex-direction: column;
    }

    .card-header {
      margin-bottom: 16px;
    }

    .divider {
      width: 60px;
      height: 4px;
      background: var(--primary);
      border-radius: 2px;
      margin-bottom: 24px;
    }

    .headline {
      font-size: 54px;
      font-weight: 700;
      color: var(--text-dark);
      line-height: 1.3;
      letter-spacing: -0.02em;
    }

    .card-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 40px;
    }

    .body-text {
      font-size: 36px;
      font-weight: 400;
      color: var(--text-dark);
      line-height: 1.7;
      letter-spacing: -0.01em;
    }

    .body-text-line {
      margin-bottom: 8px;
    }

    /* 핵심 강조 박스 */
    .highlight-box {
      background: var(--primary-bg);
      border-radius: 16px;
      padding: 36px 40px;
      border-left: 5px solid var(--primary);
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .highlight-box .icon {
      font-size: 56px;
      flex-shrink: 0;
    }

    .highlight-box .text {
      font-size: 40px;
      font-weight: 700;
      color: var(--primary);
      line-height: 1.4;
    }

    /* 안내 배지 */
    .info-badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 14px 24px;
      background: var(--primary-light);
      border-radius: 10px;
      font-size: 30px;
      font-weight: 600;
      color: var(--primary);
    }

    .info-badge .check {
      font-size: 26px;
    }

    /* 배경 장식 */
    .number-bg {
      font-size: 200px;
      font-weight: 800;
      color: var(--primary);
      opacity: 0.05;
      position: absolute;
      top: 20px;
      right: 40px;
      line-height: 1;
    }

    .account-name {
      position: absolute;
      bottom: 40px;
      left: 80px;
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text-muted);
    }

    .page-indicator {
      position: absolute;
      bottom: 40px;
      right: 80px;
      font-size: 24px;
      color: var(--text-muted);
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="number-bg">📉</div>
    <div class="card-content">
      <div class="card-header">
        <div class="divider"></div>
        <h2 class="headline">소득 줄었으면 돌려받아요 📉</h2>
      </div>
      <div class="card-body">
        <div class="body-text">
          <div class="body-text-line">소득이 줄었다면 환급 대상이에요.</div>
          <div class="body-text-line">별도 신청 안 해도 돼요.</div>
          <div class="body-text-line">4월 보험료에서 자동 차감돼요.</div>
        </div>
        <div class="highlight-box">
          <span class="icon">✅</span>
          <span class="text">신청 안 해도 자동 환급</span>
        </div>
        <div>
          <span class="info-badge">
            <span class="check">💡</span>
            4월 급여명세서에서 확인하세요
          </span>
        </div>
      </div>
    </div>
    <span class="account-name">@요즘뭔일</span>
    <span class="page-indicator">4/7</span>
  </div>
</body>
</html>
