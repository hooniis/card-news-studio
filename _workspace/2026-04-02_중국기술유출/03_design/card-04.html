<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>카드 4 — 통계</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
  <style>
    :root {
      --primary: #DC2626;
      --bg-light: #F8FAFC;
      --text-dark: #1E293B;
      --text-light: #FFFFFF;
      --text-muted: #64748B;
      --font-main: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #E2E8F0; }
    .card {
      width: 1080px; height: 1080px; position: relative; overflow: hidden;
      font-family: var(--font-main); background: var(--bg-light);
    }
    .card-content { position: absolute; top: 100px; left: 100px; right: 100px; bottom: 100px; display: flex; flex-direction: column; }
    .card-header { margin-bottom: 16px; }
    .divider { width: 60px; height: 4px; background: var(--primary); border-radius: 2px; margin-bottom: 24px; }
    .headline { font-size: 54px; font-weight: 700; color: var(--text-dark); line-height: 1.3; letter-spacing: -0.02em; }
    .card-body { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 24px; }
    .stat-row { display: flex; gap: 20px; }
    .stat-box {
      flex: 1; padding: 32px 24px; border-radius: 16px; text-align: center;
    }
    .stat-box.red { background: linear-gradient(135deg, #FEE2E2 0%, #FEF2F2 100%); border: 2px solid rgba(220,38,38,0.12); }
    .stat-box.amber { background: linear-gradient(135deg, #FEF3C7 0%, #FFFBEB 100%); border: 2px solid rgba(234,179,8,0.12); }
    .stat-box .label { font-size: 28px; font-weight: 500; color: var(--text-muted); margin-bottom: 12px; }
    .stat-box .number { font-size: 60px; font-weight: 800; letter-spacing: -0.02em; }
    .stat-box.red .number { color: var(--primary); }
    .stat-box.amber .number { color: #B45309; }
    .stat-box .unit { font-size: 32px; font-weight: 700; }
    .stat-box .change { font-size: 26px; font-weight: 600; color: var(--primary); margin-top: 6px; }
    .china-box {
      padding: 36px 40px; border-radius: 16px; text-align: center;
      background: var(--primary); color: var(--text-light);
    }
    .china-box .title { font-size: 30px; font-weight: 500; opacity: 0.9; margin-bottom: 12px; }
    .china-box .big { font-size: 56px; font-weight: 800; letter-spacing: -0.02em; }
    .china-box .big .gold { color: #FDE68A; }
    .china-box .sub { font-size: 28px; font-weight: 400; opacity: 0.8; margin-top: 8px; }
    .expert-box {
      padding: 28px 36px; background: #F1F5F9; border-radius: 16px;
      border-left: 5px solid var(--text-muted);
    }
    .expert-box .text { font-size: 34px; font-weight: 600; color: var(--text-dark); line-height: 1.5; text-align: center; }
    .expert-box .text .red { color: var(--primary); font-weight: 700; }
    .expert-box .source { font-size: 24px; font-weight: 400; color: var(--text-muted); text-align: center; margin-top: 8px; }
    .account-name { position: absolute; bottom: 50px; left: 100px; font-size: 18px; font-weight: 600; letter-spacing: -0.02em; color: var(--text-muted); }
    .page-indicator { position: absolute; bottom: 50px; right: 100px; font-size: 24px; color: var(--text-muted); font-weight: 500; }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-content">
      <div class="card-header">
        <div class="divider"></div>
        <h2 class="headline">얼마나 심각한 거야? 📊</h2>
      </div>
      <div class="card-body">
        <div class="stat-row">
          <div class="stat-box red">
            <div class="label">2024년 기술 유출 범죄</div>
            <div class="number">179<span class="unit">건</span></div>
            <div class="change">전년 대비 45.5%↑ 역대 최대</div>
          </div>
          <div class="stat-box amber">
            <div class="label">해외 유출 중 중국</div>
            <div class="number">54.5<span class="unit">%</span></div>
            <div class="change" style="color:#B45309;">33건 중 18건이 중국行</div>
          </div>
        </div>
        <div class="china-box">
          <div class="title">중국으로 빠져나가는 기술 인력 (추정)</div>
          <div class="big">연간 <span class="gold">1,000명</span> 이상</div>
          <div class="sub">2·3차 하청 포함 시 — 웅탐정 대표</div>
        </div>
        <div class="expert-box">
          <div class="text">중소기업은 기술 유출되면<br><span class="red">그대로 망할 수밖에 없다</span></div>
          <div class="source">— 황인창 국가공인탐정협회 수석부회장</div>
        </div>
      </div>
    </div>
    <span class="account-name">@요즘뭔일</span>
    <span class="page-indicator">4/6</span>
  </div>
</body>
</html>
