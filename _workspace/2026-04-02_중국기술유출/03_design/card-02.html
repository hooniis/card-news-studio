<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>카드 2 — 실제 사례</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
  <style>
    :root {
      --primary: #DC2626;
      --primary-light: #FEE2E2;
      --bg-light: #F8FAFC;
      --text-dark: #1E293B;
      --text-light: #FFFFFF;
      --text-muted: #64748B;
      --font-main: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #E2E8F0; }
    .card {
      width: 1080px; height: 1080px; position: relative; overflow: hidden;
      font-family: var(--font-main); background: var(--bg-light);
    }
    .card-content { position: absolute; top: 100px; left: 100px; right: 100px; bottom: 100px; display: flex; flex-direction: column; }
    .card-header { margin-bottom: 16px; }
    .divider { width: 60px; height: 4px; background: var(--primary); border-radius: 2px; margin-bottom: 24px; }
    .headline { font-size: 54px; font-weight: 700; color: var(--text-dark); line-height: 1.3; letter-spacing: -0.02em; }
    .card-body { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 24px; }
    .case-label {
      display: inline-flex; align-items: center; gap: 10px;
      padding: 10px 24px; background: var(--primary); color: var(--text-light);
      font-size: 28px; font-weight: 700; border-radius: 8px; align-self: flex-start;
    }
    .quote-box {
      padding: 32px 36px; border-radius: 16px;
      background: #FFFBEB; border: 2px solid rgba(234,179,8,0.15);
      text-align: center;
    }
    .quote-box .text { font-size: 40px; font-weight: 700; color: var(--text-dark); line-height: 1.4; }
    .quote-box .text .amber { color: #B45309; }
    .quote-box .sub { font-size: 28px; font-weight: 400; color: var(--text-muted); margin-top: 12px; }
    .flow-row { display: flex; align-items: center; gap: 16px; }
    .flow-card {
      flex: 1; padding: 28px 20px; border-radius: 16px; text-align: center;
    }
    .flow-card:nth-child(1) { background: var(--primary-light); }
    .flow-card:nth-child(3) { background: #DCFCE7; }
    .flow-card .emoji { font-size: 40px; margin-bottom: 8px; }
    .flow-card .label { font-size: 26px; font-weight: 500; color: var(--text-muted); margin-bottom: 4px; }
    .flow-card .value { font-size: 38px; font-weight: 800; letter-spacing: -0.02em; }
    .flow-card:nth-child(1) .value { color: var(--primary); }
    .flow-card:nth-child(3) .value { color: #059669; }
    .flow-arrow { font-size: 36px; color: var(--text-muted); flex-shrink: 0; }
    .result-box {
      padding: 28px 36px; background: linear-gradient(135deg, #FEE2E2 0%, #FEF2F2 100%);
      border-radius: 16px; border-left: 5px solid var(--primary); text-align: center;
    }
    .result-box .text { font-size: 36px; font-weight: 700; color: var(--text-dark); line-height: 1.5; }
    .result-box .text .red { color: var(--primary); }
    .account-name { position: absolute; bottom: 50px; left: 100px; font-size: 18px; font-weight: 600; letter-spacing: -0.02em; color: var(--text-muted); }
    .page-indicator { position: absolute; bottom: 50px; right: 100px; font-size: 24px; color: var(--text-muted); font-weight: 500; }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-content">
      <div class="card-header">
        <div class="divider"></div>
        <h2 class="headline">"농사 짓겠다" 퇴사한 직원 🔍</h2>
      </div>
      <div class="card-body">
        <div class="case-label">🏭 반도체 장비 A사 실화</div>
        <div class="quote-box">
          <div class="text">"<span class="amber">인력 용역회사</span>로 이직합니다"</div>
          <div class="sub">— 9년차 조립 공정 실무자의 퇴사 사유</div>
        </div>
        <div class="flow-row">
          <div class="flow-card">
            <div class="emoji">💰</div>
            <div class="label">기존 연봉</div>
            <div class="value">7,500만</div>
          </div>
          <div class="flow-arrow">→</div>
          <div class="flow-card">
            <div class="emoji">🇨🇳</div>
            <div class="label">중국 측 제시</div>
            <div class="value">3억원</div>
          </div>
        </div>
        <div class="result-box">
          <div class="text">연봉 <span class="red">4배</span>에 넘어간 기술 인력<br>탐정 2주 추적 끝에 <span class="red">중국 출근</span> 포착!</div>
        </div>
      </div>
    </div>
    <span class="account-name">@요즘뭔일</span>
    <span class="page-indicator">2/6</span>
  </div>
</body>
</html>
