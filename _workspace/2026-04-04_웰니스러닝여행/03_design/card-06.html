<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>카드 6 - 글로벌 트렌드</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
  <style>
    :root {
      --primary: #059669;
      --accent: #F472B6;
      --bg-light: #F8FAFC;
      --text-dark: #1E293B;
      --text-light: #FFFFFF;
      --text-muted: #64748B;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #E2E8F0;
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    .card {
      width: 1080px;
      height: 1080px;
      position: relative;
      overflow: hidden;
      background: var(--bg-light);
    }

    .card-content {
      position: absolute;
      top: 80px;
      left: 80px;
      right: 80px;
      bottom: 120px;
      display: flex;
      flex-direction: column;
    }

    .big-number {
      display: flex;
      align-items: baseline;
      margin-bottom: 16px;
    }

    .number {
      font-size: 84px;
      font-weight: 800;
      color: var(--primary);
      line-height: 1;
    }

    .unit {
      font-size: 48px;
      font-weight: 700;
      color: var(--primary);
      margin-left: 8px;
    }

    .headline {
      font-size: 42px;
      font-weight: 700;
      color: var(--text-dark);
      line-height: 1.3;
      margin-bottom: 28px;
    }

    .fact-list {
      font-size: 28px;
      font-weight: 400;
      color: var(--text-dark);
      line-height: 1.6;
      margin-bottom: 28px;
    }

    .fact-list .highlight {
      font-weight: 700;
      color: var(--primary);
    }

    .term-box {
      background: linear-gradient(135deg, rgba(5, 150, 105, 0.1) 0%, rgba(16, 185, 129, 0.05) 100%);
      border: 2px solid var(--primary);
      padding: 22px 28px;
      border-radius: 16px;
    }

    .term-icon {
      font-size: 28px;
      margin-bottom: 8px;
    }

    .term-title {
      font-size: 28px;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 8px;
    }

    .term-text {
      font-size: 24px;
      font-weight: 500;
      color: var(--text-dark);
      line-height: 1.5;
    }

    .account-name {
      position: absolute;
      bottom: 40px;
      left: 80px;
      font-size: 18px;
      font-weight: 600;
      color: var(--text-muted);
    }

    .page-indicator {
      position: absolute;
      bottom: 40px;
      right: 80px;
      font-size: 20px;
      font-weight: 500;
      color: var(--text-muted);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-content">
      <div class="big-number">
        <div class="number">74</div>
        <div class="unit">%</div>
      </div>
      <div class="headline">글로벌 Z세대 74%가<br>'러닝투어리즘' 희망한대요 🌏</div>
      <div class="fact-list">
        Airbnb·Strava 공동연구 결과,<br><br>
        Z세대 <span class="highlight">74%</span>가<br>
        시골 풍경 러닝 여행 희망<br><br>
        여행사 Contiki:<br>
        액티브 여행 예약 <span class="highlight">105% 증가</span> (2023→2024)<br><br>
        그룹 러닝이 여행의 하이라이트로 부상했어요
      </div>
      <div class="term-box">
        <div class="term-icon">💡</div>
        <div class="term-title">Runcation이란?</div>
        <div class="term-text">Running + Vacation<br>달리기 + 휴가를 결합한 여행</div>
      </div>
    </div>
    <div class="account-name">@요즘뭔일</div>
    <div class="page-indicator">6/8</div>
  </div>
</body>
</html>
