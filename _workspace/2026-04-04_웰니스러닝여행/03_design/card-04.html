<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>카드 4 - 트렌드 배경</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
  <style>
    :root {
      --primary: #059669;
      --accent: #F472B6;
      --bg-light: #F8FAFC;
      --text-dark: #1E293B;
      --text-light: #FFFFFF;
      --text-muted: #64748B;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #E2E8F0;
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    .card {
      width: 1080px;
      height: 1080px;
      position: relative;
      overflow: hidden;
      background: var(--bg-light);
    }

    .card-content {
      position: absolute;
      top: 80px;
      left: 80px;
      right: 80px;
      bottom: 120px;
      display: flex;
      flex-direction: column;
    }

    .big-number {
      display: flex;
      align-items: baseline;
      margin-bottom: 16px;
    }

    .number {
      font-size: 80px;
      font-weight: 800;
      color: var(--primary);
      line-height: 1;
    }

    .unit {
      font-size: 48px;
      font-weight: 700;
      color: var(--primary);
      margin-left: 8px;
    }

    .headline {
      font-size: 42px;
      font-weight: 700;
      color: var(--text-dark);
      line-height: 1.3;
      margin-bottom: 28px;
    }

    .fact-list {
      font-size: 28px;
      font-weight: 400;
      color: var(--text-dark);
      line-height: 1.6;
      margin-bottom: 28px;
    }

    .fact-list .highlight {
      font-weight: 700;
      color: var(--primary);
    }

    .fact-box {
      background: linear-gradient(135deg, rgba(244, 114, 182, 0.15) 0%, rgba(251, 146, 60, 0.1) 100%);
      border: 2px solid var(--accent);
      padding: 24px;
      border-radius: 16px;
      text-align: center;
    }

    .fact-box-text {
      font-size: 26px;
      font-weight: 600;
      color: var(--text-dark);
      line-height: 1.5;
    }

    .plus-sign {
      font-size: 28px;
      color: var(--accent);
      margin: 4px 0;
      display: block;
    }

    .equals-sign {
      font-size: 28px;
      color: var(--accent);
      margin: 4px 0;
      display: block;
    }

    .account-name {
      position: absolute;
      bottom: 40px;
      left: 80px;
      font-size: 18px;
      font-weight: 600;
      color: var(--text-muted);
    }

    .page-indicator {
      position: absolute;
      bottom: 40px;
      right: 80px;
      font-size: 20px;
      font-weight: 500;
      color: var(--text-muted);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-content">
      <div class="big-number">
        <div class="number">1,000</div>
        <div class="unit">만</div>
      </div>
      <div class="headline">러닝 인구 1000만 시대,<br>여행의 목적이 바뀌고 있어요 📊</div>
      <div class="fact-list">
        국내 러닝 인구 약 <span class="highlight">1,000만 명</span> 돌파<br>
        (문화체육관광부 기준)<br><br>
        서울에만 <span class="highlight">100개 이상</span> 러닝 크루 활동 중<br><br>
        <span class="highlight">2030세대</span>가 주도하는 러닝 열풍,<br>
        단순 스포츠를 넘어 문화 코드로 자리잡았어요
      </div>
      <div class="fact-box">
        <div class="fact-box-text">
          런 클럽 문화 확산
          <span class="plus-sign">+</span>
          호텔 피트니스 프로그램 다양화
          <span class="equals-sign">=</span>
          새로운 여행 트렌드
        </div>
      </div>
    </div>
    <div class="account-name">@요즘뭔일</div>
    <div class="page-indicator">4/8</div>
  </div>
</body>
</html>
