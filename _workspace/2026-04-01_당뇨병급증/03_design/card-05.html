<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>카드 5 — 해결법</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
  <style>
    :root {
      --primary: #059669;
      --primary-light: #D1FAE5;
      --primary-bg: #ECFDF5;
      --accent: #F472B6;
      --bg-light: #F8FAFC;
      --text-dark: #1E293B;
      --text-light: #FFFFFF;
      --text-muted: #64748B;
      --font-main: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #E2E8F0; }
    .card {
      width: 1080px; height: 1080px; position: relative; overflow: hidden;
      font-family: var(--font-main); background: var(--bg-light);
    }
    .card-content { position: absolute; top: 100px; left: 100px; right: 100px; bottom: 100px; display: flex; flex-direction: column; }
    .card-header { margin-bottom: 16px; }
    .divider { width: 60px; height: 4px; background: var(--primary); border-radius: 2px; margin-bottom: 24px; }
    .headline { font-size: 54px; font-weight: 700; color: var(--text-dark); line-height: 1.3; letter-spacing: -0.02em; }
    .card-body { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 20px; }
    .checklist { display: flex; flex-direction: column; gap: 20px; }
    .check-item {
      display: flex; align-items: flex-start; gap: 24px;
      padding: 28px 32px; border-radius: 16px;
    }
    .check-item:nth-child(1) { background: linear-gradient(135deg, #ECFDF5 0%, #D1FAE5 100%); }
    .check-item:nth-child(2) { background: linear-gradient(135deg, #EFF6FF 0%, #DBEAFE 100%); }
    .check-item:nth-child(3) { background: linear-gradient(135deg, #FDF2F8 0%, #FCE7F3 100%); }
    .check-icon {
      width: 52px; height: 52px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; flex-shrink: 0; font-weight: 800;
    }
    .check-item:nth-child(1) .check-icon { background: var(--primary); color: var(--text-light); }
    .check-item:nth-child(2) .check-icon { background: #2563EB; color: var(--text-light); }
    .check-item:nth-child(3) .check-icon { background: var(--accent); color: var(--text-light); }
    .check-text {
      font-size: 36px; font-weight: 500; color: var(--text-dark);
      line-height: 1.5; letter-spacing: -0.01em; padding-top: 6px;
    }
    .check-text .highlight { font-weight: 700; color: var(--primary); }
    .check-text .blue { font-weight: 700; color: #2563EB; }
    .check-text .pink { font-weight: 700; color: #DB2777; }
    .account-name { position: absolute; bottom: 50px; left: 100px; font-size: 18px; font-weight: 600; letter-spacing: -0.02em; color: var(--text-muted); }
    .page-indicator { position: absolute; bottom: 50px; right: 100px; font-size: 24px; color: var(--text-muted); font-weight: 500; }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-content">
      <div class="card-header">
        <div class="divider"></div>
        <h2 class="headline">먹는 순서만 바꿔보세요 🥗</h2>
      </div>
      <div class="card-body">
        <div class="checklist">
          <div class="check-item">
            <div class="check-icon">1</div>
            <div class="check-text"><span class="highlight">채소·단백질 먼저</span> → 탄수화물 나중에</div>
          </div>
          <div class="check-item">
            <div class="check-icon">2</div>
            <div class="check-text">제품 뒷면 <span class="blue">탄수화물·당류</span> 확인하기</div>
          </div>
          <div class="check-item">
            <div class="check-icon">3</div>
            <div class="check-text">삼각김밥 대신 <span class="pink">반숙란</span>도 좋아요</div>
          </div>
        </div>
      </div>
    </div>
    <span class="account-name">@요즘뭔일</span>
    <span class="page-indicator">5/6</span>
  </div>
</body>
</html>
