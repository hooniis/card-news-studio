<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>카드 2 — 뭐가 문제?</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
  <style>
    :root {
      --primary: #059669;
      --primary-light: #D1FAE5;
      --primary-bg: #ECFDF5;
      --accent: #F472B6;
      --bg-light: #F8FAFC;
      --text-dark: #1E293B;
      --text-muted: #64748B;
      --font-main: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #E2E8F0; }
    .card {
      width: 1080px; height: 1080px; position: relative; overflow: hidden;
      font-family: var(--font-main); background: var(--bg-light);
    }
    .card-content { position: absolute; top: 100px; left: 100px; right: 100px; bottom: 100px; display: flex; flex-direction: column; }
    .card-header { margin-bottom: 16px; }
    .divider { width: 60px; height: 4px; background: var(--primary); border-radius: 2px; margin-bottom: 24px; }
    .headline { font-size: 54px; font-weight: 700; color: var(--text-dark); line-height: 1.3; letter-spacing: -0.02em; }
    .card-body { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 28px; }
    .combo-box {
      padding: 36px 40px;
      background: linear-gradient(135deg, #FEF3C7 0%, #FFFBEB 100%);
      border-radius: 16px;
      text-align: center;
    }
    .combo-box .items {
      font-size: 44px;
      font-weight: 700;
      color: var(--text-dark);
      margin-bottom: 12px;
    }
    .combo-box .items .emoji { font-size: 40px; }
    .combo-box .equals {
      font-size: 32px;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 8px;
    }
    .combo-box .amount {
      font-size: 56px;
      font-weight: 800;
      color: #DC2626;
      letter-spacing: -0.02em;
    }
    .combo-box .amount .unit {
      font-size: 36px;
      font-weight: 700;
    }
    .info-item {
      display: flex;
      align-items: flex-start;
      gap: 24px;
      padding: 0 20px;
    }
    .info-marker {
      width: 56px; height: 56px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; flex-shrink: 0; background: var(--primary-light);
    }
    .info-text {
      font-size: 36px; font-weight: 400; color: var(--text-dark);
      line-height: 1.6; letter-spacing: -0.01em; padding-top: 8px;
    }
    .info-text .highlight { font-weight: 700; color: #DC2626; }
    .emphasis-box {
      padding: 28px 36px;
      background: linear-gradient(135deg, #FEE2E2 0%, #FEF2F2 100%);
      border-radius: 16px;
      border-left: 5px solid #DC2626;
      text-align: center;
    }
    .emphasis-box .text {
      font-size: 38px; font-weight: 700; color: var(--text-dark); line-height: 1.4;
    }
    .emphasis-box .text .red { color: #DC2626; }
    .account-name { position: absolute; bottom: 50px; left: 100px; font-size: 18px; font-weight: 600; letter-spacing: -0.02em; color: var(--text-muted); }
    .page-indicator { position: absolute; bottom: 50px; right: 100px; font-size: 24px; color: var(--text-muted); font-weight: 500; }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-content">
      <div class="card-header">
        <div class="divider"></div>
        <h2 class="headline">편의점 한 끼가 문제예요 🍜</h2>
      </div>
      <div class="card-body">
        <div class="combo-box">
          <div class="items"><span class="emoji">🍜</span> 컵라면 + <span class="emoji">🍙</span> 삼각김밥</div>
          <div class="equals">탄수화물 한 번에</div>
          <div class="amount">80~100<span class="unit">g</span></div>
        </div>
        <div class="info-item">
          <div class="info-marker">⚠️</div>
          <div class="info-text"><span class="highlight">단순당</span>이 한꺼번에 몸에 들어가는 거예요.</div>
        </div>
        <div class="emphasis-box">
          <div class="text">식후 30분, 혈당이 <span class="red">롤러코스터</span>처럼!</div>
        </div>
      </div>
    </div>
    <span class="account-name">@요즘뭔일</span>
    <span class="page-indicator">2/6</span>
  </div>
</body>
</html>
