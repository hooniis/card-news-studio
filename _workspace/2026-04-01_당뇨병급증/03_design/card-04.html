<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>카드 4 — 얼마나 심각?</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
  <style>
    :root {
      --primary: #059669;
      --primary-light: #D1FAE5;
      --primary-bg: #ECFDF5;
      --accent: #F472B6;
      --bg-light: #F8FAFC;
      --text-dark: #1E293B;
      --text-light: #FFFFFF;
      --text-muted: #64748B;
      --font-main: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #E2E8F0; }
    .card {
      width: 1080px; height: 1080px; position: relative; overflow: hidden;
      font-family: var(--font-main); background: var(--bg-light);
    }
    .card-content { position: absolute; top: 100px; left: 100px; right: 100px; bottom: 100px; display: flex; flex-direction: column; }
    .card-header { margin-bottom: 16px; }
    .divider { width: 60px; height: 4px; background: var(--primary); border-radius: 2px; margin-bottom: 24px; }
    .headline { font-size: 54px; font-weight: 700; color: var(--text-dark); line-height: 1.3; letter-spacing: -0.02em; }
    .card-body { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 20px; }
    .stat-row {
      display: flex; gap: 20px;
    }
    .stat-box {
      flex: 1;
      padding: 32px 28px;
      border-radius: 16px;
      text-align: center;
    }
    .stat-box.green { background: var(--primary-bg); border: 2px solid rgba(5,150,105,0.15); }
    .stat-box.yellow { background: linear-gradient(135deg, #FEF3C7 0%, #FFFBEB 100%); border: 2px solid rgba(234,179,8,0.15); }
    .stat-box .label {
      font-size: 28px; font-weight: 500; color: var(--text-muted);
      margin-bottom: 8px; letter-spacing: -0.01em;
    }
    .stat-box .number {
      font-size: 56px; font-weight: 800; letter-spacing: -0.02em; line-height: 1.2;
    }
    .stat-box .number .unit { font-size: 36px; font-weight: 700; }
    .stat-box.green .number { color: var(--primary); }
    .stat-box.yellow .number { color: #B45309; }
    .total-box {
      padding: 28px 36px;
      background: var(--primary);
      border-radius: 16px;
      text-align: center;
    }
    .total-box .text {
      font-size: 40px; font-weight: 700; color: var(--text-light);
    }
    .total-box .text .accent { font-size: 48px; font-weight: 800; color: #FDE68A; }
    .detail-row {
      display: flex; gap: 20px;
    }
    .detail-box {
      flex: 1;
      padding: 24px 28px;
      border-radius: 16px;
      text-align: center;
    }
    .detail-box.red { background: #FEF2F2; border: 2px solid rgba(220,38,38,0.12); }
    .detail-box.pink { background: #FDF2F8; border: 2px solid rgba(244,114,182,0.12); }
    .detail-box .label { font-size: 26px; font-weight: 500; color: var(--text-muted); margin-bottom: 8px; }
    .detail-box .value { font-size: 36px; font-weight: 700; letter-spacing: -0.01em; }
    .detail-box.red .value { color: #DC2626; }
    .detail-box.pink .value { color: #DB2777; }
    .account-name { position: absolute; bottom: 50px; left: 100px; font-size: 18px; font-weight: 600; letter-spacing: -0.02em; color: var(--text-muted); }
    .page-indicator { position: absolute; bottom: 50px; right: 100px; font-size: 24px; color: var(--text-muted); font-weight: 500; }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-content">
      <div class="card-header">
        <div class="divider"></div>
        <h2 class="headline">생각보다 심각해요 😰</h2>
      </div>
      <div class="card-body">
        <div class="stat-row">
          <div class="stat-box green">
            <div class="label">당뇨 환자</div>
            <div class="number">600<span class="unit">만 명</span></div>
          </div>
          <div class="stat-box yellow">
            <div class="label">당뇨 전단계</div>
            <div class="number">1,400<span class="unit">만 명</span></div>
          </div>
        </div>
        <div class="total-box">
          <div class="text">합치면 약 <span class="accent">2,000만 명</span></div>
        </div>
        <div class="detail-row">
          <div class="detail-box red">
            <div class="label">60대 남성</div>
            <div class="value">3명 중 1명 당뇨</div>
          </div>
          <div class="detail-box pink">
            <div class="label">2030세대</div>
            <div class="value">증가 추세 📈</div>
          </div>
        </div>
      </div>
    </div>
    <span class="account-name">@요즘뭔일</span>
    <span class="page-indicator">4/6</span>
  </div>
</body>
</html>
