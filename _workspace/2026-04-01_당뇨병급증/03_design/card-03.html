<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>카드 3 — 몸에서 무슨 일이?</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
  <style>
    :root {
      --primary: #059669;
      --primary-light: #D1FAE5;
      --primary-bg: #ECFDF5;
      --accent: #F472B6;
      --bg-light: #F8FAFC;
      --text-dark: #1E293B;
      --text-light: #FFFFFF;
      --text-muted: #64748B;
      --font-main: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #E2E8F0; }
    .card {
      width: 1080px; height: 1080px; position: relative; overflow: hidden;
      font-family: var(--font-main); background: var(--bg-light);
    }
    .card-content { position: absolute; top: 100px; left: 100px; right: 100px; bottom: 100px; display: flex; flex-direction: column; }
    .card-header { margin-bottom: 16px; }
    .divider { width: 60px; height: 4px; background: var(--primary); border-radius: 2px; margin-bottom: 24px; }
    .headline { font-size: 54px; font-weight: 700; color: var(--text-dark); line-height: 1.3; letter-spacing: -0.02em; }
    .card-body { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 0; }
    .flow-step {
      display: flex; align-items: center; gap: 24px;
      padding: 24px 32px;
      background: var(--primary-bg);
      border-left: 4px solid var(--primary);
    }
    .flow-step:first-child { border-radius: 16px 16px 0 0; }
    .flow-step.danger { background: #FEF2F2; border-left-color: #DC2626; }
    .flow-step.danger:last-of-type { border-radius: 0 0 16px 16px; }
    .flow-step .emoji { font-size: 36px; flex-shrink: 0; }
    .flow-step .text { font-size: 36px; font-weight: 500; color: var(--text-dark); line-height: 1.5; letter-spacing: -0.01em; }
    .flow-step .text .highlight { font-weight: 700; color: var(--primary); }
    .flow-step .text .red { font-weight: 700; color: #DC2626; }
    .flow-arrow { display: flex; justify-content: center; padding: 4px 0; font-size: 28px; color: var(--primary); }
    .flow-arrow.red { color: #DC2626; }
    .warning-box {
      margin-top: 24px;
      padding: 28px 36px;
      background: linear-gradient(135deg, #FEE2E2 0%, #FEF2F2 100%);
      border-radius: 16px;
      border-left: 5px solid #DC2626;
      text-align: center;
    }
    .warning-box .text { font-size: 36px; font-weight: 700; color: var(--text-dark); }
    .warning-box .text .red { color: #DC2626; }
    .account-name { position: absolute; bottom: 50px; left: 100px; font-size: 18px; font-weight: 600; letter-spacing: -0.02em; color: var(--text-muted); }
    .page-indicator { position: absolute; bottom: 50px; right: 100px; font-size: 24px; color: var(--text-muted); font-weight: 500; }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-content">
      <div class="card-header">
        <div class="divider"></div>
        <h2 class="headline">몸에선 이런 일이 벌어져요 🔄</h2>
      </div>
      <div class="card-body">
        <div class="flow-step">
          <div class="emoji">🍜</div>
          <div class="text"><span class="highlight">탄수화물 폭탄</span> 섭취</div>
        </div>
        <div class="flow-arrow">▼</div>
        <div class="flow-step">
          <div class="emoji">📈</div>
          <div class="text">식후 30분, <span class="highlight">혈당 급상승</span></div>
        </div>
        <div class="flow-arrow">▼</div>
        <div class="flow-step">
          <div class="emoji">💉</div>
          <div class="text"><span class="highlight">인슐린 과다 분비</span></div>
        </div>
        <div class="flow-arrow red">▼</div>
        <div class="flow-step danger">
          <div class="emoji">📉</div>
          <div class="text"><span class="red">혈당 급락</span> → 졸음·무기력</div>
        </div>
        <div class="warning-box">
          <div class="text">이게 반복되면 <span class="red">당뇨 위험↑</span></div>
        </div>
      </div>
    </div>
    <span class="account-name">@요즘뭔일</span>
    <span class="page-indicator">3/6</span>
  </div>
</body>
</html>
