<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>카드 4 — 재출시 정보</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
  <style>
    :root {
      --primary: #7C3AED;
      --primary-light: #EDE9FE;
      --primary-bg: #F5F3FF;
      --accent: #F59E0B;
      --bg-light: #F8FAFC;
      --text-dark: #1E293B;
      --text-light: #FFFFFF;
      --text-muted: #64748B;
      --font-main: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #E2E8F0;
    }

    .card {
      width: 1080px;
      height: 1080px;
      position: relative;
      overflow: hidden;
      font-family: var(--font-main);
      background: var(--bg-light);
    }

    .card-content {
      position: absolute;
      top: 80px;
      left: 80px;
      right: 80px;
      bottom: 80px;
      display: flex;
      flex-direction: column;
    }

    .card-header {
      margin-bottom: 16px;
    }

    .divider {
      width: 60px;
      height: 4px;
      background: var(--primary);
      border-radius: 2px;
      margin-bottom: 24px;
    }

    .headline {
      font-size: 54px;
      font-weight: 700;
      color: var(--text-dark);
      line-height: 1.3;
      letter-spacing: -0.02em;
      margin-bottom: 12px;
    }

    .card-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 28px;
    }

    .info-item {
      display: flex;
      align-items: flex-start;
      gap: 24px;
      padding: 0 20px;
    }

    .info-marker {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      flex-shrink: 0;
      background: var(--primary-light);
    }

    .info-text {
      font-size: 36px;
      font-weight: 400;
      color: var(--text-dark);
      line-height: 1.6;
      letter-spacing: -0.01em;
      padding-top: 8px;
    }

    .info-text .highlight {
      font-weight: 700;
      color: var(--primary);
    }

    /* 타임라인 */
    .timeline-box {
      margin-top: 16px;
      padding: 32px 36px;
      background: var(--primary-bg);
      border-radius: 16px;
      border-left: 5px solid var(--primary);
    }

    .timeline-row {
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 12px 0;
    }

    .timeline-row + .timeline-row {
      border-top: 1px solid rgba(124, 58, 237, 0.12);
    }

    .timeline-date {
      font-size: 30px;
      font-weight: 700;
      color: var(--primary);
      min-width: 180px;
      letter-spacing: -0.01em;
    }

    .timeline-desc {
      font-size: 34px;
      font-weight: 500;
      color: var(--text-dark);
      letter-spacing: -0.01em;
    }

    .timeline-arrow {
      font-size: 28px;
      color: var(--accent);
    }

    .account-name {
      position: absolute;
      bottom: 40px;
      left: 80px;
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text-muted);
    }

    .page-indicator {
      position: absolute;
      bottom: 40px;
      right: 80px;
      font-size: 24px;
      color: var(--text-muted);
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-content">
      <div class="card-header">
        <div class="divider"></div>
        <h2 class="headline">4월 초, 다시 만나요! 🎉</h2>
      </div>
      <div class="card-body">
        <div class="info-item">
          <div class="info-marker">📢</div>
          <div class="info-text">소비자 요청에 <span class="highlight">오리온이 재생산</span>을 결정했어요.</div>
        </div>
        <div class="timeline-box">
          <div class="timeline-row">
            <div class="timeline-date">3월 말</div>
            <div class="timeline-arrow">→</div>
            <div class="timeline-desc">생산 시작</div>
          </div>
          <div class="timeline-row">
            <div class="timeline-date">4월 초</div>
            <div class="timeline-arrow">→</div>
            <div class="timeline-desc">구매 가능!</div>
          </div>
        </div>
        <div class="info-item">
          <div class="info-marker">🗓️</div>
          <div class="info-text"><span class="highlight">4월 초 구매 가능</span>해요!</div>
        </div>
      </div>
    </div>
    <span class="account-name">@요즘뭔일</span>
    <span class="page-indicator">4/6</span>
  </div>
</body>
</html>
