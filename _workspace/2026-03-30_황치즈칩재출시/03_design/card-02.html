<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>카드 2 — 제품 소개</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
  <style>
    :root {
      --primary: #7C3AED;
      --primary-light: #EDE9FE;
      --primary-bg: #F5F3FF;
      --accent: #F59E0B;
      --bg-light: #F8FAFC;
      --text-dark: #1E293B;
      --text-light: #FFFFFF;
      --text-muted: #64748B;
      --font-main: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #E2E8F0;
    }

    .card {
      width: 1080px;
      height: 1080px;
      position: relative;
      overflow: hidden;
      font-family: var(--font-main);
      background: var(--bg-light);
    }

    .card-content {
      position: absolute;
      top: 80px;
      left: 80px;
      right: 80px;
      bottom: 80px;
      display: flex;
      flex-direction: column;
    }

    .card-header {
      margin-bottom: 16px;
    }

    .divider {
      width: 60px;
      height: 4px;
      background: var(--primary);
      border-radius: 2px;
      margin-bottom: 24px;
    }

    .headline {
      font-size: 54px;
      font-weight: 700;
      color: var(--text-dark);
      line-height: 1.3;
      letter-spacing: -0.02em;
      margin-bottom: 12px;
    }

    .card-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 28px;
    }

    .info-item {
      display: flex;
      align-items: flex-start;
      gap: 24px;
      padding: 0 20px;
    }

    .info-marker {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      flex-shrink: 0;
      background: var(--primary-light);
    }

    .info-text {
      font-size: 36px;
      font-weight: 400;
      color: var(--text-dark);
      line-height: 1.6;
      letter-spacing: -0.01em;
      padding-top: 8px;
    }

    .info-text .highlight {
      font-weight: 700;
      color: var(--primary);
    }

    .product-image {
      display: flex;
      justify-content: center;
      margin: 8px 0;
    }

    .product-image img {
      width: 420px;
      height: auto;
      filter: drop-shadow(0 12px 24px rgba(0, 0, 0, 0.2));
      transform: rotate(-3deg);
    }

    .emphasis-box {
      margin-top: 0;
      padding: 28px 36px;
      background: linear-gradient(135deg, var(--primary-bg) 0%, #FEF3C7 100%);
      border-radius: 16px;
      border-left: 5px solid var(--accent);
    }

    .emphasis-box .label {
      font-size: 24px;
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 8px;
      letter-spacing: -0.01em;
    }

    .emphasis-box .text {
      font-size: 40px;
      font-weight: 700;
      color: var(--text-dark);
      line-height: 1.4;
      letter-spacing: -0.02em;
    }

    .account-name {
      position: absolute;
      bottom: 40px;
      left: 80px;
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text-muted);
    }

    .page-indicator {
      position: absolute;
      bottom: 40px;
      right: 80px;
      font-size: 24px;
      color: var(--text-muted);
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-content">
      <div class="card-header">
        <div class="divider"></div>
        <h2 class="headline">촉촉한 황치즈칩이 뭔데? 🧀</h2>
      </div>
      <div class="card-body">
        <div class="info-item">
          <div class="info-marker">🏭</div>
          <div class="info-text"><span class="highlight">오리온</span>이 만든 한정판 과자예요.</div>
        </div>
        <div class="info-item">
          <div class="info-marker">📦</div>
          <div class="info-text"><span class="highlight">'치즈공방' 시리즈</span> 3종 중 하나로 출시됐어요.</div>
        </div>
        <div class="product-image">
          <img src="../product-cutout.png" alt="촉촉한 황치즈칩 패키지">
        </div>
        <div class="emphasis-box">
          <div class="label">맛 포인트</div>
          <div class="text">은은한 체다치즈 풍미 + 촉촉하고 꾸덕한 식감</div>
        </div>
      </div>
    </div>
    <span class="account-name">@요즘뭔일</span>
    <span class="page-indicator">2/6</span>
  </div>
</body>
</html>
