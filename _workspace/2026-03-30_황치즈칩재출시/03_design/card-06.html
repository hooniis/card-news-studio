<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>카드 6 — CTA</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
  <style>
    :root {
      --primary: #7C3AED;
      --primary-light: #EDE9FE;
      --primary-bg: #F5F3FF;
      --accent: #F59E0B;
      --bg-light: #F8FAFC;
      --text-dark: #1E293B;
      --text-light: #FFFFFF;
      --text-muted: #64748B;
      --font-main: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #E2E8F0;
    }

    .card {
      width: 1080px;
      height: 1080px;
      position: relative;
      overflow: hidden;
      font-family: var(--font-main);
      background: linear-gradient(160deg, #EDE9FE 0%, #DDD6FE 40%, #F5F3FF 100%);
    }

    .card-content {
      position: absolute;
      top: 80px;
      left: 80px;
      right: 80px;
      bottom: 80px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .headline {
      font-size: 54px;
      font-weight: 700;
      color: var(--text-dark);
      line-height: 1.3;
      letter-spacing: -0.02em;
      margin-bottom: 32px;
    }

    .divider {
      width: 60px;
      height: 4px;
      background: var(--primary);
      border-radius: 2px;
      margin-bottom: 40px;
    }

    .cta-button {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 24px 56px;
      background: #FFFFFF;
      color: var(--primary);
      font-size: 38px;
      font-weight: 700;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(124, 58, 237, 0.15);
      letter-spacing: -0.01em;
      margin-bottom: 48px;
    }

    .cta-button .icon {
      font-size: 34px;
    }

    .sub-text {
      font-size: 32px;
      font-weight: 400;
      color: var(--text-dark);
      line-height: 1.7;
      letter-spacing: -0.01em;
      margin-bottom: 12px;
    }

    .comment-cta {
      font-size: 34px;
      font-weight: 600;
      color: var(--primary);
      line-height: 1.5;
      letter-spacing: -0.01em;
    }

    .account-name {
      position: absolute;
      bottom: 40px;
      left: 80px;
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text-muted);
    }

    .page-indicator {
      position: absolute;
      bottom: 40px;
      right: 80px;
      font-size: 24px;
      color: var(--text-muted);
      font-weight: 500;
    }

    /* 배경 장식 */
    .bg-circle {
      position: absolute;
      border-radius: 50%;
      opacity: 0.08;
      background: var(--primary);
    }

    .bg-circle-1 {
      width: 350px;
      height: 350px;
      top: -80px;
      left: -60px;
    }

    .bg-circle-2 {
      width: 250px;
      height: 250px;
      bottom: -40px;
      right: -40px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="bg-circle bg-circle-1"></div>
    <div class="bg-circle bg-circle-2"></div>
    <div class="card-content">
      <h2 class="headline">치즈 덕후 친구한테<br>공유해주세요!</h2>
      <div class="divider"></div>
      <div class="cta-button">
        <span class="icon">💾</span>
        저장하고 공유하기
      </div>
      <div class="sub-text">도움이 됐다면 저장 & 공유 부탁해요!</div>
      <div class="comment-cta">황치즈칩 드셔보셨나요? 후기 남겨주세요 💬</div>
    </div>
    <span class="account-name">@요즘뭔일</span>
    <span class="page-indicator">6/6</span>
  </div>
</body>
</html>
