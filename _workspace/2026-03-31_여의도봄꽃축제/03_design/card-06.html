<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>카드 6 — CTA</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
  <style>
    :root {
      --primary: #DB2777;
      --primary-light: #FCE7F3;
      --accent: #059669;
      --bg-light: #F8FAFC;
      --text-dark: #1E293B;
      --text-light: #FFFFFF;
      --text-muted: #64748B;
      --font-main: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #E2E8F0;
    }

    .card {
      width: 1080px;
      height: 1080px;
      position: relative;
      overflow: hidden;
      font-family: var(--font-main);
      background: linear-gradient(160deg, #FDF2F8 0%, #FCE7F3 40%, #FBCFE8 100%);
    }

    .card-content {
      position: absolute;
      top: 80px;
      left: 80px;
      right: 80px;
      bottom: 80px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .headline {
      font-size: 54px;
      font-weight: 700;
      color: var(--text-dark);
      line-height: 1.3;
      letter-spacing: -0.02em;
      margin-bottom: 32px;
    }

    .divider {
      width: 60px;
      height: 4px;
      background: var(--primary);
      border-radius: 2px;
      margin-bottom: 40px;
    }

    .cta-button {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 24px 56px;
      background: #FFFFFF;
      color: var(--primary);
      font-size: 38px;
      font-weight: 700;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(219, 39, 119, 0.15);
      letter-spacing: -0.01em;
      margin-bottom: 48px;
    }

    .cta-button .icon {
      font-size: 34px;
    }

    .sub-text {
      font-size: 32px;
      font-weight: 400;
      color: var(--text-dark);
      line-height: 1.7;
      letter-spacing: -0.01em;
      margin-bottom: 12px;
    }

    .comment-cta {
      font-size: 34px;
      font-weight: 600;
      color: var(--primary);
      line-height: 1.5;
      letter-spacing: -0.01em;
      margin-bottom: 16px;
    }

    .follow-cta {
      font-size: 28px;
      font-weight: 500;
      color: var(--text-muted);
      line-height: 1.5;
    }

    .follow-cta .name {
      font-weight: 700;
      color: var(--primary);
    }

    .photo-credit {
      position: absolute;
      top: 40px;
      right: 80px;
      font-size: 14px;
      color: var(--text-muted);
      opacity: 0.6;
    }

    .account-name {
      position: absolute;
      bottom: 40px;
      left: 80px;
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text-muted);
    }

    .page-indicator {
      position: absolute;
      bottom: 40px;
      right: 80px;
      font-size: 24px;
      color: var(--text-muted);
      font-weight: 500;
    }

    .bg-circle {
      position: absolute;
      border-radius: 50%;
      opacity: 0.08;
      background: var(--primary);
    }
    .bg-circle-1 { width: 350px; height: 350px; top: -80px; left: -60px; }
    .bg-circle-2 { width: 250px; height: 250px; bottom: -40px; right: -40px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="bg-circle bg-circle-1"></div>
    <div class="bg-circle bg-circle-2"></div>
    <span class="photo-credit">사진=뉴스후플러스·영등포구청</span>
    <div class="card-content">
      <h2 class="headline">같이 갈 친구한테<br>공유해주세요!</h2>
      <div class="divider"></div>
      <div class="cta-button">
        <span class="icon">💾</span>
        저장하고 공유하기
      </div>
      <div class="sub-text">도움이 됐다면 저장 & 공유 부탁해요!</div>
      <div class="comment-cta">올해 벚꽃 보러 어디 가세요? 알려주세요 💬</div>
      <div class="follow-cta">매일 꿀정보 올라와요 → <span class="name">@요즘뭔일</span> 팔로우</div>
    </div>
    <span class="account-name">@요즘뭔일</span>
    <span class="page-indicator">6/6</span>
  </div>
</body>
</html>
