<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>카드 3 — 4개 테마존</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
  <style>
    :root {
      --primary: #DB2777;
      --primary-light: #FCE7F3;
      --accent: #059669;
      --bg-light: #F8FAFC;
      --text-dark: #1E293B;
      --text-muted: #64748B;
      --font-main: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #E2E8F0;
    }

    .card {
      width: 1080px;
      height: 1080px;
      position: relative;
      overflow: hidden;
      font-family: var(--font-main);
      background: var(--bg-light);
    }

    .card-content {
      position: absolute;
      top: 80px;
      left: 80px;
      right: 80px;
      bottom: 80px;
      display: flex;
      flex-direction: column;
    }

    .card-header { margin-bottom: 16px; }

    .divider {
      width: 60px;
      height: 4px;
      background: var(--primary);
      border-radius: 2px;
      margin-bottom: 24px;
    }

    .headline {
      font-size: 54px;
      font-weight: 700;
      color: var(--text-dark);
      line-height: 1.3;
      letter-spacing: -0.02em;
      margin-bottom: 12px;
    }

    .card-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 20px;
    }

    .theme-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .theme-item {
      padding: 32px 28px;
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .theme-item:nth-child(1) {
      background: linear-gradient(135deg, #FDF2F8 0%, #FCE7F3 100%);
      border: 2px solid rgba(219, 39, 119, 0.12);
    }
    .theme-item:nth-child(2) {
      background: linear-gradient(135deg, #F0FDF4 0%, #DCFCE7 100%);
      border: 2px solid rgba(5, 150, 105, 0.12);
    }
    .theme-item:nth-child(3) {
      background: linear-gradient(135deg, #EFF6FF 0%, #DBEAFE 100%);
      border: 2px solid rgba(37, 99, 235, 0.12);
    }
    .theme-item:nth-child(4) {
      background: linear-gradient(135deg, #FFFBEB 0%, #FEF3C7 100%);
      border: 2px solid rgba(245, 158, 11, 0.12);
    }

    .theme-emoji {
      font-size: 48px;
      line-height: 1;
    }

    .theme-name {
      font-size: 36px;
      font-weight: 700;
      color: var(--text-dark);
      letter-spacing: -0.02em;
    }

    .theme-item:nth-child(1) .theme-name { color: #BE185D; }
    .theme-item:nth-child(2) .theme-name { color: #047857; }
    .theme-item:nth-child(3) .theme-name { color: #1D4ED8; }
    .theme-item:nth-child(4) .theme-name { color: #B45309; }

    .theme-desc {
      font-size: 28px;
      font-weight: 400;
      color: var(--text-muted);
      line-height: 1.4;
      letter-spacing: -0.01em;
    }

    .account-name {
      position: absolute;
      bottom: 40px;
      left: 80px;
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text-muted);
    }

    .page-indicator {
      position: absolute;
      bottom: 40px;
      right: 80px;
      font-size: 24px;
      color: var(--text-muted);
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-content">
      <div class="card-header">
        <div class="divider"></div>
        <h2 class="headline">4개 테마존 총정리 🎪</h2>
      </div>
      <div class="card-body">
        <div class="theme-grid">
          <div class="theme-item">
            <div class="theme-emoji">🌸</div>
            <div class="theme-name">봄꽃존</div>
            <div class="theme-desc">포토존 + 거리 공연</div>
          </div>
          <div class="theme-item">
            <div class="theme-emoji">🛋️</div>
            <div class="theme-name">휴식존</div>
            <div class="theme-desc">캠핑 텐트 + 카페</div>
          </div>
          <div class="theme-item">
            <div class="theme-emoji">🎨</div>
            <div class="theme-name">예술존</div>
            <div class="theme-desc">공연 + 전시</div>
          </div>
          <div class="theme-item">
            <div class="theme-emoji">🍜</div>
            <div class="theme-name">미식존</div>
            <div class="theme-desc">전통시장 먹거리</div>
          </div>
        </div>
      </div>
    </div>
    <span class="account-name">@요즘뭔일</span>
    <span class="page-indicator">3/6</span>
  </div>
</body>
</html>
