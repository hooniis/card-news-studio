<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>카드 4 — 야간 운영 + 특별 이벤트</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
  <style>
    :root {
      --primary: #DB2777;
      --primary-light: #FCE7F3;
      --primary-bg: #FDF2F8;
      --accent: #059669;
      --bg-light: #F8FAFC;
      --text-dark: #1E293B;
      --text-light: #FFFFFF;
      --text-muted: #64748B;
      --font-main: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #E2E8F0;
    }

    .card {
      width: 1080px;
      height: 1080px;
      position: relative;
      overflow: hidden;
      font-family: var(--font-main);
      background: var(--bg-light);
    }

    .card-content {
      position: absolute;
      top: 80px;
      left: 80px;
      right: 80px;
      bottom: 80px;
      display: flex;
      flex-direction: column;
    }

    .card-header { margin-bottom: 16px; }

    .divider {
      width: 60px;
      height: 4px;
      background: var(--primary);
      border-radius: 2px;
      margin-bottom: 24px;
    }

    .headline {
      font-size: 54px;
      font-weight: 700;
      color: var(--text-dark);
      line-height: 1.3;
      letter-spacing: -0.02em;
      margin-bottom: 12px;
    }

    .card-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 24px;
    }

    .info-item {
      display: flex;
      align-items: flex-start;
      gap: 24px;
      padding: 0 20px;
    }

    .info-marker {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      flex-shrink: 0;
      background: var(--primary-light);
    }

    .info-text {
      font-size: 36px;
      font-weight: 400;
      color: var(--text-dark);
      line-height: 1.6;
      letter-spacing: -0.01em;
      padding-top: 8px;
    }

    .info-text .highlight {
      font-weight: 700;
      color: var(--primary);
    }

    .time-box {
      margin-top: 8px;
      padding: 32px 36px;
      background: linear-gradient(135deg, #1E1B4B 0%, #312E81 100%);
      border-radius: 16px;
      text-align: center;
    }

    .time-box .label {
      font-size: 24px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: 12px;
      letter-spacing: -0.01em;
    }

    .time-box .time {
      font-size: 64px;
      font-weight: 800;
      color: #FBBF24;
      line-height: 1.2;
      letter-spacing: -0.02em;
    }

    .time-box .sub {
      font-size: 28px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.8);
      margin-top: 8px;
    }

    .event-box {
      margin-top: 8px;
      padding: 28px 36px;
      background: linear-gradient(135deg, #EFF6FF 0%, #DBEAFE 100%);
      border-radius: 16px;
      border-left: 5px solid #2563EB;
    }

    .event-box .label {
      font-size: 24px;
      font-weight: 600;
      color: #2563EB;
      margin-bottom: 8px;
    }

    .event-box .text {
      font-size: 38px;
      font-weight: 700;
      color: var(--text-dark);
      line-height: 1.4;
      letter-spacing: -0.02em;
    }

    .event-box .text .blue {
      color: #2563EB;
    }

    .account-name {
      position: absolute;
      bottom: 40px;
      left: 80px;
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text-muted);
    }

    .page-indicator {
      position: absolute;
      bottom: 40px;
      right: 80px;
      font-size: 24px;
      color: var(--text-muted);
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-content">
      <div class="card-header">
        <div class="divider"></div>
        <h2 class="headline">퇴근 후에도 가능! 🌙</h2>
      </div>
      <div class="card-body">
        <div class="info-item">
          <div class="info-marker">🕘</div>
          <div class="info-text">문화행사·먹거리 <span class="highlight">야간 운영</span>해요.</div>
        </div>
        <div class="time-box">
          <div class="label">🌙 야간 운영 시간</div>
          <div class="time">~ 오후 9:30</div>
          <div class="sub">퇴근 후에도 충분히 즐길 수 있어요</div>
        </div>
        <div class="info-item">
          <div class="info-marker">🚶</div>
          <div class="info-text">개막일엔 <span class="highlight">꽃길걷기 퍼레이드</span>!</div>
        </div>
        <div class="event-box">
          <div class="label">✈️ 주말 특별 이벤트</div>
          <div class="text"><span class="blue">공군 특수비행팀</span> 축하 비행</div>
        </div>
      </div>
    </div>
    <span class="account-name">@요즘뭔일</span>
    <span class="page-indicator">4/6</span>
  </div>
</body>
</html>
