<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>카드 2 — 올해 뭐가 달라?</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
  <style>
    :root {
      --primary: #DB2777;
      --primary-light: #FCE7F3;
      --primary-bg: #FDF2F8;
      --accent: #059669;
      --bg-light: #F8FAFC;
      --text-dark: #1E293B;
      --text-light: #FFFFFF;
      --text-muted: #64748B;
      --font-main: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #E2E8F0;
    }

    .card {
      width: 1080px;
      height: 1080px;
      position: relative;
      overflow: hidden;
      font-family: var(--font-main);
      background: var(--bg-light);
    }

    .card-content {
      position: absolute;
      top: 80px;
      left: 80px;
      right: 80px;
      bottom: 80px;
      display: flex;
      flex-direction: column;
    }

    .card-header { margin-bottom: 16px; }

    .divider {
      width: 60px;
      height: 4px;
      background: var(--primary);
      border-radius: 2px;
      margin-bottom: 24px;
    }

    .headline {
      font-size: 54px;
      font-weight: 700;
      color: var(--text-dark);
      line-height: 1.3;
      letter-spacing: -0.02em;
      margin-bottom: 12px;
    }

    .card-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 28px;
    }

    .info-item {
      display: flex;
      align-items: flex-start;
      gap: 24px;
      padding: 0 20px;
    }

    .info-marker {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      flex-shrink: 0;
      background: var(--primary-light);
    }

    .info-text {
      font-size: 36px;
      font-weight: 400;
      color: var(--text-dark);
      line-height: 1.6;
      letter-spacing: -0.01em;
      padding-top: 8px;
    }

    .info-text .highlight {
      font-weight: 700;
      color: var(--primary);
    }

    .compare-box {
      margin-top: 16px;
      border-radius: 16px;
      overflow: hidden;
    }

    .compare-row {
      display: flex;
      align-items: center;
      padding: 28px 36px;
      gap: 20px;
    }

    .compare-row.before {
      background: #F1F5F9;
    }

    .compare-row.after {
      background: linear-gradient(135deg, var(--primary-light) 0%, #FDF2F8 100%);
      border-left: 5px solid var(--primary);
    }

    .compare-label {
      font-size: 28px;
      font-weight: 700;
      min-width: 100px;
      letter-spacing: -0.01em;
    }

    .compare-row.before .compare-label { color: var(--text-muted); }
    .compare-row.after .compare-label { color: var(--primary); }

    .compare-arrow {
      font-size: 28px;
      color: var(--text-muted);
    }

    .compare-text {
      font-size: 36px;
      font-weight: 500;
      color: var(--text-dark);
      letter-spacing: -0.01em;
    }

    .compare-row.after .compare-text {
      font-weight: 700;
    }

    .emphasis-box {
      margin-top: 8px;
      padding: 28px 36px;
      background: linear-gradient(135deg, #ECFDF5 0%, #D1FAE5 100%);
      border-radius: 16px;
      border-left: 5px solid var(--accent);
      text-align: center;
    }

    .emphasis-box .text {
      font-size: 38px;
      font-weight: 700;
      color: var(--text-dark);
      line-height: 1.4;
      letter-spacing: -0.02em;
    }

    .emphasis-box .text .accent {
      color: var(--accent);
    }

    .account-name {
      position: absolute;
      bottom: 40px;
      left: 80px;
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text-muted);
    }

    .page-indicator {
      position: absolute;
      bottom: 40px;
      right: 80px;
      font-size: 24px;
      color: var(--text-muted);
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-content">
      <div class="card-header">
        <div class="divider"></div>
        <h2 class="headline">올해는 뭐가 달라요? 🔄</h2>
      </div>
      <div class="card-body">
        <div class="info-item">
          <div class="info-marker">👀</div>
          <div class="info-text">그냥 구경만 하는 축제가 아니에요.</div>
        </div>
        <div class="compare-box">
          <div class="compare-row before">
            <div class="compare-label">기존</div>
            <div class="compare-arrow">→</div>
            <div class="compare-text">관람 위주 축제</div>
          </div>
          <div class="compare-row after">
            <div class="compare-label">올해</div>
            <div class="compare-arrow">→</div>
            <div class="compare-text">체류형·체험형 콘텐츠</div>
          </div>
        </div>
        <div class="emphasis-box">
          <div class="text"><span class="accent">도심형 축제 모델</span>로 업그레이드!</div>
        </div>
      </div>
    </div>
    <span class="account-name">@요즘뭔일</span>
    <span class="page-indicator">2/6</span>
  </div>
</body>
</html>
