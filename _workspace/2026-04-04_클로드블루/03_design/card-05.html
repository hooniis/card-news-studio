<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>카드 5 — 시사점</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
  <style>
    :root {
      --primary: #2563EB;
      --primary-light: #DBEAFE;
      --bg-light: #F8FAFC;
      --text-dark: #1E293B;
      --text-light: #FFFFFF;
      --text-muted: #64748B;
      --font-main: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #E2E8F0; }
    .card {
      width: 1080px; height: 1080px; position: relative; overflow: hidden;
      font-family: var(--font-main); background: var(--bg-light);
    }
    .card-content { position: absolute; top: 100px; left: 100px; right: 100px; bottom: 100px; display: flex; flex-direction: column; }
    .card-header { margin-bottom: 16px; }
    .divider { width: 60px; height: 4px; background: var(--primary); border-radius: 2px; margin-bottom: 24px; }
    .headline { font-size: 54px; font-weight: 700; color: var(--text-dark); line-height: 1.3; letter-spacing: -0.02em; }
    .card-body { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 14px; }
    .quote-card {
      padding: 28px 36px; border-radius: 16px;
      background: linear-gradient(135deg, #1E293B 0%, #334155 100%);
      text-align: center;
    }
    .quote-card .text { font-size: 38px; font-weight: 700; color: var(--text-light); line-height: 1.4; font-style: italic; letter-spacing: -0.01em; }
    .quote-card .text .highlight { color: #60A5FA; }
    .quote-card .source { font-size: 24px; font-weight: 400; color: rgba(255,255,255,0.5); margin-top: 12px; }
    .insight-item {
      display: flex; align-items: center; gap: 20px;
      padding: 20px 28px; border-radius: 16px;
    }
    .insight-item:nth-child(2) { background: #EDE9FE; border-left: 5px solid #7C3AED; }
    .insight-item:nth-child(3) { background: #FEE2E2; border-left: 5px solid #DC2626; }
    .insight-item:nth-child(4) { background: #DBEAFE; border-left: 5px solid #2563EB; }
    .insight-icon { font-size: 36px; flex-shrink: 0; }
    .insight-text { font-size: 34px; font-weight: 500; color: var(--text-dark); line-height: 1.4; letter-spacing: -0.01em; }
    .insight-text .purple { font-weight: 700; color: #7C3AED; }
    .insight-text .red { font-weight: 700; color: #DC2626; }
    .insight-text .blue { font-weight: 700; color: var(--primary); }
    .takeaway-box {
      padding: 24px 36px; border-radius: 16px;
      background: var(--primary); text-align: center;
    }
    .takeaway-box .text { font-size: 36px; font-weight: 700; color: var(--text-light); line-height: 1.4; }
    .takeaway-box .text .yellow { color: #FDE68A; }
    .account-name { position: absolute; bottom: 50px; left: 100px; font-size: 18px; font-weight: 600; letter-spacing: -0.02em; color: var(--text-muted); }
    .page-indicator { position: absolute; bottom: 50px; right: 100px; font-size: 24px; color: var(--text-muted); font-weight: 500; }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-content">
      <div class="card-header">
        <div class="divider"></div>
        <h2 class="headline">AI와의 미래, 정말 장밋빛일까 🤔</h2>
      </div>
      <div class="card-body">
        <div class="quote-card">
          <div class="text">"사람은 <span class="highlight">잠을 자야 하기 때문에</span><br>업무에 병목 현상이 생긴다"</div>
          <div class="source">— 실리콘밸리 엔지니어의 고백</div>
        </div>
        <div class="insight-item">
          <div class="insight-icon">🧪</div>
          <div class="insight-text">실리콘밸리는 AI 미래 사회의<br><span class="purple">시험 무대</span></div>
        </div>
        <div class="insight-item">
          <div class="insight-icon">⚠️</div>
          <div class="insight-text"><span class="red">GTC의 낙관론</span>과<br>현실의 간극은 점점 커지는 중</div>
        </div>
        <div class="insight-item">
          <div class="insight-icon">🔄</div>
          <div class="insight-text">AI 개발자조차 <span class="blue">우울해하는 현실</span>은<br>심각한 경고 신호</div>
        </div>
        <div class="takeaway-box">
          <div class="text">고속 성장에는 반드시 <span class="yellow">부작용</span>이 따른다<br>AI도 예외일 수 없다</div>
        </div>
      </div>
    </div>
    <span class="account-name">@요즘뭔일</span>
    <span class="page-indicator">5/6</span>
  </div>
</body>
</html>
