<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>카드 3 — 실리콘밸리 현실</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
  <style>
    :root {
      --primary: #2563EB;
      --primary-light: #DBEAFE;
      --bg-light: #F8FAFC;
      --text-dark: #1E293B;
      --text-light: #FFFFFF;
      --text-muted: #64748B;
      --font-main: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #E2E8F0; }
    .card {
      width: 1080px; height: 1080px; position: relative; overflow: hidden;
      font-family: var(--font-main); background: var(--bg-light);
    }
    .card-content { position: absolute; top: 100px; left: 100px; right: 100px; bottom: 100px; display: flex; flex-direction: column; }
    .card-header { margin-bottom: 16px; }
    .divider { width: 60px; height: 4px; background: var(--primary); border-radius: 2px; margin-bottom: 24px; }
    .headline { font-size: 54px; font-weight: 700; color: var(--text-dark); line-height: 1.3; letter-spacing: -0.02em; }
    .card-body { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 12px; }
    .reality-item {
      display: flex; align-items: center; gap: 20px;
      padding: 20px 28px; border-radius: 16px;
    }
    .reality-item:nth-child(1) { background: #EDE9FE; border-left: 5px solid #7C3AED; }
    .reality-item:nth-child(2) { background: #DBEAFE; border-left: 5px solid #2563EB; }
    .reality-item:nth-child(3) { background: #FEE2E2; border-left: 5px solid #DC2626; }
    .reality-item:nth-child(4) { background: #FEF3C7; border-left: 5px solid #B45309; }
    .reality-icon { font-size: 36px; flex-shrink: 0; }
    .reality-text { font-size: 34px; font-weight: 500; color: var(--text-dark); line-height: 1.4; letter-spacing: -0.01em; }
    .reality-text .purple { font-weight: 700; color: #7C3AED; }
    .reality-text .blue { font-weight: 700; color: var(--primary); }
    .reality-text .red { font-weight: 700; color: #DC2626; }
    .reality-text .amber { font-weight: 700; color: #B45309; }
    .quote-box {
      margin-top: 4px; padding: 24px 36px; border-radius: 16px;
      background: linear-gradient(135deg, #1E293B 0%, #334155 100%);
      text-align: center;
    }
    .quote-box .text { font-size: 34px; font-weight: 600; color: var(--text-light); line-height: 1.5; font-style: italic; }
    .quote-box .source { font-size: 24px; font-weight: 400; color: rgba(255,255,255,0.5); margin-top: 8px; }
    .account-name { position: absolute; bottom: 50px; left: 100px; font-size: 18px; font-weight: 600; letter-spacing: -0.02em; color: var(--text-muted); }
    .page-indicator { position: absolute; bottom: 50px; right: 100px; font-size: 24px; color: var(--text-muted); font-weight: 500; }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-content">
      <div class="card-header">
        <div class="divider"></div>
        <h2 class="headline">지금 실리콘밸리는 이렇다 😶</h2>
      </div>
      <div class="card-body">
        <div class="reality-item">
          <div class="reality-icon">⏰</div>
          <div class="reality-text">엔지니어들 <span class="purple">24시간·주7일</span><br>'007 근무'로 내몰리는 중</div>
        </div>
        <div class="reality-item">
          <div class="reality-icon">📚</div>
          <div class="reality-text">독서·영화 모임이 전부<br><span class="blue">바이브 코딩 스터디</span>로 변함</div>
        </div>
        <div class="reality-item">
          <div class="reality-icon">🔥</div>
          <div class="reality-text">빅테크, <span class="red">AI 못 쓰는 직원</span><br>바로 해고하는 분위기</div>
        </div>
        <div class="reality-item">
          <div class="reality-icon">🏋️</div>
          <div class="reality-text">관심사는 오직 일, 운동, 보조제<br><span class="amber">몸도 생산성 도구</span>로 전락</div>
        </div>
        <div class="quote-box">
          <div class="text">"실리콘밸리의 시간은<br>외부보다 2~3배 빨리 흐른다"</div>
          <div class="source">— 실리콘밸리 스타트업 직원</div>
        </div>
      </div>
    </div>
    <span class="account-name">@요즘뭔일</span>
    <span class="page-indicator">3/6</span>
  </div>
</body>
</html>
