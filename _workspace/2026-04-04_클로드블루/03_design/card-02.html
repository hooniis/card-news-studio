<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>카드 2 — 클로드 블루란</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
  <style>
    :root {
      --primary: #2563EB;
      --primary-light: #DBEAFE;
      --bg-light: #F8FAFC;
      --text-dark: #1E293B;
      --text-light: #FFFFFF;
      --text-muted: #64748B;
      --font-main: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #E2E8F0; }
    .card {
      width: 1080px; height: 1080px; position: relative; overflow: hidden;
      font-family: var(--font-main); background: var(--bg-light);
    }
    .card-content { position: absolute; top: 100px; left: 100px; right: 100px; bottom: 100px; display: flex; flex-direction: column; }
    .card-header { margin-bottom: 20px; }
    .divider { width: 60px; height: 4px; background: var(--primary); border-radius: 2px; margin-bottom: 24px; }
    .headline { font-size: 54px; font-weight: 700; color: var(--text-dark); line-height: 1.3; letter-spacing: -0.02em; }
    .card-body { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 28px; }
    .term-box {
      padding: 36px 40px; border-radius: 16px; text-align: center;
      background: linear-gradient(135deg, #1E293B 0%, #334155 100%);
    }
    .term-box .english { font-size: 52px; font-weight: 800; color: #60A5FA; margin-bottom: 8px; letter-spacing: 0.02em; }
    .term-box .korean { font-size: 36px; font-weight: 500; color: rgba(255,255,255,0.7); }
    .def-item {
      display: flex; align-items: flex-start; gap: 20px;
      padding: 28px 28px; border-radius: 16px;
    }
    .def-item:nth-child(2) { background: var(--primary-light); border: 2px solid rgba(37,99,235,0.12); }
    .def-item:nth-child(3) { background: #FEF3C7; border: 2px solid rgba(180,83,9,0.12); }
    .def-item:nth-child(4) { background: #FEE2E2; border: 2px solid rgba(220,38,38,0.1); }
    .def-icon {
      width: 52px; height: 52px; border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 26px; flex-shrink: 0;
    }
    .def-item:nth-child(2) .def-icon { background: var(--primary); color: white; }
    .def-item:nth-child(3) .def-icon { background: #B45309; color: white; }
    .def-item:nth-child(4) .def-icon { background: #DC2626; color: white; }
    .def-text { font-size: 36px; font-weight: 500; color: var(--text-dark); line-height: 1.5; letter-spacing: -0.01em; }
    .def-text .blue { font-weight: 700; color: var(--primary); }
    .def-text .amber { font-weight: 700; color: #B45309; }
    .def-text .red { font-weight: 700; color: #DC2626; }
    .account-name { position: absolute; bottom: 50px; left: 100px; font-size: 18px; font-weight: 600; letter-spacing: -0.02em; color: var(--text-muted); }
    .page-indicator { position: absolute; bottom: 50px; right: 100px; font-size: 24px; color: var(--text-muted); font-weight: 500; }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-content">
      <div class="card-header">
        <div class="divider"></div>
        <h2 class="headline">'클로드 블루'가 뭔데? 🤖</h2>
      </div>
      <div class="card-body">
        <div class="term-box">
          <div class="english">Claude Blue</div>
          <div class="korean">AI가 만든 우울증이라는 뜻의 신조어</div>
        </div>
        <div class="def-item">
          <div class="def-icon">🤖</div>
          <div class="def-text">앤스로픽의 AI <span class="blue">'클로드(Claude)'</span>에서<br>따온 이름</div>
        </div>
        <div class="def-item">
          <div class="def-icon">😰</div>
          <div class="def-text">AI 때문에 <span class="amber">일자리를 잃는</span><br>개발자들의 무력감·우울</div>
        </div>
        <div class="def-item">
          <div class="def-icon">💔</div>
          <div class="def-text"><span class="red">내가 만든 AI</span>에 의해<br>내가 대체되는 아이러니</div>
        </div>
      </div>
    </div>
    <span class="account-name">@요즘뭔일</span>
    <span class="page-indicator">2/6</span>
  </div>
</body>
</html>
