<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>카드 4 — 고용 충격</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
  <style>
    :root {
      --primary: #2563EB;
      --bg-light: #F8FAFC;
      --text-dark: #1E293B;
      --text-light: #FFFFFF;
      --text-muted: #64748B;
      --font-main: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #E2E8F0; }
    .card {
      width: 1080px; height: 1080px; position: relative; overflow: hidden;
      font-family: var(--font-main); background: var(--bg-light);
    }
    .card-content { position: absolute; top: 100px; left: 100px; right: 100px; bottom: 100px; display: flex; flex-direction: column; }
    .card-header { margin-bottom: 16px; }
    .divider { width: 60px; height: 4px; background: var(--primary); border-radius: 2px; margin-bottom: 24px; }
    .headline { font-size: 54px; font-weight: 700; color: var(--text-dark); line-height: 1.3; letter-spacing: -0.02em; }
    .card-body { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 20px; }
    .contrast-row { display: flex; gap: 16px; }
    .contrast-box {
      flex: 1; padding: 32px 24px; border-radius: 16px; text-align: center;
    }
    .contrast-box.elite {
      background: linear-gradient(135deg, #DCFCE7 0%, #F0FDF4 100%);
      border: 2px solid rgba(5,150,105,0.15);
    }
    .contrast-box.normal {
      background: linear-gradient(135deg, #FEE2E2 0%, #FEF2F2 100%);
      border: 2px solid rgba(220,38,38,0.15);
    }
    .contrast-box .label { font-size: 28px; font-weight: 500; color: var(--text-muted); margin-bottom: 12px; }
    .contrast-box .value { font-size: 44px; font-weight: 800; letter-spacing: -0.02em; }
    .contrast-box.elite .value { color: #059669; }
    .contrast-box.normal .value { color: #DC2626; }
    .contrast-box .sub { font-size: 26px; font-weight: 400; color: var(--text-muted); margin-top: 8px; }
    .impact-item {
      display: flex; align-items: center; gap: 20px;
      padding: 26px 28px; border-radius: 16px;
    }
    .impact-item:nth-child(2) { background: #DBEAFE; border: 2px solid rgba(37,99,235,0.1); }
    .impact-item:nth-child(3) { background: #FEF3C7; border: 2px solid rgba(180,83,9,0.1); }
    .impact-icon { font-size: 36px; flex-shrink: 0; }
    .impact-text { font-size: 36px; font-weight: 500; color: var(--text-dark); line-height: 1.5; letter-spacing: -0.01em; }
    .impact-text .blue { font-weight: 700; color: var(--primary); }
    .impact-text .amber { font-weight: 700; color: #B45309; }
    .bottom-box {
      padding: 24px 32px; border-radius: 16px;
      background: #DC2626; text-align: center;
    }
    .bottom-box .text { font-size: 36px; font-weight: 700; color: var(--text-light); line-height: 1.4; }
    .bottom-box .text .yellow { color: #FDE68A; }
    .account-name { position: absolute; bottom: 50px; left: 100px; font-size: 18px; font-weight: 600; letter-spacing: -0.02em; color: var(--text-muted); }
    .page-indicator { position: absolute; bottom: 50px; right: 100px; font-size: 24px; color: var(--text-muted); font-weight: 500; }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-content">
      <div class="card-header">
        <div class="divider"></div>
        <h2 class="headline">AI 시대, 개발자 양극화 📉</h2>
      </div>
      <div class="card-body">
        <div class="contrast-row">
          <div class="contrast-box elite">
            <div class="label">극소수 AI 인재</div>
            <div class="value">수천억 원</div>
            <div class="sub">연봉 제안</div>
          </div>
          <div class="contrast-box normal">
            <div class="label">일반 엔지니어</div>
            <div class="value">자괴감</div>
            <div class="sub">대체 불안</div>
          </div>
        </div>
        <div class="impact-item">
          <div class="impact-icon">🎓</div>
          <div class="impact-text"><span class="blue">스탠퍼드 졸업생</span>도 취업난<br>하위권 대학은 더 밀려남</div>
        </div>
        <div class="impact-item">
          <div class="impact-icon">🎭</div>
          <div class="impact-text">공연장마저 <span class="amber">AI 전망 행사</span>로<br>문화 생활 자체가 사라지는 중</div>
        </div>
        <div class="bottom-box">
          <div class="text">"<span class="yellow">스탠퍼드가 물을 흐린다</span>"<br>— 실리콘밸리 구직 시장의 현실</div>
        </div>
      </div>
    </div>
    <span class="account-name">@요즘뭔일</span>
    <span class="page-indicator">4/6</span>
  </div>
</body>
</html>
