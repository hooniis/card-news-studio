<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>카드 3 — 그동안은 어땠냐면요</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
  <style>
    :root {
      --primary: #DC2626;
      --primary-light: #FEE2E2;
      --primary-bg: #FFF5F5;
      --accent: #F59E0B;
      --accent-light: #FEF3C7;
      --bg-light: #F8FAFC;
      --text-dark: #1E293B;
      --text-light: #FFFFFF;
      --text-muted: #64748B;
      --font-main: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #E2E8F0;
    }

    .card {
      width: 1080px;
      height: 1080px;
      position: relative;
      overflow: hidden;
      font-family: var(--font-main);
      background: var(--bg-light);
    }

    .card-content {
      position: absolute;
      top: 80px;
      left: 80px;
      right: 80px;
      bottom: 80px;
      display: flex;
      flex-direction: column;
    }

    .card-header {
      margin-bottom: 16px;
    }

    .divider {
      width: 60px;
      height: 4px;
      background: var(--primary);
      border-radius: 2px;
      margin-bottom: 24px;
    }

    .headline {
      font-size: 54px;
      font-weight: 700;
      color: var(--text-dark);
      line-height: 1.3;
      letter-spacing: -0.02em;
    }

    .card-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 24px;
    }

    .context-box {
      padding: 28px 36px;
      background: var(--accent-light);
      border-radius: 16px;
      border-left: 6px solid var(--accent);
    }

    .context-box .text {
      font-size: 36px;
      font-weight: 400;
      color: var(--text-dark);
      line-height: 1.6;
      letter-spacing: -0.01em;
    }

    .context-box .text .highlight {
      font-weight: 700;
      color: var(--accent);
    }

    .comparison {
      display: flex;
      gap: 20px;
      margin-top: 8px;
    }

    .comparison-item {
      flex: 1;
      padding: 32px 28px;
      border-radius: 16px;
      text-align: center;
    }

    .comparison-item.positive {
      background: #F0FDF4;
      border: 2px solid #BBF7D0;
    }

    .comparison-item.negative {
      background: var(--primary-bg);
      border: 2px solid #FECACA;
    }

    .comparison-item .emoji {
      font-size: 48px;
      display: block;
      margin-bottom: 16px;
    }

    .comparison-item .label {
      font-size: 30px;
      font-weight: 700;
      margin-bottom: 12px;
      letter-spacing: -0.01em;
    }

    .comparison-item.positive .label {
      color: #16A34A;
    }

    .comparison-item.negative .label {
      color: var(--primary);
    }

    .comparison-item .desc {
      font-size: 28px;
      font-weight: 400;
      color: var(--text-muted);
      line-height: 1.5;
    }

    .account-name {
      position: absolute;
      bottom: 40px;
      left: 80px;
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text-muted);
    }

    .page-indicator {
      position: absolute;
      bottom: 40px;
      right: 80px;
      font-size: 24px;
      color: var(--text-muted);
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-content">
      <div class="card-header">
        <div class="divider"></div>
        <h2 class="headline">그동안은 어땠냐면요</h2>
      </div>
      <div class="card-body">
        <div class="context-box">
          <div class="text">
            1994년부터 유급휴일이었지만<br>
            회사 다니는 <span class="highlight">근로자만 해당</span>됐어요.
          </div>
        </div>
        <div class="comparison">
          <div class="comparison-item positive">
            <span class="emoji">⭕</span>
            <div class="label">쉬는 사람</div>
            <div class="desc">회사원<br>(근로기준법 적용)</div>
          </div>
          <div class="comparison-item negative">
            <span class="emoji">❌</span>
            <div class="label">못 쉬는 사람</div>
            <div class="desc">공무원, 교사<br>택배 기사 등</div>
          </div>
        </div>
      </div>
    </div>
    <span class="account-name">@요즘뭔일</span>
    <span class="page-indicator">3/7</span>
  </div>
</body>
</html>
