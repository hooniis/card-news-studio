<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>카드 5 — 언제부터 적용되나요?</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
  <style>
    :root {
      --primary: #DC2626;
      --primary-light: #FEE2E2;
      --primary-bg: #FFF5F5;
      --accent: #F59E0B;
      --accent-light: #FEF3C7;
      --bg-light: #F8FAFC;
      --text-dark: #1E293B;
      --text-light: #FFFFFF;
      --text-muted: #64748B;
      --font-main: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #E2E8F0;
    }

    .card {
      width: 1080px;
      height: 1080px;
      position: relative;
      overflow: hidden;
      font-family: var(--font-main);
      background: var(--bg-light);
    }

    .card-content {
      position: absolute;
      top: 80px;
      left: 80px;
      right: 80px;
      bottom: 80px;
      display: flex;
      flex-direction: column;
    }

    .card-header {
      margin-bottom: 16px;
    }

    .divider {
      width: 60px;
      height: 4px;
      background: var(--primary);
      border-radius: 2px;
      margin-bottom: 24px;
    }

    .headline {
      font-size: 54px;
      font-weight: 700;
      color: var(--text-dark);
      line-height: 1.3;
      letter-spacing: -0.02em;
    }

    .card-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 0;
    }

    /* 타임라인 스텝 */
    .timeline {
      display: flex;
      flex-direction: column;
      gap: 0;
      padding: 0 20px;
    }

    .timeline-step {
      display: flex;
      align-items: center;
      gap: 24px;
      padding: 20px 0;
    }

    .step-dot {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 24px;
      font-weight: 800;
      color: var(--text-light);
      background: #CBD5E1;
    }

    .step-dot.done {
      background: var(--primary);
    }

    .step-dot.current {
      background: var(--primary);
      box-shadow: 0 0 0 6px rgba(220, 38, 38, 0.2);
    }

    .step-dot.pending {
      background: #CBD5E1;
    }

    .step-info {
      flex: 1;
    }

    .step-label {
      font-size: 34px;
      font-weight: 600;
      color: var(--text-dark);
      letter-spacing: -0.01em;
      margin-bottom: 2px;
    }

    .step-label.muted {
      color: var(--text-muted);
    }

    .step-status {
      font-size: 24px;
      font-weight: 500;
      color: var(--text-muted);
    }

    .step-status.active {
      color: var(--primary);
      font-weight: 700;
    }

    .timeline-connector {
      display: flex;
      padding-left: 26px;
      height: 20px;
    }

    .timeline-connector .line {
      width: 4px;
      height: 100%;
      background: #E2E8F0;
      border-radius: 2px;
    }

    .timeline-connector .line.filled {
      background: var(--primary);
      opacity: 0.4;
    }

    /* 하단 뱃지 */
    .badge-area {
      margin-top: 36px;
      display: flex;
      justify-content: center;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 16px 36px;
      background: var(--accent-light);
      border: 2px solid var(--accent);
      border-radius: 40px;
      font-size: 32px;
      font-weight: 700;
      color: #92400E;
      letter-spacing: -0.01em;
    }

    .badge .emoji {
      font-size: 28px;
    }

    .account-name {
      position: absolute;
      bottom: 40px;
      left: 80px;
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text-muted);
    }

    .page-indicator {
      position: absolute;
      bottom: 40px;
      right: 80px;
      font-size: 24px;
      color: var(--text-muted);
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-content">
      <div class="card-header">
        <div class="divider"></div>
        <h2 class="headline">언제부터 적용되나요?</h2>
      </div>
      <div class="card-body">
        <div class="timeline">
          <div class="timeline-step">
            <div class="step-dot done">1</div>
            <div class="step-info">
              <div class="step-label">법사위 통과</div>
              <div class="step-status active">완료</div>
            </div>
          </div>
          <div class="timeline-connector"><div class="line filled"></div></div>
          <div class="timeline-step">
            <div class="step-dot current">2</div>
            <div class="step-info">
              <div class="step-label">본회의 의결</div>
              <div class="step-status active">남은 절차</div>
            </div>
          </div>
          <div class="timeline-connector"><div class="line"></div></div>
          <div class="timeline-step">
            <div class="step-dot pending">3</div>
            <div class="step-info">
              <div class="step-label muted">국무회의 의결</div>
              <div class="step-status">대기</div>
            </div>
          </div>
          <div class="timeline-connector"><div class="line"></div></div>
          <div class="timeline-step">
            <div class="step-dot pending">4</div>
            <div class="step-info">
              <div class="step-label muted">공포 · 시행</div>
              <div class="step-status">대기</div>
            </div>
          </div>
        </div>
        <div class="badge-area">
          <div class="badge">
            <span class="emoji">🎉</span>
            이르면 올해 노동절부터!
          </div>
        </div>
      </div>
    </div>
    <span class="account-name">@요즘뭔일</span>
    <span class="page-indicator">5/7</span>
  </div>
</body>
</html>
