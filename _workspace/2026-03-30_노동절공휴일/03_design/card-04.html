<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>카드 4 — 이제는 전 국민이 쉬어요</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
  <style>
    :root {
      --primary: #DC2626;
      --primary-light: #FEE2E2;
      --primary-bg: #FFF5F5;
      --accent: #F59E0B;
      --bg-light: #F8FAFC;
      --text-dark: #1E293B;
      --text-light: #FFFFFF;
      --text-muted: #64748B;
      --font-main: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #E2E8F0;
    }

    .card {
      width: 1080px;
      height: 1080px;
      position: relative;
      overflow: hidden;
      font-family: var(--font-main);
      background: var(--bg-light);
    }

    .card-content {
      position: absolute;
      top: 80px;
      left: 80px;
      right: 80px;
      bottom: 80px;
      display: flex;
      flex-direction: column;
    }

    .card-header {
      margin-bottom: 16px;
    }

    .divider {
      width: 60px;
      height: 4px;
      background: var(--primary);
      border-radius: 2px;
      margin-bottom: 24px;
    }

    .headline {
      font-size: 54px;
      font-weight: 700;
      color: var(--text-dark);
      line-height: 1.3;
      letter-spacing: -0.02em;
    }

    .headline .emphasis {
      color: var(--primary);
    }

    .card-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 28px;
    }

    .intro-text {
      font-size: 36px;
      font-weight: 400;
      color: var(--text-dark);
      line-height: 1.6;
      letter-spacing: -0.01em;
      padding: 24px 32px;
      background: var(--primary-bg);
      border-radius: 16px;
    }

    .intro-text .highlight {
      font-weight: 700;
      color: var(--primary);
    }

    .checklist {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .check-item {
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 28px 32px;
      background: #FFFFFF;
      border-radius: 16px;
      border: 2px solid #E2E8F0;
    }

    .check-icon {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .check-icon svg {
      width: 28px;
      height: 28px;
      color: #FFFFFF;
    }

    .check-text {
      font-size: 36px;
      font-weight: 600;
      color: var(--text-dark);
      letter-spacing: -0.01em;
    }

    .account-name {
      position: absolute;
      bottom: 40px;
      left: 80px;
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text-muted);
    }

    .page-indicator {
      position: absolute;
      bottom: 40px;
      right: 80px;
      font-size: 24px;
      color: var(--text-muted);
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-content">
      <div class="card-header">
        <div class="divider"></div>
        <h2 class="headline">이제는 <span class="emphasis">전 국민</span>이 쉬어요</h2>
      </div>
      <div class="card-body">
        <div class="intro-text">
          법정 공휴일이 되면<br>
          <span class="highlight">모두</span> 쉴 수 있게 돼요.
        </div>
        <div class="checklist">
          <div class="check-item">
            <div class="check-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
            </div>
            <span class="check-text">공무원</span>
          </div>
          <div class="check-item">
            <div class="check-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
            </div>
            <span class="check-text">교사</span>
          </div>
          <div class="check-item">
            <div class="check-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
            </div>
            <span class="check-text">특수고용직 (택배 기사 등)</span>
          </div>
        </div>
      </div>
    </div>
    <span class="account-name">@요즘뭔일</span>
    <span class="page-indicator">4/7</span>
  </div>
</body>
</html>
