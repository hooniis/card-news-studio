<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>카드 6 — 함께 통과된 법안</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
  <style>
    :root {
      --primary: #DC2626;
      --primary-light: #FEE2E2;
      --primary-bg: #FFF5F5;
      --accent: #F59E0B;
      --bg-light: #F8FAFC;
      --text-dark: #1E293B;
      --text-light: #FFFFFF;
      --text-muted: #64748B;
      --font-main: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #E2E8F0;
    }

    .card {
      width: 1080px;
      height: 1080px;
      position: relative;
      overflow: hidden;
      font-family: var(--font-main);
      background: var(--bg-light);
    }

    .card-content {
      position: absolute;
      top: 80px;
      left: 80px;
      right: 80px;
      bottom: 80px;
      display: flex;
      flex-direction: column;
    }

    .card-header {
      margin-bottom: 16px;
    }

    .divider {
      width: 60px;
      height: 4px;
      background: var(--primary);
      border-radius: 2px;
      margin-bottom: 24px;
    }

    .headline {
      font-size: 54px;
      font-weight: 700;
      color: var(--text-dark);
      line-height: 1.3;
      letter-spacing: -0.02em;
    }

    .card-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 20px;
    }

    .bill-card {
      display: flex;
      align-items: center;
      gap: 24px;
      padding: 32px 36px;
      background: #FFFFFF;
      border-radius: 16px;
      border: 2px solid #E2E8F0;
    }

    .bill-card:first-child {
      border-color: var(--primary-light);
      background: var(--primary-bg);
    }

    .bill-number {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: 800;
      flex-shrink: 0;
      color: var(--text-light);
      background: #CBD5E1;
    }

    .bill-card:first-child .bill-number {
      background: var(--primary);
    }

    .bill-info {
      flex: 1;
    }

    .bill-title {
      font-size: 34px;
      font-weight: 600;
      color: var(--text-dark);
      letter-spacing: -0.01em;
      margin-bottom: 4px;
    }

    .bill-card:first-child .bill-title {
      color: var(--primary);
      font-weight: 700;
    }

    .bill-desc {
      font-size: 26px;
      font-weight: 400;
      color: var(--text-muted);
      letter-spacing: -0.01em;
    }

    .sub-note {
      margin-top: 12px;
      padding: 20px 28px;
      background: #F1F5F9;
      border-radius: 12px;
      font-size: 28px;
      font-weight: 400;
      color: var(--text-muted);
      line-height: 1.5;
      text-align: center;
      letter-spacing: -0.01em;
    }

    .account-name {
      position: absolute;
      bottom: 40px;
      left: 80px;
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text-muted);
    }

    .page-indicator {
      position: absolute;
      bottom: 40px;
      right: 80px;
      font-size: 24px;
      color: var(--text-muted);
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-content">
      <div class="card-header">
        <div class="divider"></div>
        <h2 class="headline">함께 통과된 법안도 있어요</h2>
      </div>
      <div class="card-body">
        <div class="bill-card">
          <div class="bill-number">1</div>
          <div class="bill-info">
            <div class="bill-title">민주유공자 예우법</div>
            <div class="bill-desc">민주화 유공자 예우 및 지원</div>
          </div>
        </div>
        <div class="bill-card">
          <div class="bill-number">2</div>
          <div class="bill-info">
            <div class="bill-title">전북특별자치도 특별법 개정안</div>
            <div class="bill-desc">전북 자치권 강화</div>
          </div>
        </div>
        <div class="bill-card">
          <div class="bill-number">3</div>
          <div class="bill-info">
            <div class="bill-title">강원특별자치도 특별법 개정안</div>
            <div class="bill-desc">강원 자치권 강화</div>
          </div>
        </div>
        <div class="sub-note">
          노동절 공휴일 지정과 함께 법사위를 통과했어요
        </div>
      </div>
    </div>
    <span class="account-name">@요즘뭔일</span>
    <span class="page-indicator">6/7</span>
  </div>
</body>
</html>
