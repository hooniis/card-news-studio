<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>카드 5 - 본문</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
  <style>
    :root {
      --primary: #00704A;
      --secondary: #E03131;
      --accent: #FFF8F0;
      --text-dark: #1A1A2E;
      --highlight: #FFD43B;
      --font-main: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #E2E8F0;
    }

    .card {
      width: 1080px;
      height: 1080px;
      position: relative;
      overflow: hidden;
      font-family: var(--font-main);
      background: var(--accent);
    }

    .card-content {
      position: absolute;
      top: 80px;
      left: 80px;
      right: 80px;
      bottom: 80px;
      display: flex;
      flex-direction: column;
    }

    .card-header {
      margin-bottom: 48px;
    }

    .title {
      font-size: 56px;
      font-weight: 700;
      color: var(--text-dark);
      line-height: 1.3;
      letter-spacing: -0.02em;
    }

    .divider {
      width: 60px;
      height: 4px;
      background: var(--primary);
      border-radius: 2px;
      margin-top: 24px;
    }

    .card-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 28px;
    }

    .checklist-item {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      font-size: 38px;
      font-weight: 400;
      color: var(--text-dark);
      line-height: 1.6;
    }

    .checklist-item .check {
      font-size: 38px;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .checklist-item strong {
      font-weight: 700;
    }

    .highlight-box {
      background: linear-gradient(135deg, var(--primary) 0%, #005c3c 100%);
      color: #FFFFFF;
      padding: 32px 36px;
      border-radius: 16px;
      text-align: center;
      margin-top: 24px;
    }

    .highlight-box .date {
      font-size: 52px;
      font-weight: 800;
      line-height: 1.2;
    }

    .highlight-box .date .yellow {
      color: var(--highlight);
    }

    .highlight-box .label {
      font-size: 30px;
      font-weight: 400;
      margin-top: 8px;
      opacity: 0.9;
    }

    .account-name {
      position: absolute;
      bottom: 40px;
      left: 80px;
      font-size: 18px;
      font-weight: 600;
      color: #64748B;
      letter-spacing: -0.02em;
    }

    .page-indicator {
      position: absolute;
      bottom: 40px;
      right: 80px;
      font-size: 24px;
      font-weight: 500;
      color: #64748B;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-content">
      <div class="card-header">
        <h2 class="title">언제부터 살 수 있어? 📅</h2>
        <div class="divider"></div>
      </div>
      <div class="card-body">
        <div class="checklist-item">
          <span class="check">✅</span>
          <span><strong>출시일:</strong> 3월 27일부터 순차 출시</span>
        </div>
        <div class="checklist-item">
          <span class="check">✅</span>
          <span><strong>구매처:</strong> 전국 스타벅스 매장</span>
        </div>
        <div class="checklist-item">
          <span class="check">✅</span>
          <span>한정판이라 서두르세요!</span>
        </div>
        <div class="highlight-box">
          <div class="date"><span class="yellow">3월 27일</span> 순차 출시</div>
          <div class="label">전국 스타벅스 매장에서 만나요</div>
        </div>
      </div>
    </div>
    <span class="account-name">@요즘뭔일</span>
    <span class="page-indicator">6/7</span>
  </div>
</body>
</html>
