<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>카드 1 - 커버</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
  <style>
    :root {
      --primary: #00704A;
      --secondary: #E03131;
      --accent: #FFF8F0;
      --text-dark: #1A1A2E;
      --highlight: #FFD43B;
      --font-main: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #E2E8F0;
    }

    .card {
      width: 1080px;
      height: 1080px;
      position: relative;
      overflow: hidden;
      font-family: var(--font-main);
      background: linear-gradient(160deg, #00704A 0%, #004d33 40%, #1A1A2E 100%);
    }

    .card-content {
      position: absolute;
      top: 80px;
      left: 80px;
      right: 80px;
      bottom: 80px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .emoji {
      font-size: 56px;
      margin-bottom: 40px;
    }

    .headline {
      font-size: 80px;
      font-weight: 800;
      color: #FFFFFF;
      line-height: 1.2;
      margin-bottom: 32px;
      letter-spacing: -0.02em;
    }

    .divider {
      width: 60px;
      height: 4px;
      background: rgba(255, 255, 255, 0.4);
      border-radius: 2px;
      margin: 0 auto 32px;
    }

    .sub-headline {
      font-size: 30px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.85);
      line-height: 1.5;
    }

    .account-name {
      position: absolute;
      bottom: 40px;
      left: 80px;
      font-size: 18px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.6);
      letter-spacing: -0.02em;
    }

    .page-indicator {
      position: absolute;
      bottom: 40px;
      right: 80px;
      font-size: 24px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.6);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-content">
      <div class="emoji">☕⚾</div>
      <h1 class="headline">스타벅스가<br>야구장 갑니다</h1>
      <div class="divider"></div>
      <p class="sub-headline">KBO x 스타벅스, 최초 콜라보 출시</p>
    </div>
    <span class="account-name">@요즘뭔일</span>
    <span class="page-indicator">1/7</span>
  </div>
</body>
</html>
