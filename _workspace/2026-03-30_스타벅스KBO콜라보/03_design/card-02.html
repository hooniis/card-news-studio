<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>카드 2 - 본문</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
  <style>
    :root {
      --primary: #00704A;
      --secondary: #E03131;
      --accent: #FFF8F0;
      --text-dark: #1A1A2E;
      --highlight: #FFD43B;
      --font-main: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #E2E8F0;
    }

    .card {
      width: 1080px;
      height: 1080px;
      position: relative;
      overflow: hidden;
      font-family: var(--font-main);
      background: var(--accent);
    }

    .card-content {
      position: absolute;
      top: 80px;
      left: 80px;
      right: 80px;
      bottom: 80px;
      display: flex;
      flex-direction: column;
    }

    .card-header {
      margin-bottom: 48px;
    }

    .title {
      font-size: 56px;
      font-weight: 700;
      color: var(--text-dark);
      line-height: 1.3;
      letter-spacing: -0.02em;
    }

    .divider {
      width: 60px;
      height: 4px;
      background: var(--primary);
      border-radius: 2px;
      margin-top: 24px;
    }

    .card-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 32px;
    }

    .body-text {
      font-size: 38px;
      font-weight: 400;
      color: var(--text-dark);
      line-height: 1.6;
    }

    .highlight-box {
      background: var(--primary);
      color: #FFFFFF;
      padding: 28px 36px;
      border-radius: 16px;
      font-size: 38px;
      font-weight: 700;
      text-align: center;
      line-height: 1.4;
      margin-top: 16px;
    }

    .account-name {
      position: absolute;
      bottom: 40px;
      left: 80px;
      font-size: 18px;
      font-weight: 600;
      color: #64748B;
      letter-spacing: -0.02em;
    }

    .page-indicator {
      position: absolute;
      bottom: 40px;
      right: 80px;
      font-size: 24px;
      font-weight: 500;
      color: #64748B;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-content">
      <div class="card-header">
        <h2 class="title">이거 진짜 처음이에요 ⭐</h2>
        <div class="divider"></div>
      </div>
      <div class="card-body">
        <p class="body-text">
          스타벅스가 국내 스포츠 단체와<br>
          공식 협업하는 건 이번이 최초예요.
        </p>
        <p class="body-text">
          테마 이름은 <strong>'Swing for Joy'</strong>!
        </p>
        <div class="highlight-box">
          국내 스포츠 최초 공식 협업
        </div>
      </div>
    </div>
    <span class="account-name">@요즘뭔일</span>
    <span class="page-indicator">2/7</span>
  </div>
</body>
</html>
