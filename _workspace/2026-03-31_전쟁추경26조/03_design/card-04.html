<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>카드 4 — 26.2조 어디에?</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
  <style>
    :root {
      --primary: #0F766E;
      --primary-light: #CCFBF1;
      --primary-bg: #F0FDFA;
      --accent: #EAB308;
      --bg-light: #F8FAFC;
      --text-dark: #1E293B;
      --text-light: #FFFFFF;
      --text-muted: #64748B;
      --font-main: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #E2E8F0;
    }

    .card {
      width: 1080px;
      height: 1080px;
      position: relative;
      overflow: hidden;
      font-family: var(--font-main);
      background: var(--bg-light);
    }

    .card-content {
      position: absolute;
      top: 80px;
      left: 80px;
      right: 80px;
      bottom: 80px;
      display: flex;
      flex-direction: column;
    }

    .card-header { margin-bottom: 16px; }

    .divider {
      width: 60px;
      height: 4px;
      background: var(--primary);
      border-radius: 2px;
      margin-bottom: 24px;
    }

    .headline {
      font-size: 54px;
      font-weight: 700;
      color: var(--text-dark);
      line-height: 1.3;
      letter-spacing: -0.02em;
    }

    .card-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 16px;
    }

    .bar-item {
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 0 8px;
    }

    .bar-label {
      font-size: 30px;
      font-weight: 600;
      color: var(--text-dark);
      min-width: 260px;
      letter-spacing: -0.01em;
    }

    .bar-wrapper {
      flex: 1;
      height: 48px;
      background: #E2E8F0;
      border-radius: 12px;
      overflow: hidden;
      position: relative;
    }

    .bar-fill {
      height: 100%;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding-right: 16px;
    }

    .bar-item:nth-child(1) .bar-fill {
      width: 100%;
      background: linear-gradient(90deg, var(--primary) 0%, #14B8A6 100%);
    }
    .bar-item:nth-child(2) .bar-fill {
      width: 96%;
      background: linear-gradient(90deg, #0369A1 0%, #38BDF8 100%);
    }
    .bar-item:nth-child(3) .bar-fill {
      width: 28%;
      background: linear-gradient(90deg, var(--accent) 0%, #FACC15 100%);
    }
    .bar-item:nth-child(4) .bar-fill {
      width: 26%;
      background: linear-gradient(90deg, #9333EA 0%, #C084FC 100%);
    }
    .bar-item:nth-child(5) .bar-fill {
      width: 10%;
      background: linear-gradient(90deg, #64748B 0%, #94A3B8 100%);
    }

    .bar-value {
      font-size: 28px;
      font-weight: 700;
      color: var(--text-light);
      white-space: nowrap;
    }

    .bar-value-outside {
      font-size: 28px;
      font-weight: 700;
      color: var(--text-dark);
      margin-left: 12px;
      white-space: nowrap;
    }

    .account-name {
      position: absolute;
      bottom: 40px;
      left: 80px;
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text-muted);
    }

    .page-indicator {
      position: absolute;
      bottom: 40px;
      right: 80px;
      font-size: 24px;
      color: var(--text-muted);
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-content">
      <div class="card-header">
        <div class="divider"></div>
        <h2 class="headline">26.2조, 어디에 쓰나요? 📊</h2>
      </div>
      <div class="card-body">
        <div class="bar-item">
          <div class="bar-label">⛽ 고유가 완화</div>
          <div class="bar-wrapper">
            <div class="bar-fill"><span class="bar-value">10.1조</span></div>
          </div>
        </div>
        <div class="bar-item">
          <div class="bar-label">🏛️ 지방재정</div>
          <div class="bar-wrapper">
            <div class="bar-fill"><span class="bar-value">9.7조</span></div>
          </div>
        </div>
        <div class="bar-item">
          <div class="bar-label">🏠 민생 안정</div>
          <div class="bar-wrapper">
            <div class="bar-fill"></div>
          </div>
          <span class="bar-value-outside">2.8조</span>
        </div>
        <div class="bar-item">
          <div class="bar-label">🏭 산업·공급망</div>
          <div class="bar-wrapper">
            <div class="bar-fill"></div>
          </div>
          <span class="bar-value-outside">2.6조</span>
        </div>
        <div class="bar-item">
          <div class="bar-label">📄 국채 상환</div>
          <div class="bar-wrapper">
            <div class="bar-fill"></div>
          </div>
          <span class="bar-value-outside">1.0조</span>
        </div>
      </div>
    </div>
    <span class="account-name">@요즘뭔일</span>
    <span class="page-indicator">4/6</span>
  </div>
</body>
</html>
