<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>카드 2 — 왜 추경?</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
  <style>
    :root {
      --primary: #0F766E;
      --primary-light: #CCFBF1;
      --primary-bg: #F0FDFA;
      --accent: #EAB308;
      --bg-light: #F8FAFC;
      --text-dark: #1E293B;
      --text-muted: #64748B;
      --font-main: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #E2E8F0;
    }

    .card {
      width: 1080px;
      height: 1080px;
      position: relative;
      overflow: hidden;
      font-family: var(--font-main);
      background: var(--bg-light);
    }

    .card-content {
      position: absolute;
      top: 80px;
      left: 80px;
      right: 80px;
      bottom: 80px;
      display: flex;
      flex-direction: column;
    }

    .card-header { margin-bottom: 16px; }

    .divider {
      width: 60px;
      height: 4px;
      background: var(--primary);
      border-radius: 2px;
      margin-bottom: 24px;
    }

    .headline {
      font-size: 54px;
      font-weight: 700;
      color: var(--text-dark);
      line-height: 1.3;
      letter-spacing: -0.02em;
    }

    .card-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 28px;
    }

    .flow-box {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .flow-step {
      display: flex;
      align-items: center;
      gap: 24px;
      padding: 24px 32px;
      background: var(--primary-bg);
      border-left: 4px solid var(--primary);
    }

    .flow-step:first-child { border-radius: 16px 16px 0 0; }
    .flow-step:last-child { border-radius: 0 0 16px 16px; }

    .flow-step .emoji { font-size: 36px; flex-shrink: 0; }

    .flow-step .text {
      font-size: 36px;
      font-weight: 500;
      color: var(--text-dark);
      line-height: 1.5;
      letter-spacing: -0.01em;
    }

    .flow-step .text .highlight {
      font-weight: 700;
      color: var(--primary);
    }

    .flow-arrow {
      display: flex;
      justify-content: center;
      padding: 4px 0;
      font-size: 28px;
      color: var(--primary);
    }

    .emphasis-box {
      padding: 32px 36px;
      background: linear-gradient(135deg, #FEF3C7 0%, #FFFBEB 100%);
      border-radius: 16px;
      border-left: 5px solid var(--accent);
      text-align: center;
    }

    .emphasis-box .label {
      font-size: 24px;
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 8px;
    }

    .emphasis-box .big-number {
      font-size: 64px;
      font-weight: 800;
      color: var(--primary);
      letter-spacing: -0.03em;
    }

    .emphasis-box .big-number .unit {
      font-size: 40px;
      font-weight: 700;
    }

    .account-name {
      position: absolute;
      bottom: 40px;
      left: 80px;
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text-muted);
    }

    .page-indicator {
      position: absolute;
      bottom: 40px;
      right: 80px;
      font-size: 24px;
      color: var(--text-muted);
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-content">
      <div class="card-header">
        <div class="divider"></div>
        <h2 class="headline">왜 추경을 편성했을까? ⛽</h2>
      </div>
      <div class="card-body">
        <div class="flow-box">
          <div class="flow-step">
            <div class="emoji">⚔️</div>
            <div class="text"><span class="highlight">미국·이란 전쟁</span> 확산</div>
          </div>
          <div class="flow-arrow">▼</div>
          <div class="flow-step">
            <div class="emoji">⛽</div>
            <div class="text">국제 <span class="highlight">유가 폭등</span></div>
          </div>
          <div class="flow-arrow">▼</div>
          <div class="flow-step">
            <div class="emoji">📉</div>
            <div class="text">경제 전반 <span class="highlight">불확실성 확대</span></div>
          </div>
        </div>
        <div class="emphasis-box">
          <div class="label">긴급 추경 편성</div>
          <div class="big-number">26<span class="unit">조</span> 2,000<span class="unit">억 원</span></div>
        </div>
      </div>
    </div>
    <span class="account-name">@요즘뭔일</span>
    <span class="page-indicator">2/6</span>
  </div>
</body>
</html>
