<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>카드 4 — 역대급 기록</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
  <style>
    :root {
      --primary: #2563EB;
      --primary-light: #DBEAFE;
      --bg-light: #F8FAFC;
      --text-dark: #1E293B;
      --text-light: #FFFFFF;
      --text-muted: #64748B;
      --font-main: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #E2E8F0; }
    .card {
      width: 1080px; height: 1080px; position: relative; overflow: hidden;
      font-family: var(--font-main); background: var(--bg-light);
    }
    .card-content { position: absolute; top: 100px; left: 100px; right: 100px; bottom: 100px; display: flex; flex-direction: column; }
    .card-header { margin-bottom: 16px; }
    .divider { width: 60px; height: 4px; background: var(--primary); border-radius: 2px; margin-bottom: 24px; }
    .headline { font-size: 54px; font-weight: 700; color: var(--text-dark); line-height: 1.3; letter-spacing: -0.02em; }
    .card-body { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 24px; }
    .compare-box {
      padding: 32px 36px; border-radius: 16px; text-align: center;
      background: linear-gradient(135deg, #DBEAFE 0%, #EFF6FF 100%);
      border: 2px solid rgba(37,99,235,0.12);
    }
    .compare-box .label { font-size: 28px; font-weight: 500; color: var(--text-muted); margin-bottom: 12px; }
    .compare-box .row { display: flex; align-items: center; justify-content: center; gap: 20px; }
    .compare-box .old { font-size: 36px; font-weight: 600; color: var(--text-muted); text-decoration: line-through; }
    .compare-box .arrow { font-size: 32px; color: var(--primary); }
    .compare-box .new { font-size: 48px; font-weight: 800; color: var(--primary); }
    .compare-box .sub { font-size: 26px; color: var(--text-muted); margin-top: 8px; }
    .rank-list { display: flex; flex-direction: column; gap: 0; }
    .rank-item {
      display: flex; align-items: center; gap: 20px;
      padding: 20px 28px; border-bottom: 1px solid #E2E8F0;
    }
    .rank-item:first-child { border-radius: 16px 16px 0 0; background: #FEF3C7; }
    .rank-item:not(:first-child) { background: #F1F5F9; }
    .rank-item:last-child { border-radius: 0 0 16px 16px; border-bottom: none; }
    .rank-num { font-size: 28px; font-weight: 800; color: var(--text-muted); width: 36px; }
    .rank-item:first-child .rank-num { color: #B45309; }
    .rank-name { font-size: 32px; font-weight: 600; color: var(--text-dark); flex: 1; }
    .rank-item:first-child .rank-name { font-weight: 800; color: #B45309; }
    .rank-val { font-size: 28px; font-weight: 500; color: var(--text-muted); }
    .rank-item:first-child .rank-val { font-weight: 700; color: #B45309; }
    .musk-box {
      padding: 28px 36px; border-radius: 16px;
      background: var(--primary); color: var(--text-light); text-align: center;
    }
    .musk-box .text { font-size: 36px; font-weight: 700; line-height: 1.4; }
    .musk-box .text .gold { color: #FDE68A; }
    .account-name { position: absolute; bottom: 50px; left: 100px; font-size: 18px; font-weight: 600; letter-spacing: -0.02em; color: var(--text-muted); }
    .page-indicator { position: absolute; bottom: 50px; right: 100px; font-size: 24px; color: var(--text-muted); font-weight: 500; }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-content">
      <div class="card-header">
        <div class="divider"></div>
        <h2 class="headline">기록이 다 깨진다 🏆</h2>
      </div>
      <div class="card-body">
        <div class="compare-box">
          <div class="label">역대 최대 미국 IPO 공모액</div>
          <div class="row">
            <div class="old">알리바바 220억$</div>
            <div class="arrow">→</div>
            <div class="new">750억$</div>
          </div>
          <div class="sub">알리바바의 3배 이상! (2014년 기록)</div>
        </div>
        <div class="rank-list">
          <div class="rank-item">
            <div class="rank-num">?</div>
            <div class="rank-name">스페이스X (예정)</div>
            <div class="rank-val">2조$ 이상</div>
          </div>
          <div class="rank-item">
            <div class="rank-num">1</div>
            <div class="rank-name">엔비디아</div>
            <div class="rank-val">2조$+</div>
          </div>
          <div class="rank-item">
            <div class="rank-num">2</div>
            <div class="rank-name">애플</div>
            <div class="rank-val">2조$+</div>
          </div>
          <div class="rank-item">
            <div class="rank-num">3</div>
            <div class="rank-name">알파벳 · MS · 아마존</div>
            <div class="rank-val">2조$+</div>
          </div>
        </div>
        <div class="musk-box">
          <div class="text">머스크, 세계 최초 <span class="gold">조(兆)달러 자산가</span> 등극 전망</div>
        </div>
      </div>
    </div>
    <span class="account-name">@요즘뭔일</span>
    <span class="page-indicator">4/6</span>
  </div>
</body>
</html>
