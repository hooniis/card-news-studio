<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>카드 3 — 스페이스X 뭐하는 회사?</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
  <style>
    :root {
      --primary: #2563EB;
      --primary-light: #DBEAFE;
      --bg-light: #F8FAFC;
      --text-dark: #1E293B;
      --text-light: #FFFFFF;
      --text-muted: #64748B;
      --font-main: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #E2E8F0; }
    .card {
      width: 1080px; height: 1080px; position: relative; overflow: hidden;
      font-family: var(--font-main); background: var(--bg-light);
    }
    .card-content { position: absolute; top: 100px; left: 100px; right: 100px; bottom: 100px; display: flex; flex-direction: column; }
    .card-header { margin-bottom: 16px; }
    .divider { width: 60px; height: 4px; background: var(--primary); border-radius: 2px; margin-bottom: 24px; }
    .headline { font-size: 54px; font-weight: 700; color: var(--text-dark); line-height: 1.3; letter-spacing: -0.02em; }
    .card-body { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 16px; }
    .biz-item {
      display: flex; align-items: center; gap: 24px;
      padding: 28px 32px; border-radius: 16px;
    }
    .biz-item:nth-child(1) { background: linear-gradient(135deg, #DBEAFE 0%, #EFF6FF 100%); }
    .biz-item:nth-child(2) { background: linear-gradient(135deg, #FEF3C7 0%, #FFFBEB 100%); }
    .biz-item:nth-child(3) { background: linear-gradient(135deg, #EDE9FE 0%, #F5F3FF 100%); }
    .biz-item:nth-child(4) { background: linear-gradient(135deg, #DCFCE7 0%, #F0FDF4 100%); }
    .biz-icon {
      width: 60px; height: 60px; border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 32px; flex-shrink: 0;
    }
    .biz-item:nth-child(1) .biz-icon { background: var(--primary); color: white; }
    .biz-item:nth-child(2) .biz-icon { background: #B45309; color: white; }
    .biz-item:nth-child(3) .biz-icon { background: #7C3AED; color: white; }
    .biz-item:nth-child(4) .biz-icon { background: #059669; color: white; }
    .biz-text .title { font-size: 34px; font-weight: 700; color: var(--text-dark); margin-bottom: 4px; }
    .biz-text .desc { font-size: 28px; font-weight: 400; color: var(--text-muted); line-height: 1.4; }
    .biz-text .desc .bold { font-weight: 700; color: var(--text-dark); }
    .revenue-box {
      padding: 28px 36px; border-radius: 16px;
      background: var(--primary); color: var(--text-light); text-align: center;
    }
    .revenue-box .text { font-size: 36px; font-weight: 700; line-height: 1.4; }
    .revenue-box .text .gold { color: #FDE68A; }
    .account-name { position: absolute; bottom: 50px; left: 100px; font-size: 18px; font-weight: 600; letter-spacing: -0.02em; color: var(--text-muted); }
    .page-indicator { position: absolute; bottom: 50px; right: 100px; font-size: 24px; color: var(--text-muted); font-weight: 500; }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-content">
      <div class="card-header">
        <div class="divider"></div>
        <h2 class="headline">스페이스X가 뭐하는 회사길래 🤔</h2>
      </div>
      <div class="card-body">
        <div class="biz-item">
          <div class="biz-icon">📡</div>
          <div class="biz-text">
            <div class="title">스타링크 (매출의 70%)</div>
            <div class="desc">위성 인터넷, 구독자 <span class="bold">1,000만명</span> 돌파</div>
          </div>
        </div>
        <div class="biz-item">
          <div class="biz-icon">🚀</div>
          <div class="biz-text">
            <div class="title">로켓 발사 서비스</div>
            <div class="desc">Falcon 9/Heavy, 매출 <span class="bold">44억 달러</span></div>
          </div>
        </div>
        <div class="biz-item">
          <div class="biz-icon">🌕</div>
          <div class="biz-text">
            <div class="title">스타십</div>
            <div class="desc">달·화성 탐사용 초대형 발사체</div>
          </div>
        </div>
        <div class="biz-item">
          <div class="biz-icon">🤖</div>
          <div class="biz-text">
            <div class="title">xAI 합병 (2026.3)</div>
            <div class="desc">궤도 AI 데이터센터 구축 계획</div>
          </div>
        </div>
        <div class="revenue-box">
          <div class="text">2025년 매출 <span class="gold">150억 달러</span> | EBITDA <span class="gold">80억 달러</span></div>
        </div>
      </div>
    </div>
    <span class="account-name">@요즘뭔일</span>
    <span class="page-indicator">3/6</span>
  </div>
</body>
</html>
