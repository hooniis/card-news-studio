<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>카드 3 — 얼마나 심각?</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
  <style>
    :root {
      --primary: #DC2626;
      --bg-light: #F8FAFC;
      --text-dark: #1E293B;
      --text-light: #FFFFFF;
      --text-muted: #64748B;
      --font-main: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #E2E8F0; }
    .card {
      width: 1080px; height: 1080px; position: relative; overflow: hidden;
      font-family: var(--font-main); background: var(--bg-light);
    }
    .card-content { position: absolute; top: 100px; left: 100px; right: 100px; bottom: 100px; display: flex; flex-direction: column; }
    .card-header { margin-bottom: 16px; }
    .divider { width: 60px; height: 4px; background: var(--primary); border-radius: 2px; margin-bottom: 24px; }
    .headline { font-size: 54px; font-weight: 700; color: var(--text-dark); line-height: 1.3; letter-spacing: -0.02em; }
    .card-body { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 24px; }
    .record-item {
      display: flex; align-items: center; gap: 28px;
      padding: 32px 36px; border-radius: 16px;
    }
    .record-item:nth-child(1) { background: #FEF2F2; border: 2px solid rgba(220,38,38,0.12); }
    .record-item:nth-child(2) { background: #FFF7ED; border: 2px solid rgba(234,88,12,0.12); }
    .record-item:nth-child(3) { background: #FEFCE8; border: 2px solid rgba(234,179,8,0.12); }
    .record-icon {
      width: 80px; height: 80px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 36px; flex-shrink: 0;
    }
    .record-item:nth-child(1) .record-icon { background: #DC2626; color: var(--text-light); }
    .record-item:nth-child(2) .record-icon { background: #EA580C; color: var(--text-light); }
    .record-item:nth-child(3) .record-icon { background: #CA8A04; color: var(--text-light); }
    .record-text { flex: 1; }
    .record-label { font-size: 28px; font-weight: 500; color: var(--text-muted); margin-bottom: 6px; }
    .record-value { font-size: 38px; font-weight: 700; color: var(--text-dark); line-height: 1.4; letter-spacing: -0.01em; }
    .record-item:nth-child(1) .record-value .highlight { color: #DC2626; }
    .record-item:nth-child(2) .record-value .highlight { color: #EA580C; }
    .record-item:nth-child(3) .record-value .highlight { color: #CA8A04; }
    .account-name { position: absolute; bottom: 50px; left: 100px; font-size: 18px; font-weight: 600; letter-spacing: -0.02em; color: var(--text-muted); }
    .page-indicator { position: absolute; bottom: 50px; right: 100px; font-size: 24px; color: var(--text-muted); font-weight: 500; }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-content">
      <div class="card-header">
        <div class="divider"></div>
        <h2 class="headline">기록이 말해준다 📉</h2>
      </div>
      <div class="card-body">
        <div class="record-item">
          <div class="record-icon">😱</div>
          <div class="record-text">
            <div class="record-label">A매치 2연패</div>
            <div class="record-value"><span class="highlight">2년 9개월</span> 만에 처음</div>
          </div>
        </div>
        <div class="record-item">
          <div class="record-icon">🚫</div>
          <div class="record-text">
            <div class="record-label">2경기 연속 무득점</div>
            <div class="record-value"><span class="highlight">6년 4개월</span> 만에 처음</div>
          </div>
        </div>
        <div class="record-item">
          <div class="record-icon">⚠️</div>
          <div class="record-text">
            <div class="record-label">월드컵 직전 마지막 평가전</div>
            <div class="record-value"><span class="highlight">2경기 0골</span>로 마무리</div>
          </div>
        </div>
      </div>
    </div>
    <span class="account-name">@요즘뭔일</span>
    <span class="page-indicator">3/6</span>
  </div>
</body>
</html>
