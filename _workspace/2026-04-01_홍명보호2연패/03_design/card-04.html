<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>카드 4 — 뭐가 문제?</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
  <style>
    :root {
      --primary: #DC2626;
      --bg-light: #F8FAFC;
      --text-dark: #1E293B;
      --text-light: #FFFFFF;
      --text-muted: #64748B;
      --font-main: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #E2E8F0; }
    .card {
      width: 1080px; height: 1080px; position: relative; overflow: hidden;
      font-family: var(--font-main); background: var(--bg-light);
    }
    .card-content { position: absolute; top: 100px; left: 100px; right: 100px; bottom: 100px; display: flex; flex-direction: column; }
    .card-header { margin-bottom: 16px; }
    .divider { width: 60px; height: 4px; background: var(--primary); border-radius: 2px; margin-bottom: 24px; }
    .headline { font-size: 54px; font-weight: 700; color: var(--text-dark); line-height: 1.3; letter-spacing: -0.02em; }
    .card-body { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 20px; }
    .problem-item {
      display: flex; align-items: flex-start; gap: 24px;
      padding: 28px 32px; border-radius: 16px; background: #FEF2F2;
      border-left: 4px solid #DC2626;
    }
    .problem-item:nth-child(2) { background: #FFF7ED; border-left-color: #EA580C; }
    .problem-item:nth-child(3) { background: #FFFBEB; border-left-color: #CA8A04; }
    .problem-num {
      width: 48px; height: 48px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 26px; font-weight: 800; flex-shrink: 0; color: var(--text-light);
    }
    .problem-item:nth-child(1) .problem-num { background: #DC2626; }
    .problem-item:nth-child(2) .problem-num { background: #EA580C; }
    .problem-item:nth-child(3) .problem-num { background: #CA8A04; }
    .problem-text {
      font-size: 36px; font-weight: 500; color: var(--text-dark);
      line-height: 1.5; letter-spacing: -0.01em; padding-top: 4px;
    }
    .problem-text .bold { font-weight: 700; }
    .problem-text .red { font-weight: 700; color: #DC2626; }
    .problem-text .orange { font-weight: 700; color: #EA580C; }
    .problem-text .yellow { font-weight: 700; color: #CA8A04; }
    .quote-box {
      margin-top: 8px; padding: 24px 32px;
      background: #1E293B; border-radius: 16px;
    }
    .quote-box .text {
      font-size: 32px; font-weight: 500; color: rgba(255,255,255,0.9);
      line-height: 1.5; font-style: italic;
    }
    .quote-box .author {
      font-size: 26px; font-weight: 600; color: rgba(255,255,255,0.5);
      margin-top: 8px;
    }
    .account-name { position: absolute; bottom: 50px; left: 100px; font-size: 18px; font-weight: 600; letter-spacing: -0.02em; color: var(--text-muted); }
    .page-indicator { position: absolute; bottom: 50px; right: 100px; font-size: 24px; color: var(--text-muted); font-weight: 500; }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-content">
      <div class="card-header">
        <div class="divider"></div>
        <h2 class="headline">뭐가 문제였나? 🤦‍♂️</h2>
      </div>
      <div class="card-body">
        <div class="problem-item">
          <div class="problem-num">1</div>
          <div class="problem-text"><span class="red">수비 라인 붕괴</span><br>스리백 실험, 안정감 부족</div>
        </div>
        <div class="problem-item">
          <div class="problem-num">2</div>
          <div class="problem-text"><span class="orange">공격 무기 실종</span><br>손흥민·이강인도 결정력 0</div>
        </div>
        <div class="problem-item">
          <div class="problem-num">3</div>
          <div class="problem-text"><span class="yellow">전술 완성도 의문</span><br>월드컵 코앞인데 해답 못 찾아</div>
        </div>
        <div class="quote-box">
          <div class="text">"스리백 가능성 확인했다, 월드컵 본선 준비에 집중하겠다"</div>
          <div class="author">— 홍명보 감독</div>
        </div>
      </div>
    </div>
    <span class="account-name">@요즘뭔일</span>
    <span class="page-indicator">4/6</span>
  </div>
</body>
</html>
