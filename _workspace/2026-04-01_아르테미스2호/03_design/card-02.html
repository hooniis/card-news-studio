<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>카드 2 — 뭐가 발사되나?</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
  <style>
    :root {
      --primary: #6366F1;
      --primary-light: #E0E7FF;
      --bg-light: #F8FAFC;
      --text-dark: #1E293B;
      --text-light: #FFFFFF;
      --text-muted: #64748B;
      --font-main: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #E2E8F0; }
    .card {
      width: 1080px; height: 1080px; position: relative; overflow: hidden;
      font-family: var(--font-main); background: var(--bg-light);
    }
    .card-content { position: absolute; top: 100px; left: 100px; right: 100px; bottom: 100px; display: flex; flex-direction: column; }
    .card-header { margin-bottom: 16px; }
    .divider { width: 60px; height: 4px; background: var(--primary); border-radius: 2px; margin-bottom: 24px; }
    .headline { font-size: 54px; font-weight: 700; color: var(--text-dark); line-height: 1.3; letter-spacing: -0.02em; }
    .card-body { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 24px; }
    .info-box {
      padding: 32px 36px; border-radius: 16px;
      background: linear-gradient(135deg, #EEF2FF 0%, #E0E7FF 100%);
      border: 2px solid rgba(99,102,241,0.12);
      text-align: center;
    }
    .info-box .label { font-size: 28px; font-weight: 500; color: var(--text-muted); margin-bottom: 8px; }
    .info-box .value { font-size: 48px; font-weight: 800; color: var(--primary); letter-spacing: -0.02em; }
    .info-box .value .unit { font-size: 32px; font-weight: 700; }
    .detail-row { display: flex; gap: 20px; }
    .detail-box {
      flex: 1; padding: 28px 24px; border-radius: 16px; text-align: center;
    }
    .detail-box.indigo { background: #EEF2FF; border: 2px solid rgba(99,102,241,0.12); }
    .detail-box.amber { background: #FFFBEB; border: 2px solid rgba(245,158,11,0.12); }
    .detail-box.cyan { background: #ECFEFF; border: 2px solid rgba(6,182,212,0.12); }
    .detail-box .label { font-size: 26px; font-weight: 500; color: var(--text-muted); margin-bottom: 8px; }
    .detail-box .value { font-size: 36px; font-weight: 700; letter-spacing: -0.01em; }
    .detail-box.indigo .value { color: #4F46E5; }
    .detail-box.amber .value { color: #B45309; }
    .detail-box.cyan .value { color: #0891B2; }
    .highlight-box {
      padding: 28px 36px; background: #1E1B4B; border-radius: 16px; text-align: center;
    }
    .highlight-box .text { font-size: 38px; font-weight: 700; color: var(--text-light); }
    .highlight-box .text .gold { color: #FCD34D; }
    .account-name { position: absolute; bottom: 50px; left: 100px; font-size: 18px; font-weight: 600; letter-spacing: -0.02em; color: var(--text-muted); }
    .page-indicator { position: absolute; bottom: 50px; right: 100px; font-size: 24px; color: var(--text-muted); font-weight: 500; }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-content">
      <div class="card-header">
        <div class="divider"></div>
        <h2 class="headline">아르테미스 2호가 뭔데? 🚀</h2>
      </div>
      <div class="card-body">
        <div class="info-box">
          <div class="label">발사 일시 (한국 시간)</div>
          <div class="value">4월 2일 오전 7:24</div>
        </div>
        <div class="detail-row">
          <div class="detail-box indigo">
            <div class="label">탑승 인원</div>
            <div class="value">4명</div>
          </div>
          <div class="detail-box amber">
            <div class="label">임무 기간</div>
            <div class="value">10일</div>
          </div>
          <div class="detail-box cyan">
            <div class="label">달까지 거리</div>
            <div class="value">38만 km</div>
          </div>
        </div>
        <div class="highlight-box">
          <div class="text">NASA의 <span class="gold">유인 달 궤도 탐사</span> 미션</div>
        </div>
      </div>
    </div>
    <span class="account-name">@요즘뭔일</span>
    <span class="page-indicator">2/6</span>
  </div>
</body>
</html>
