<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>카드 3 — 왜 특별?</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
  <style>
    :root {
      --primary: #6366F1;
      --bg-light: #F8FAFC;
      --text-dark: #1E293B;
      --text-light: #FFFFFF;
      --text-muted: #64748B;
      --font-main: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #E2E8F0; }
    .card {
      width: 1080px; height: 1080px; position: relative; overflow: hidden;
      font-family: var(--font-main); background: var(--bg-light);
    }
    .card-content { position: absolute; top: 100px; left: 100px; right: 100px; bottom: 100px; display: flex; flex-direction: column; }
    .card-header { margin-bottom: 16px; }
    .divider { width: 60px; height: 4px; background: var(--primary); border-radius: 2px; margin-bottom: 24px; }
    .headline { font-size: 54px; font-weight: 700; color: var(--text-dark); line-height: 1.3; letter-spacing: -0.02em; }
    .card-body { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 0; }
    .timeline-item {
      display: flex; align-items: center; gap: 24px;
      padding: 28px 32px;
      border-left: 4px solid #C7D2FE;
    }
    .timeline-item:first-child { border-radius: 16px 16px 0 0; background: #EEF2FF; }
    .timeline-item:nth-child(2) { background: #F5F3FF; border-left-color: #A5B4FC; }
    .timeline-item:nth-child(3) { background: #FAF5FF; border-left-color: #C4B5FD; }
    .timeline-item.now { background: #1E1B4B; border-left-color: #6366F1; border-radius: 0 0 16px 16px; }
    .timeline-year {
      font-size: 32px; font-weight: 800; min-width: 110px; flex-shrink: 0;
      letter-spacing: -0.02em;
    }
    .timeline-item:nth-child(1) .timeline-year { color: #6366F1; }
    .timeline-item:nth-child(2) .timeline-year { color: #7C3AED; }
    .timeline-item:nth-child(3) .timeline-year { color: #9333EA; }
    .timeline-item.now .timeline-year { color: #FCD34D; }
    .timeline-text {
      font-size: 36px; font-weight: 500; color: var(--text-dark);
      line-height: 1.4; letter-spacing: -0.01em;
    }
    .timeline-text .bold { font-weight: 700; }
    .timeline-item.now .timeline-text { color: var(--text-light); }
    .timeline-item.now .timeline-text .bold { color: #FCD34D; }
    .gap-box {
      display: flex; justify-content: center; padding: 12px 0;
      font-size: 28px; font-weight: 700; color: var(--primary);
    }
    .bottom-box {
      margin-top: 20px; padding: 28px 36px;
      background: linear-gradient(135deg, #EEF2FF 0%, #E0E7FF 100%);
      border-radius: 16px; border-left: 5px solid var(--primary);
      text-align: center;
    }
    .bottom-box .text { font-size: 36px; font-weight: 700; color: var(--text-dark); }
    .bottom-box .text .indigo { color: #4F46E5; }
    .account-name { position: absolute; bottom: 50px; left: 100px; font-size: 18px; font-weight: 600; letter-spacing: -0.02em; color: var(--text-muted); }
    .page-indicator { position: absolute; bottom: 50px; right: 100px; font-size: 24px; color: var(--text-muted); font-weight: 500; }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-content">
      <div class="card-header">
        <div class="divider"></div>
        <h2 class="headline">54년 만이라고? 🌙</h2>
      </div>
      <div class="card-body">
        <div class="timeline-item">
          <div class="timeline-year">1969</div>
          <div class="timeline-text">아폴로 11호, <span class="bold">인류 최초 달 착륙</span></div>
        </div>
        <div class="timeline-item">
          <div class="timeline-year">1972</div>
          <div class="timeline-text">아폴로 17호, <span class="bold">마지막 유인 달 탐사</span></div>
        </div>
        <div class="gap-box">⋮ 54년간 무인 탐사만 ⋮</div>
        <div class="timeline-item">
          <div class="timeline-year">2022</div>
          <div class="timeline-text">아르테미스 1호, <span class="bold">무인 시험 비행</span> 성공</div>
        </div>
        <div class="timeline-item now">
          <div class="timeline-year">2026</div>
          <div class="timeline-text">아르테미스 2호, <span class="bold">유인 달 궤도 탐사</span> 🚀</div>
        </div>
        <div class="bottom-box">
          <div class="text">반세기 만에 <span class="indigo">인류가 다시 달로</span></div>
        </div>
      </div>
    </div>
    <span class="account-name">@요즘뭔일</span>
    <span class="page-indicator">3/6</span>
  </div>
</body>
</html>
