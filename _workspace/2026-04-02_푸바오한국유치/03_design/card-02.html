<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>카드 2 — 배경</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
  <style>
    :root {
      --primary: #7C3AED;
      --primary-light: #EDE9FE;
      --bg-light: #F8FAFC;
      --text-dark: #1E293B;
      --text-light: #FFFFFF;
      --text-muted: #64748B;
      --font-main: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #E2E8F0; }
    .card {
      width: 1080px; height: 1080px; position: relative; overflow: hidden;
      font-family: var(--font-main); background: var(--bg-light);
    }
    .card-content { position: absolute; top: 100px; left: 100px; right: 100px; bottom: 100px; display: flex; flex-direction: column; }
    .card-header { margin-bottom: 16px; }
    .divider { width: 60px; height: 4px; background: var(--primary); border-radius: 2px; margin-bottom: 24px; }
    .headline { font-size: 54px; font-weight: 700; color: var(--text-dark); line-height: 1.3; letter-spacing: -0.02em; }
    .card-body { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 24px; }
    .timeline-item {
      display: flex; align-items: flex-start; gap: 24px;
      padding: 28px 32px; border-radius: 16px;
    }
    .timeline-item:nth-child(1) { background: var(--primary-light); }
    .timeline-item:nth-child(2) { background: #FEF3C7; }
    .timeline-item:nth-child(3) { background: #DCFCE7; }
    .timeline-icon {
      width: 56px; height: 56px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; flex-shrink: 0;
    }
    .timeline-item:nth-child(1) .timeline-icon { background: var(--primary); color: white; }
    .timeline-item:nth-child(2) .timeline-icon { background: #CA8A04; color: white; }
    .timeline-item:nth-child(3) .timeline-icon { background: #059669; color: white; }
    .timeline-text { padding-top: 4px; }
    .timeline-text .date { font-size: 26px; font-weight: 600; color: var(--text-muted); margin-bottom: 6px; }
    .timeline-text .desc { font-size: 36px; font-weight: 500; color: var(--text-dark); line-height: 1.5; letter-spacing: -0.01em; }
    .timeline-text .desc .purple { font-weight: 700; color: var(--primary); }
    .timeline-text .desc .amber { font-weight: 700; color: #B45309; }
    .timeline-text .desc .green { font-weight: 700; color: #059669; }
    .highlight-box {
      padding: 32px 40px; border-radius: 16px; text-align: center;
      background: var(--primary); color: var(--text-light);
    }
    .highlight-box .text { font-size: 38px; font-weight: 700; line-height: 1.4; }
    .highlight-box .text .gold { color: #FDE68A; }
    .account-name { position: absolute; bottom: 50px; left: 100px; font-size: 18px; font-weight: 600; letter-spacing: -0.02em; color: var(--text-muted); }
    .page-indicator { position: absolute; bottom: 50px; right: 100px; font-size: 24px; color: var(--text-muted); font-weight: 500; }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-content">
      <div class="card-header">
        <div class="divider"></div>
        <h2 class="headline">어떻게 시작된 거야? 🐼</h2>
      </div>
      <div class="card-body">
        <div class="timeline-item">
          <div class="timeline-icon">🤝</div>
          <div class="timeline-text">
            <div class="date">2026년 1월</div>
            <div class="desc">이재명 대통령, 시진핑 주석에<br><span class="purple">판다 대여 공식 제안</span></div>
          </div>
        </div>
        <div class="timeline-item">
          <div class="timeline-icon">📍</div>
          <div class="timeline-text">
            <div class="date">현재</div>
            <div class="desc"><span class="amber">광주 우치동물원</span>이<br>유치 후보지로 부상</div>
          </div>
        </div>
        <div class="timeline-item">
          <div class="timeline-icon">🔍</div>
          <div class="timeline-text">
            <div class="date">4월 3일 예정</div>
            <div class="desc"><span class="green">외교부 현장 점검</span> 나선다<br>우치동물원 직접 방문</div>
          </div>
        </div>
        <div class="highlight-box">
          <div class="text">푸바오가 <span class="gold">광주</span>에서 살 수도 있다!</div>
        </div>
      </div>
    </div>
    <span class="account-name">@요즘뭔일</span>
    <span class="page-indicator">2/6</span>
  </div>
</body>
</html>
