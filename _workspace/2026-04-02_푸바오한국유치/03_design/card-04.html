<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>카드 4 — 판다 효과</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
  <style>
    :root {
      --primary: #7C3AED;
      --primary-light: #EDE9FE;
      --bg-light: #F8FAFC;
      --text-dark: #1E293B;
      --text-light: #FFFFFF;
      --text-muted: #64748B;
      --font-main: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #E2E8F0; }
    .card {
      width: 1080px; height: 1080px; position: relative; overflow: hidden;
      font-family: var(--font-main); background: var(--bg-light);
    }
    .card-content { position: absolute; top: 100px; left: 100px; right: 100px; bottom: 100px; display: flex; flex-direction: column; }
    .card-header { margin-bottom: 16px; }
    .divider { width: 60px; height: 4px; background: var(--primary); border-radius: 2px; margin-bottom: 24px; }
    .headline { font-size: 54px; font-weight: 700; color: var(--text-dark); line-height: 1.3; letter-spacing: -0.02em; }
    .card-body { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 24px; }
    .effect-box {
      padding: 32px 36px; border-radius: 16px; text-align: center;
      background: linear-gradient(135deg, #DCFCE7 0%, #F0FDF4 100%);
      border: 2px solid rgba(5,150,105,0.12);
    }
    .effect-box .label { font-size: 28px; font-weight: 500; color: var(--text-muted); margin-bottom: 8px; }
    .effect-box .number { font-size: 56px; font-weight: 800; color: #059669; letter-spacing: -0.02em; }
    .effect-box .unit { font-size: 32px; font-weight: 700; }
    .effect-box .sub { font-size: 26px; font-weight: 400; color: var(--text-muted); margin-top: 6px; }
    .compare-row { display: flex; gap: 20px; align-items: stretch; }
    .compare-card {
      flex: 1; padding: 28px 24px; border-radius: 16px; text-align: center;
      display: flex; flex-direction: column; justify-content: center;
    }
    .compare-card.before { background: #F1F5F9; border: 2px solid #E2E8F0; }
    .compare-card.after { background: var(--primary-light); border: 2px solid rgba(124,58,237,0.15); }
    .compare-card .emoji { font-size: 40px; margin-bottom: 8px; }
    .compare-card .label { font-size: 26px; font-weight: 500; color: var(--text-muted); margin-bottom: 6px; }
    .compare-card .value { font-size: 44px; font-weight: 800; letter-spacing: -0.02em; }
    .compare-card.before .value { color: var(--text-muted); }
    .compare-card.after .value { color: var(--primary); }
    .compare-card .sub { font-size: 24px; font-weight: 400; color: var(--text-muted); margin-top: 4px; }
    .compare-arrow { font-size: 40px; color: var(--primary); display: flex; align-items: center; flex-shrink: 0; }
    .bottom-box {
      padding: 28px 36px; border-radius: 16px;
      background: var(--primary); color: var(--text-light); text-align: center;
    }
    .bottom-box .text { font-size: 36px; font-weight: 700; line-height: 1.4; }
    .bottom-box .text .gold { color: #FDE68A; }
    .account-name { position: absolute; bottom: 50px; left: 100px; font-size: 18px; font-weight: 600; letter-spacing: -0.02em; color: var(--text-muted); }
    .page-indicator { position: absolute; bottom: 50px; right: 100px; font-size: 24px; color: var(--text-muted); font-weight: 500; }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-content">
      <div class="card-header">
        <div class="divider"></div>
        <h2 class="headline">그래도 판다 효과는 확실해 🎢</h2>
      </div>
      <div class="card-body">
        <div class="effect-box">
          <div class="label">에버랜드 판다월드 효과</div>
          <div class="number">분기 방문객 20<span class="unit">%↑</span></div>
          <div class="sub">특정 월 30만명 초과 달성</div>
        </div>
        <div class="compare-row">
          <div class="compare-card before">
            <div class="emoji">🏛️</div>
            <div class="label">현재 우치동물원</div>
            <div class="value">60만명</div>
            <div class="sub">연간 방문객</div>
          </div>
          <div class="compare-arrow">→</div>
          <div class="compare-card after">
            <div class="emoji">🐼</div>
            <div class="label">판다 오면</div>
            <div class="value">100만명</div>
            <div class="sub">최대 예상치</div>
          </div>
        </div>
        <div class="bottom-box">
          <div class="text">방문객 <span class="gold">67%↑</span> 기대<br>광주 지역경제 활성화 효과까지!</div>
        </div>
      </div>
    </div>
    <span class="account-name">@요즘뭔일</span>
    <span class="page-indicator">4/6</span>
  </div>
</body>
</html>
