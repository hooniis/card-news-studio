<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>카드 5 — 쟁점</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
  <style>
    :root {
      --primary: #7C3AED;
      --primary-light: #EDE9FE;
      --bg-light: #F8FAFC;
      --text-dark: #1E293B;
      --text-light: #FFFFFF;
      --text-muted: #64748B;
      --font-main: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #E2E8F0; }
    .card {
      width: 1080px; height: 1080px; position: relative; overflow: hidden;
      font-family: var(--font-main); background: var(--bg-light);
    }
    .card-content { position: absolute; top: 100px; left: 100px; right: 100px; bottom: 100px; display: flex; flex-direction: column; }
    .card-header { margin-bottom: 16px; }
    .divider { width: 60px; height: 4px; background: var(--primary); border-radius: 2px; margin-bottom: 24px; }
    .headline { font-size: 54px; font-weight: 700; color: var(--text-dark); line-height: 1.3; letter-spacing: -0.02em; }
    .card-body { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 20px; }
    .issue-item {
      display: flex; align-items: center; gap: 20px;
      padding: 24px 28px; border-radius: 16px;
    }
    .issue-item:nth-child(1) { background: #FEF2F2; border: 2px solid rgba(220,38,38,0.1); }
    .issue-item:nth-child(2) { background: #FFF7ED; border: 2px solid rgba(234,88,12,0.1); }
    .issue-item:nth-child(3) { background: #FFFBEB; border: 2px solid rgba(234,179,8,0.1); }
    .issue-item:nth-child(4) { background: #FDF2F8; border: 2px solid rgba(219,39,119,0.1); }
    .issue-icon {
      width: 52px; height: 52px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; flex-shrink: 0;
    }
    .issue-item:nth-child(1) .issue-icon { background: #DC2626; color: white; }
    .issue-item:nth-child(2) .issue-icon { background: #EA580C; color: white; }
    .issue-item:nth-child(3) .issue-icon { background: #CA8A04; color: white; }
    .issue-item:nth-child(4) .issue-icon { background: #DB2777; color: white; }
    .issue-text { font-size: 34px; font-weight: 500; color: var(--text-dark); line-height: 1.5; letter-spacing: -0.01em; }
    .issue-text .red { font-weight: 700; color: #DC2626; }
    .issue-text .orange { font-weight: 700; color: #EA580C; }
    .issue-text .amber { font-weight: 700; color: #B45309; }
    .issue-text .pink { font-weight: 700; color: #DB2777; }
    .plan-box {
      padding: 28px 36px; border-radius: 16px;
      background: linear-gradient(135deg, #EDE9FE 0%, #F5F3FF 100%);
      border-left: 5px solid var(--primary);
    }
    .plan-box .title { font-size: 30px; font-weight: 700; color: var(--primary); margin-bottom: 12px; }
    .plan-box .items { font-size: 30px; font-weight: 400; color: var(--text-dark); line-height: 1.7; }
    .plan-box .items .bold { font-weight: 700; }
    .account-name { position: absolute; bottom: 50px; left: 100px; font-size: 18px; font-weight: 600; letter-spacing: -0.02em; color: var(--text-muted); }
    .page-indicator { position: absolute; bottom: 50px; right: 100px; font-size: 24px; color: var(--text-muted); font-weight: 500; }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-content">
      <div class="card-header">
        <div class="divider"></div>
        <h2 class="headline">넘어야 할 산도 많아요 ⚠️</h2>
      </div>
      <div class="card-body">
        <div class="issue-item">
          <div class="issue-icon">🌡️</div>
          <div class="issue-text">판다 사육 조건이 <span class="red">매우 까다로움</span></div>
        </div>
        <div class="issue-item">
          <div class="issue-icon">👨‍🔬</div>
          <div class="issue-text"><span class="orange">전문 인력</span> 확보 필수</div>
        </div>
        <div class="issue-item">
          <div class="issue-icon">💰</div>
          <div class="issue-text">중국 측에 <span class="amber">보호 협력금</span> 지급 필요</div>
        </div>
        <div class="issue-item">
          <div class="issue-icon">📋</div>
          <div class="issue-text">정부 간 <span class="pink">협약+환경·연구 협력</span> 동시 진행</div>
        </div>
        <div class="plan-box">
          <div class="title">🏗️ 광주시 병행 리모델링 계획</div>
          <div class="items">
            맹금류사 → <span class="bold">천연기념물 보존관</span><br>
            침팬지 사육장 → <span class="bold">수달 공간</span><br>
            파충류 시설 → <span class="bold">동물행복복지센터</span>
          </div>
        </div>
      </div>
    </div>
    <span class="account-name">@요즘뭔일</span>
    <span class="page-indicator">5/6</span>
  </div>
</body>
</html>
