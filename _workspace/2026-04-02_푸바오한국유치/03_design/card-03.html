<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>카드 3 — 비용</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
  <style>
    :root {
      --primary: #7C3AED;
      --primary-light: #EDE9FE;
      --bg-light: #F8FAFC;
      --text-dark: #1E293B;
      --text-light: #FFFFFF;
      --text-muted: #64748B;
      --font-main: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #E2E8F0; }
    .card {
      width: 1080px; height: 1080px; position: relative; overflow: hidden;
      font-family: var(--font-main); background: var(--bg-light);
    }
    .card-content { position: absolute; top: 100px; left: 100px; right: 100px; bottom: 100px; display: flex; flex-direction: column; }
    .card-header { margin-bottom: 16px; }
    .divider { width: 60px; height: 4px; background: var(--primary); border-radius: 2px; margin-bottom: 24px; }
    .headline { font-size: 54px; font-weight: 700; color: var(--text-dark); line-height: 1.3; letter-spacing: -0.02em; }
    .card-body { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 20px; }
    .big-stat {
      padding: 36px 40px; border-radius: 16px; text-align: center;
      background: linear-gradient(135deg, #EDE9FE 0%, #F5F3FF 100%);
      border: 2px solid rgba(124,58,237,0.12);
    }
    .big-stat .label { font-size: 30px; font-weight: 500; color: var(--text-muted); margin-bottom: 8px; }
    .big-stat .number { font-size: 72px; font-weight: 800; color: var(--primary); letter-spacing: -0.02em; }
    .big-stat .unit { font-size: 40px; font-weight: 700; }
    .cost-row { display: flex; gap: 16px; }
    .cost-card {
      flex: 1; padding: 24px 20px; border-radius: 16px; text-align: center;
    }
    .cost-card:nth-child(1) { background: #FEF3C7; }
    .cost-card:nth-child(2) { background: #FEE2E2; }
    .cost-card .emoji { font-size: 36px; margin-bottom: 8px; }
    .cost-card .label { font-size: 26px; font-weight: 500; color: var(--text-muted); margin-bottom: 6px; }
    .cost-card .value { font-size: 38px; font-weight: 800; letter-spacing: -0.02em; }
    .cost-card:nth-child(1) .value { color: #B45309; }
    .cost-card:nth-child(2) .value { color: #DC2626; }
    .cost-card .sub { font-size: 24px; font-weight: 400; color: var(--text-muted); margin-top: 4px; }
    .compare-box {
      padding: 24px 32px; border-radius: 16px;
      background: #F1F5F9; border-left: 5px solid var(--text-muted);
    }
    .compare-box .text { font-size: 34px; font-weight: 500; color: var(--text-dark); line-height: 1.5; text-align: center; }
    .compare-box .text .purple { font-weight: 700; color: var(--primary); }
    .info-box {
      padding: 20px 32px; border-radius: 16px;
      background: var(--primary-light); text-align: center;
    }
    .info-box .text { font-size: 30px; font-weight: 500; color: var(--text-dark); }
    .info-box .text .purple { font-weight: 700; color: var(--primary); }
    .account-name { position: absolute; bottom: 50px; left: 100px; font-size: 18px; font-weight: 600; letter-spacing: -0.02em; color: var(--text-muted); }
    .page-indicator { position: absolute; bottom: 50px; right: 100px; font-size: 24px; color: var(--text-muted); font-weight: 500; }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-content">
      <div class="card-header">
        <div class="divider"></div>
        <h2 class="headline">근데 돈이 얼마나 들어? 💸</h2>
      </div>
      <div class="card-body">
        <div class="big-stat">
          <div class="label">판다 시설 초기 건설비</div>
          <div class="number">350<span class="unit">억원</span></div>
        </div>
        <div class="cost-row">
          <div class="cost-card">
            <div class="emoji">🏗️</div>
            <div class="label">이미 투입 국비</div>
            <div class="value">30억원</div>
            <div class="sub">동물사 3곳 조성</div>
          </div>
          <div class="cost-card">
            <div class="emoji">📅</div>
            <div class="label">연간 운영비</div>
            <div class="value">수십억원</div>
            <div class="sub">매년 추가 소요</div>
          </div>
        </div>
        <div class="compare-box">
          <div class="text">에버랜드 판다월드도 <span class="purple">200억</span> 들었어요<br>(2016년, 삼성물산)</div>
        </div>
        <div class="info-box">
          <div class="text">후보지: 열대조류관 앞 <span class="purple">4,300㎡</span></div>
        </div>
      </div>
    </div>
    <span class="account-name">@요즘뭔일</span>
    <span class="page-indicator">3/6</span>
  </div>
</body>
</html>
