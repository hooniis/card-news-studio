<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>카드 3 — 카페별 비교</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
  <style>
    :root {
      --primary: #7C3AED;
      --primary-light: #EDE9FE;
      --bg-light: #F8FAFC;
      --text-dark: #1E293B;
      --text-light: #FFFFFF;
      --text-muted: #64748B;
      --font-main: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #E2E8F0; }
    .card {
      width: 1080px; height: 1080px; position: relative; overflow: hidden;
      font-family: var(--font-main); background: var(--bg-light);
    }
    .card-content { position: absolute; top: 100px; left: 100px; right: 100px; bottom: 100px; display: flex; flex-direction: column; }
    .card-header { margin-bottom: 16px; }
    .divider { width: 60px; height: 4px; background: var(--primary); border-radius: 2px; margin-bottom: 24px; }
    .headline { font-size: 54px; font-weight: 700; color: var(--text-dark); line-height: 1.3; letter-spacing: -0.02em; }
    .card-body { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 0; }
    .rank-item {
      display: flex; align-items: center; gap: 20px;
      padding: 28px 32px;
      border-bottom: 1px solid #E2E8F0;
    }
    .rank-item:first-child { border-radius: 16px 16px 0 0; background: var(--primary-light); }
    .rank-item:nth-child(2) { background: #DCFCE7; }
    .rank-item:nth-child(3) { background: #DBEAFE; }
    .rank-item:nth-child(4) { background: #FEF3C7; }
    .rank-item:last-child { border-radius: 0 0 16px 16px; background: #F1F5F9; border-bottom: none; }
    .rank-icon { font-size: 40px; flex-shrink: 0; width: 52px; text-align: center; }
    .rank-name { font-size: 36px; font-weight: 700; color: var(--text-dark); flex: 1; }
    .rank-item:first-child .rank-name { color: var(--primary); }
    .rank-discount { font-size: 40px; font-weight: 800; }
    .rank-item:first-child .rank-discount { color: var(--primary); }
    .rank-item:nth-child(2) .rank-discount { color: #059669; }
    .rank-item:nth-child(3) .rank-discount { color: #2563EB; }
    .rank-item:nth-child(4) .rank-discount { color: #B45309; }
    .rank-item:last-child .rank-discount { color: #DC2626; }
    .rank-extra { font-size: 24px; font-weight: 400; color: var(--text-muted); margin-left: 4px; }
    .calc-box {
      margin-top: 24px; padding: 28px 36px; border-radius: 16px;
      background: var(--primary); color: var(--text-light); text-align: center;
    }
    .calc-box .text { font-size: 34px; font-weight: 700; line-height: 1.5; }
    .calc-box .text .gold { color: #FDE68A; }
    .account-name { position: absolute; bottom: 50px; left: 100px; font-size: 18px; font-weight: 600; letter-spacing: -0.02em; color: var(--text-muted); }
    .page-indicator { position: absolute; bottom: 50px; right: 100px; font-size: 24px; color: var(--text-muted); font-weight: 500; }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-content">
      <div class="card-header">
        <div class="divider"></div>
        <h2 class="headline">카페별 개인컵 할인 비교 📊</h2>
      </div>
      <div class="card-body">
        <div class="rank-item">
          <div class="rank-icon">🥇</div>
          <div class="rank-name">스타벅스</div>
          <div class="rank-discount">400원<span class="rank-extra">+에코별</span></div>
        </div>
        <div class="rank-item">
          <div class="rank-icon">🥈</div>
          <div class="rank-name">투썸플레이스</div>
          <div class="rank-discount">300원</div>
        </div>
        <div class="rank-item">
          <div class="rank-icon">🥈</div>
          <div class="rank-name">메가커피</div>
          <div class="rank-discount">300원</div>
        </div>
        <div class="rank-item">
          <div class="rank-icon">🥉</div>
          <div class="rank-name">이디야</div>
          <div class="rank-discount">200원</div>
        </div>
        <div class="rank-item">
          <div class="rank-icon">❌</div>
          <div class="rank-name">컴포즈커피</div>
          <div class="rank-discount">없음</div>
        </div>
        <div class="calc-box">
          <div class="text">매일 스벅 개인컵 쓰면<br>한 달 약 <span class="gold">12,000원</span> 절약!</div>
        </div>
      </div>
    </div>
    <span class="account-name">@요즘뭔일</span>
    <span class="page-indicator">3/6</span>
  </div>
</body>
</html>
