<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>카드 5 — 규제 변화</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
  <style>
    :root {
      --primary: #7C3AED;
      --primary-light: #EDE9FE;
      --bg-light: #F8FAFC;
      --text-dark: #1E293B;
      --text-light: #FFFFFF;
      --text-muted: #64748B;
      --font-main: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #E2E8F0; }
    .card {
      width: 1080px; height: 1080px; position: relative; overflow: hidden;
      font-family: var(--font-main); background: var(--bg-light);
    }
    .card-content { position: absolute; top: 100px; left: 100px; right: 100px; bottom: 100px; display: flex; flex-direction: column; }
    .card-header { margin-bottom: 16px; }
    .divider { width: 60px; height: 4px; background: var(--primary); border-radius: 2px; margin-bottom: 24px; }
    .headline { font-size: 54px; font-weight: 700; color: var(--text-dark); line-height: 1.3; letter-spacing: -0.02em; }
    .card-body { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 24px; }
    .change-box {
      padding: 32px 36px; border-radius: 16px; text-align: center;
      background: linear-gradient(135deg, #FEE2E2 0%, #FEF2F2 100%);
      border: 2px solid rgba(220,38,38,0.1);
    }
    .change-box .old { font-size: 34px; font-weight: 600; color: var(--text-muted); text-decoration: line-through; margin-bottom: 8px; }
    .change-box .arrow { font-size: 28px; color: #DC2626; margin-bottom: 8px; }
    .change-box .new { font-size: 40px; font-weight: 800; color: #DC2626; }
    .rule-list { display: flex; flex-direction: column; gap: 12px; }
    .rule-item {
      display: flex; align-items: center; gap: 16px;
      padding: 24px 28px; border-radius: 16px;
    }
    .rule-item:nth-child(1) { background: #FEF3C7; border-left: 5px solid #B45309; }
    .rule-item:nth-child(2) { background: #DCFCE7; border-left: 5px solid #059669; }
    .rule-item:nth-child(3) { background: #DBEAFE; border-left: 5px solid #2563EB; }
    .rule-icon { font-size: 32px; flex-shrink: 0; }
    .rule-text { font-size: 32px; font-weight: 500; color: var(--text-dark); line-height: 1.5; letter-spacing: -0.01em; }
    .rule-text .amber { font-weight: 700; color: #B45309; }
    .rule-text .green { font-weight: 700; color: #059669; }
    .rule-text .blue { font-weight: 700; color: #2563EB; }
    .tip-box {
      padding: 24px 32px; border-radius: 16px;
      background: var(--primary-light); border-left: 5px solid var(--primary); text-align: center;
    }
    .tip-box .text { font-size: 34px; font-weight: 600; color: var(--text-dark); line-height: 1.5; }
    .tip-box .text .purple { color: var(--primary); font-weight: 700; }
    .account-name { position: absolute; bottom: 50px; left: 100px; font-size: 18px; font-weight: 600; letter-spacing: -0.02em; color: var(--text-muted); }
    .page-indicator { position: absolute; bottom: 50px; right: 100px; font-size: 24px; color: var(--text-muted); font-weight: 500; }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-content">
      <div class="card-header">
        <div class="divider"></div>
        <h2 class="headline">일회용컵 규제도 바뀌어요 ⚖️</h2>
      </div>
      <div class="card-body">
        <div class="change-box">
          <div class="old">일회용컵 보증금제 (사실상 폐지)</div>
          <div class="arrow">▼</div>
          <div class="new">컵가격지불제로 전환</div>
        </div>
        <div class="rule-list">
          <div class="rule-item">
            <div class="rule-icon">💰</div>
            <div class="rule-text">일회용컵 가격 <span class="amber">100~200원</span><br>음료 가격에 포함 표시</div>
          </div>
          <div class="rule-item">
            <div class="rule-icon">♻️</div>
            <div class="rule-text">개인컵 사용하면<br>해당 금액 <span class="green">자동 할인</span></div>
          </div>
          <div class="rule-item">
            <div class="rule-icon">🚫</div>
            <div class="rule-text">매장 내 <span class="blue">일회용 빨대</span><br>원칙적 사용 금지 예정</div>
          </div>
        </div>
        <div class="tip-box">
          <div class="text">앞으로는 개인컵이 <span class="purple">돈도 아끼고 환경도 살리는</span> 필수템!</div>
        </div>
      </div>
    </div>
    <span class="account-name">@요즘뭔일</span>
    <span class="page-indicator">5/6</span>
  </div>
</body>
</html>
