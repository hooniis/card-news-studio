<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>카드 4 — 환경 노력</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
  <style>
    :root {
      --primary: #7C3AED;
      --bg-light: #F8FAFC;
      --text-dark: #1E293B;
      --text-light: #FFFFFF;
      --text-muted: #64748B;
      --font-main: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #E2E8F0; }
    .card {
      width: 1080px; height: 1080px; position: relative; overflow: hidden;
      font-family: var(--font-main); background: var(--bg-light);
    }
    .card-content { position: absolute; top: 100px; left: 100px; right: 100px; bottom: 100px; display: flex; flex-direction: column; }
    .card-header { margin-bottom: 16px; }
    .divider { width: 60px; height: 4px; background: var(--primary); border-radius: 2px; margin-bottom: 24px; }
    .headline { font-size: 54px; font-weight: 700; color: var(--text-dark); line-height: 1.3; letter-spacing: -0.02em; }
    .card-body { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 20px; }
    .stat-box {
      padding: 36px 40px; border-radius: 16px; text-align: center;
      background: linear-gradient(135deg, #DCFCE7 0%, #F0FDF4 100%);
      border: 2px solid rgba(5,150,105,0.12);
    }
    .stat-box .label { font-size: 28px; font-weight: 500; color: var(--text-muted); margin-bottom: 8px; }
    .stat-box .number { font-size: 64px; font-weight: 800; color: #059669; letter-spacing: -0.02em; }
    .stat-box .unit { font-size: 36px; font-weight: 700; }
    .eco-item {
      display: flex; align-items: center; gap: 20px;
      padding: 24px 28px; border-radius: 16px;
    }
    .eco-item:nth-child(2) { background: #DBEAFE; border: 2px solid rgba(37,99,235,0.1); }
    .eco-item:nth-child(3) { background: #EDE9FE; border: 2px solid rgba(124,58,237,0.1); }
    .eco-icon {
      width: 48px; height: 48px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 24px; flex-shrink: 0;
    }
    .eco-item:nth-child(2) .eco-icon { background: #2563EB; color: white; }
    .eco-item:nth-child(3) .eco-icon { background: var(--primary); color: white; }
    .eco-text { font-size: 34px; font-weight: 500; color: var(--text-dark); line-height: 1.4; letter-spacing: -0.01em; }
    .eco-text .blue { font-weight: 700; color: #2563EB; }
    .eco-text .purple { font-weight: 700; color: var(--primary); }
    .goal-box {
      padding: 28px 36px; border-radius: 16px;
      background: #059669; color: var(--text-light); text-align: center;
    }
    .goal-box .text { font-size: 36px; font-weight: 700; line-height: 1.4; }
    .goal-box .text .gold { color: #FDE68A; }
    .account-name { position: absolute; bottom: 50px; left: 100px; font-size: 18px; font-weight: 600; letter-spacing: -0.02em; color: var(--text-muted); }
    .page-indicator { position: absolute; bottom: 50px; right: 100px; font-size: 24px; color: var(--text-muted); font-weight: 500; }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-content">
      <div class="card-header">
        <div class="divider"></div>
        <h2 class="headline">개인컵 쓰면 환경도 살려요 🌍</h2>
      </div>
      <div class="card-body">
        <div class="stat-box">
          <div class="label">스타벅스 개인컵 사용 누적</div>
          <div class="number">2<span class="unit">억 건</span> 돌파!</div>
        </div>
        <div class="eco-item">
          <div class="eco-icon">🧴</div>
          <div class="eco-text">LG 텀블러 세척기 전 매장 설치<br>→ 개인컵 사용 <span class="blue">30%↑</span></div>
        </div>
        <div class="eco-item">
          <div class="eco-icon">📈</div>
          <div class="eco-text">연간 사용 <span class="purple">3,371만건</span><br>매년 15% 이상 성장 중</div>
        </div>
        <div class="goal-box">
          <div class="text">목표: 개인컵 이용률 <span class="gold">7% → 14%</span> 이상으로!</div>
        </div>
      </div>
    </div>
    <span class="account-name">@요즘뭔일</span>
    <span class="page-indicator">4/6</span>
  </div>
</body>
</html>
