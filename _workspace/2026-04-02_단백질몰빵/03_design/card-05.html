<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>카드 5 — 해결법</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
  <style>
    :root {
      --primary: #059669;
      --primary-light: #D1FAE5;
      --bg-light: #F8FAFC;
      --text-dark: #1E293B;
      --text-light: #FFFFFF;
      --text-muted: #64748B;
      --font-main: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #E2E8F0; }
    .card {
      width: 1080px; height: 1080px; position: relative; overflow: hidden;
      font-family: var(--font-main); background: var(--bg-light);
    }
    .card-content { position: absolute; top: 100px; left: 100px; right: 100px; bottom: 100px; display: flex; flex-direction: column; }
    .card-header { margin-bottom: 16px; }
    .divider { width: 60px; height: 4px; background: var(--primary); border-radius: 2px; margin-bottom: 24px; }
    .headline { font-size: 54px; font-weight: 700; color: var(--text-dark); line-height: 1.3; letter-spacing: -0.02em; }
    .card-body { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 20px; }
    .rule-box {
      padding: 32px 36px; border-radius: 16px; text-align: center;
      background: var(--primary); color: var(--text-light);
    }
    .rule-box .title { font-size: 40px; font-weight: 800; margin-bottom: 8px; letter-spacing: -0.02em; }
    .rule-box .title .gold { color: #FDE68A; }
    .rule-box .desc { font-size: 30px; font-weight: 400; opacity: 0.9; }
    .meal-row { display: flex; gap: 16px; }
    .meal-card {
      flex: 1; padding: 24px 20px; border-radius: 16px; text-align: center;
    }
    .meal-card:nth-child(1) { background: linear-gradient(135deg, #ECFDF5 0%, #D1FAE5 100%); }
    .meal-card:nth-child(2) { background: linear-gradient(135deg, #EFF6FF 0%, #DBEAFE 100%); }
    .meal-card:nth-child(3) { background: linear-gradient(135deg, #FDF2F8 0%, #FCE7F3 100%); }
    .meal-card .emoji { font-size: 40px; margin-bottom: 8px; }
    .meal-card .time { font-size: 28px; font-weight: 700; color: var(--text-dark); margin-bottom: 4px; }
    .meal-card .amount { font-size: 36px; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 6px; }
    .meal-card:nth-child(1) .amount { color: var(--primary); }
    .meal-card:nth-child(2) .amount { color: #2563EB; }
    .meal-card:nth-child(3) .amount { color: #DB2777; }
    .meal-card .example { font-size: 24px; font-weight: 400; color: var(--text-muted); }
    .tip-box {
      padding: 24px 32px; background: #ECFDF5; border-radius: 16px;
      border-left: 5px solid var(--primary);
    }
    .tip-box .text { font-size: 34px; font-weight: 600; color: var(--text-dark); line-height: 1.5; text-align: center; }
    .tip-box .text .green { color: var(--primary); font-weight: 700; }
    .account-name { position: absolute; bottom: 50px; left: 100px; font-size: 18px; font-weight: 600; letter-spacing: -0.02em; color: var(--text-muted); }
    .page-indicator { position: absolute; bottom: 50px; right: 100px; font-size: 24px; color: var(--text-muted); font-weight: 500; }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-content">
      <div class="card-header">
        <div class="divider"></div>
        <h2 class="headline">이렇게 나눠 먹으세요 💪</h2>
      </div>
      <div class="card-body">
        <div class="rule-box">
          <div class="title">단백질 <span class="gold">1:1:1</span> 분산 섭취</div>
          <div class="desc">근육 합성 효율 25% 향상!</div>
        </div>
        <div class="meal-row">
          <div class="meal-card">
            <div class="emoji">🌅</div>
            <div class="time">아침</div>
            <div class="amount">20~30g</div>
            <div class="example">달걀 2개 + 우유</div>
          </div>
          <div class="meal-card">
            <div class="emoji">☀️</div>
            <div class="time">점심</div>
            <div class="amount">20~30g</div>
            <div class="example">닭가슴살 1덩이</div>
          </div>
          <div class="meal-card">
            <div class="emoji">🌙</div>
            <div class="time">저녁</div>
            <div class="amount">20~30g</div>
            <div class="example">손바닥 크기 고기</div>
          </div>
        </div>
        <div class="tip-box">
          <div class="text">아침 달걀 1개가 저녁 고기 3인분보다<br><span class="green">근육에 훨씬 효과적</span> 🥚</div>
        </div>
      </div>
    </div>
    <span class="account-name">@요즘뭔일</span>
    <span class="page-indicator">5/6</span>
  </div>
</body>
</html>
