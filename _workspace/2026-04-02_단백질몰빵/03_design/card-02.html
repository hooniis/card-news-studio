<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>카드 2 — 뭐가 문제?</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
  <style>
    :root {
      --primary: #059669;
      --primary-light: #D1FAE5;
      --bg-light: #F8FAFC;
      --text-dark: #1E293B;
      --text-light: #FFFFFF;
      --text-muted: #64748B;
      --font-main: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #E2E8F0; }
    .card {
      width: 1080px; height: 1080px; position: relative; overflow: hidden;
      font-family: var(--font-main); background: var(--bg-light);
    }
    .card-content { position: absolute; top: 100px; left: 100px; right: 100px; bottom: 100px; display: flex; flex-direction: column; }
    .card-header { margin-bottom: 16px; }
    .divider { width: 60px; height: 4px; background: var(--primary); border-radius: 2px; margin-bottom: 24px; }
    .headline { font-size: 54px; font-weight: 700; color: var(--text-dark); line-height: 1.3; letter-spacing: -0.02em; }
    .card-body { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 24px; }
    .stat-box {
      padding: 36px 40px; border-radius: 16px; text-align: center;
      background: linear-gradient(135deg, #FEF3C7 0%, #FFFBEB 100%);
      border: 2px solid rgba(234,179,8,0.15);
    }
    .stat-box .label { font-size: 30px; font-weight: 500; color: var(--text-muted); margin-bottom: 8px; }
    .stat-box .number { font-size: 64px; font-weight: 800; color: #B45309; letter-spacing: -0.02em; }
    .stat-box .number .unit { font-size: 36px; font-weight: 700; }
    .info-item {
      display: flex; align-items: flex-start; gap: 24px; padding: 0 20px;
    }
    .info-marker {
      width: 56px; height: 56px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; flex-shrink: 0; background: var(--primary-light);
    }
    .info-text {
      font-size: 36px; font-weight: 400; color: var(--text-dark);
      line-height: 1.6; letter-spacing: -0.01em; padding-top: 8px;
    }
    .info-text .highlight { font-weight: 700; color: #B45309; }
    .emphasis-box {
      padding: 28px 36px;
      background: linear-gradient(135deg, #FEE2E2 0%, #FEF2F2 100%);
      border-radius: 16px; border-left: 5px solid #DC2626; text-align: center;
    }
    .emphasis-box .text { font-size: 38px; font-weight: 700; color: var(--text-dark); line-height: 1.4; }
    .emphasis-box .text .red { color: #DC2626; }
    .account-name { position: absolute; bottom: 50px; left: 100px; font-size: 18px; font-weight: 600; letter-spacing: -0.02em; color: var(--text-muted); }
    .page-indicator { position: absolute; bottom: 50px; right: 100px; font-size: 24px; color: var(--text-muted); font-weight: 500; }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-content">
      <div class="card-header">
        <div class="divider"></div>
        <h2 class="headline">한국인의 단백질 습관 🥩</h2>
      </div>
      <div class="card-body">
        <div class="stat-box">
          <div class="label">하루 단백질의 저녁 쏠림 비율</div>
          <div class="number">70<span class="unit">% 이상</span></div>
        </div>
        <div class="info-item">
          <div class="info-marker">🍳</div>
          <div class="info-text">아침: 빵·시리얼 위주, <span class="highlight">단백질 거의 0</span></div>
        </div>
        <div class="info-item">
          <div class="info-marker">🥘</div>
          <div class="info-text">저녁: 삼겹살·회식으로 <span class="highlight">60~80g 폭탄</span></div>
        </div>
        <div class="emphasis-box">
          <div class="text">이게 바로 <span class="red">'단백질 몰빵'</span>입니다</div>
        </div>
      </div>
    </div>
    <span class="account-name">@요즘뭔일</span>
    <span class="page-indicator">2/6</span>
  </div>
</body>
</html>
