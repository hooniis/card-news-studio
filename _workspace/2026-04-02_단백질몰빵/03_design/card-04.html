<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>카드 4 — 술+고기</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
  <style>
    :root {
      --primary: #059669;
      --bg-light: #F8FAFC;
      --text-dark: #1E293B;
      --text-light: #FFFFFF;
      --text-muted: #64748B;
      --font-main: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #E2E8F0; }
    .card {
      width: 1080px; height: 1080px; position: relative; overflow: hidden;
      font-family: var(--font-main); background: var(--bg-light);
    }
    .card-content { position: absolute; top: 100px; left: 100px; right: 100px; bottom: 100px; display: flex; flex-direction: column; }
    .card-header { margin-bottom: 16px; }
    .divider { width: 60px; height: 4px; background: var(--primary); border-radius: 2px; margin-bottom: 24px; }
    .headline { font-size: 54px; font-weight: 700; color: var(--text-dark); line-height: 1.3; letter-spacing: -0.02em; }
    .card-body { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 24px; }
    .combo-box {
      padding: 36px 40px; border-radius: 16px; text-align: center;
      background: linear-gradient(135deg, #FEF2F2 0%, #FEE2E2 100%);
      border: 2px solid rgba(220,38,38,0.12);
    }
    .combo-box .items { font-size: 44px; font-weight: 700; color: var(--text-dark); margin-bottom: 12px; }
    .combo-box .equals { font-size: 32px; font-weight: 500; color: var(--text-muted); margin-bottom: 8px; }
    .combo-box .result { font-size: 42px; font-weight: 800; color: #DC2626; letter-spacing: -0.02em; }
    .problem-item {
      display: flex; align-items: flex-start; gap: 24px;
      padding: 24px 28px; border-radius: 16px;
    }
    .problem-item:nth-child(2) { background: #FFF7ED; border: 2px solid rgba(234,88,12,0.12); }
    .problem-item:nth-child(3) { background: #FFFBEB; border: 2px solid rgba(234,179,8,0.12); }
    .problem-icon {
      width: 52px; height: 52px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; flex-shrink: 0;
    }
    .problem-item:nth-child(2) .problem-icon { background: #EA580C; color: white; }
    .problem-item:nth-child(3) .problem-icon { background: #CA8A04; color: white; }
    .problem-text {
      font-size: 34px; font-weight: 500; color: var(--text-dark);
      line-height: 1.5; letter-spacing: -0.01em; padding-top: 6px;
    }
    .problem-text .orange { font-weight: 700; color: #EA580C; }
    .problem-text .yellow { font-weight: 700; color: #CA8A04; }
    .account-name { position: absolute; bottom: 50px; left: 100px; font-size: 18px; font-weight: 600; letter-spacing: -0.02em; color: var(--text-muted); }
    .page-indicator { position: absolute; bottom: 50px; right: 100px; font-size: 24px; color: var(--text-muted); font-weight: 500; }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-content">
      <div class="card-header">
        <div class="divider"></div>
        <h2 class="headline">회식 고기는 더 문제예요 🍺</h2>
      </div>
      <div class="card-body">
        <div class="combo-box">
          <div class="items">🍺 술 + 🥩 고기</div>
          <div class="equals">=</div>
          <div class="result">밑 빠진 독에 물 붓기</div>
        </div>
        <div class="problem-item">
          <div class="problem-icon">🍺</div>
          <div class="problem-text"><span class="orange">알코올</span>이 근육 합성 호르몬 억제<br>+ 단백질 대사 방해</div>
        </div>
        <div class="problem-item">
          <div class="problem-icon">🍜</div>
          <div class="problem-text">후식 냉면·볶음밥 → <span class="yellow">혈당 스파이크</span><br>→ 단백질이 지방으로 전환</div>
        </div>
      </div>
    </div>
    <span class="account-name">@요즘뭔일</span>
    <span class="page-indicator">4/6</span>
  </div>
</body>
</html>
